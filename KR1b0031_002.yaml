body:
  text: 書蔡氏傳旁通卷二元陳師凱撰禹貢夏后氏五十而貢貢者較數嵗之中以為常朱子云夏時一夫受田五十畝而每夫計其五畝之入以為貢禹别九州非用其私智天文地理區域各定故星土之法則有九野周禮保章氏云以星土辨九州之地所封封域皆有分星以觀妖祥注云星土星所主土也鄭司農說星土以春秋傳曰參為晉星商主大火國語嵗之所在則我有周之分野之屬是也元謂大界則曰九州州中諸國之封域於星亦有分焉其書亡矣堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吴越也𤣥枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也疏云古黄帝時堪輿亡故其書亡矣又云吴越在南齊魯在東今嵗星或北或西不依國地所在者此古之受封之日嵗星所在之辰國屬焉故也吴越二國同次者亦謂同年度受封故同次也又案史記正義引星經云角亢鄭之分野兖州氐房心宋之分野豫州尾箕燕之分野幽州斗牛吴越之分野揚州女虗齊之分野青州危室壁衛之分野并州奎婁魯之分野徐州胃昴趙之分野冀州畢觜參魏之分野益州井鬼秦之分野雍州栁星張周之分野三河翼軫楚之分野荆州以九言則為九野以十二州言則為十二野壺口今隰州吉鄉縣寰宇記云在慈州吉鄉縣西南五十里今改吉州隷平陽路吕梁山在今石州離石縣東北寰宇記吕梁在離石北以東可三百餘里今隷太原路岐山在今汾州介休縣狐岐之山今隷太原路六壁城在勝水之側勝水寰宇記在汾州孝義縣南一里六壁府後魏太平真君五年討胡於六壁即此城也俗以城有六面因以為名在孝義縣西八里今仍屬汾州廣平曰原今河東路太原府也寰宇記為并州今為太原路屬河東山西道太岳在河東郡彘縣東今晉州霍邑也寰宇記太岳在霍邑縣東三十里晉州宋改平陽府今仍之霍邑今改為霍州山南曰陽則今岳陽縣地也堯之所都岳陽縣今屬平陽路汾水出扵太原經扵太岳東入于河今案汾河在山西當云西南入河地志云北山汾水所出西南至汾陰入河覃懐地名今懐州也今為懐孟路屬河東山西道淶水出乎其西地志淶水出代郡廣昌東南行五百里至容城入河今案容城屬涿郡在幽州之境去懷孟南北懸絶淶水不應在懐孟之西淶字恐是濟字之誤漳水二一出上黨治縣大黽谷上黨今潞州也治字誤地志作沾師古音它廉反韻㑹亦作沾寰宇記音丁念反今平定軍樂平縣少山也名為清漳寰宇記云少山一名河逢山在縣西南十里清漳水出焉平定完顔金改為州今屬河東山西道一出上黨長子縣鹿谷山長讀為長短之長今潞州長子縣發鳩山也名為濁漳寰宇記發鳩山在縣西南六十五里濁漳水出焉然縣別有鹿谷山非鹿谷即發鳩也漳水一名潞水今潞州為平陽路支郡東北至阜城入北河地志東北至邑成入大河鄴今潞州渉縣也渉縣今屬真定路阜城今定逺軍東光縣也今並有阜城東光二縣皆屬景州為河間路支郡周官大司徒辨十有二壤之物而知其種以教稼穡樹藝注壤土也釋云此十二壤即上十二土注云十二土分野十二邦上繫十二次各有所冝也疏云分別物之所生而知其所殖之種遂即以教民春稼秋穡以樹其木以藝其黍稷也以土均之法辨五物九䓁制天下之地征亦大司徒文也注云均平也五物五地之物也九等騂剛赤緹之屬疏云制天下之地征者言天下則并畿外邦國所稅入天子而言也五物即上山林川澤之等是也愚案上文云辨其山林川澤丘陵墳衍原隰之名物注云積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水厓曰墳下平曰衍髙平曰原下濕曰隰草人糞壤之法騂剛用牛赤緹用羊墳壤用麋渇澤用鹿地官草人云掌土化之灋以物地相其宜而為之種凡糞種騂剛用牛赤緹音低用羊墳粉壤用麋渇竭澤用鹿鹹潟昔用貆九勃壤用狐埴石壚用豕彊上聲㯺呼覽反用蕡扶云反輕爂孚照反用犬注云土化之法化之使美也凡所以糞種者皆謂煑取汁也赤緹縓色也縓七絹反渇澤故水處也潟鹵也貆貒他官反也勃壤粉解者埴壚黏疏者彊㯺堅強者輕爂輕脆者鄭司農云用牛以牛骨汁漬其種也謂之糞種蕡麻也疏云案禹貢冀州云白壤青州云白墳兖州云黒墳徐州云赤埴墳揚州荆州云塗泥豫州云墳壚梁州云青黎雍州云黄壤與此騂剛之屬為九等不同者以禹貢自是九州大判各為一等此九等者無妨一州即有此九䓁之類故不同也土㑹之法大司徒云以土㑹古外反之灋辨五地之物生一曰山林其動物冝毛物其植物宜皁物皁音早其民毛而方二曰川澤其動物冝鱗物其植物冝膏物其民黒而津三曰丘陵其動物冝羽物其植物冝覈核物其民專圑而長四曰墳衍其動物冝介物其植物冝莢物其民晳而瘠五曰原隰其動物冝臝物其植物冝叢物其民豐肉而庳注云皁物柞栗之屬膏物楊栁之屬理致白如膏𤣥謂膏當為櫜蓮芡之實有櫜韜天子所自治并與場圃園田漆林之𩔖而征之如周官載師所載賦非盡出扵田也地官載師云以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍去聲地以小都之田任縣地以大都之田任畺地凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五常山郡今真定路定州曲陽縣定州今改中山府曲陽隷保定路中山屬真定路東入滱水地志應劭曰滱音彄驅侯反瀛州髙陽縣瀛州今為河間路髙陽縣今隷安州屬保定路真定府行唐縣東流入于滋水行唐今隷保定滋水去縣三十六里衛水東入滹沱河寰宇記滹沲水在靈壽縣西南二十里大陸孫炎曰鉅鹿北廣阿澤河所經也鉅鹿即邢州今為順徳路鉅鹿為屬縣寰宇記云廣阿澤一名大陸一名鉅鹿一名大麓一名沃州在縣西北五里其澤東西二十里南北三十里澶相宋澶州今改開州隷大名府相州今名彰徳路盖禹河自澶相以北皆行西山之麓班馬王横皆謂載之髙地此西山指太行山也迤北連綿直至趙州以上接恒山皆在河北之西其地常髙於河古河之在貝冀以及枯洚之南貝州今改恩州為廣平路支郡冀州為真定路支郡案程氏禹貢圖古洚渠自邢州來過貝州北至冀州之東禹河自相州來經貝冀之南過洚水及其已過信洚之北信字下脫都古二字案此叚自程氏曰以下皆禹貢圖叙說之文傳冩脫二字耳信都冀州也古洚即枯洚也其北則趙深二州之境隋改趙之昭慶以為大陸縣唐又割鹿城置陸澤縣寰宇記昭慶本漢廣阿縣大業末改為大陸縣天寳十三年又改為昭慶縣唐舊書謂天寳元年改為昭慶唐舊書又云深州陸澤先天二年分饒陽鹿城界置陸澤縣至徳二年改鹿城為束鹿寰宇記云陸澤本漢廣阿縣地隋象城縣地唐開元中置以大陸澤為名貞元中以饒陽立湥州至長慶已後移深州理於是邑今案饒陽改隷晉州而深州理静安其大陸鹿城並未詳㳂革然皆不出漢之廣阿也蔡傳本陸澤多訛為陸渾非是邢趙湥三州為大陸邢州則有廣阿澤趙州則有大陸縣深州則有陸澤縣故總言之碣石地志在北平郡驪城縣西南河口之地今平州之南也地志作驪成無河口之地四字碣作揭師古音桀寰宇記今平州理盧龍縣本漢遼西肥如縣也碣石山在縣南二十三里碣然而立在海旁太康地志云秦築長城起自碣石在今髙麗舊界非此碣石也又平州石城縣在盧龍西一百四十里有碣石始皇刻石漢武登之當山嶺有大石如柱號曰天橋柱立扵巨海之内平州今改名平灤路仍理盧龍西至大都五百五十里驪城光武時省廢今無之漢遼東西右北平漁陽上谷之地遼東西今屬遼陽北平今為平灤漁陽今為薊州上谷今為覇州易州其水如遼濡滹易地志云大遼水出塞外濡乃官反在遼西肥如縣滹滹沲河在靈壽易即南易水去岸五百餘里地志言離縣二十三里此云去岸五百餘里者盖去滄州岸五百餘里非去平州岸也程氏叙說云平州之南即滄州之東北也平滄隅立之間有山而名碣石者尚在海中可望而見其山盖近平而逺滄也夫其従平視之則為正南従滄視之為東北也滄州即漢勃海郡北境與平州相接相去五百里戰國䇿以碣石在常山郡九門縣者恐名偶同而鄭氏以為九門無此山也前漢地志九門不言有碣石後漢郡國志常山國九門縣碣石山戰國䇿云在縣界寰宇記亦不言有碣石今無九門縣林氏曰濟古文作泲說文注云此兖州之濟也其従水従齊者說文注云出常山房子縣賛皇山當以古文為正說文泲字下注云沇也東入海子禮反據此即合導沇水東流為濟之文故當以古文為正地志常山房子賛皇山濟水所出東至廮陶廮音影鉅鹿縣入汦音脂師古曰濟音子詣反許商云在平成前漢溝洫志鴻嘉四年河隄都尉許商言古說九河之名有徒駭胡蘇鬲津今見在成平東光鬲界中自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域師古注云此九河之三也徒駭在成平胡蘇在東光鬲津在鬲成平東光屬勃海鬲屬平原鬲與隔同成平今蔡傳本多誤為平成合乙徒駭河地志云滹沱河地志成平滹沲河民曰徒駭河滄州清池縣即州治今隷河間路成平後漢及晉皆屬河間隋改景城今河間無之惟景州有故城縣恐是而滄州亦稱景城郡徳州安徳平原今二縣仍隷徳州為濟寧路支郡寰宇記云馬頰河在徳安縣南五十里鬲津枯河在徳安縣南七十里棣州滳河北寰宇記云馬頰枯河在縣北二十里今無滳河縣初隋以縣南滳河為名而今有南河縣恐即滳河改名河者寰宇記云漢許商所鑿故以商為名後人加水焉然則滳不音的當讀如商郭氏佩觽云滳河従商式羊反篤馬河前漢溝洫志韋昭云在平原縣地志云東北入海五百六十里胡蘓寰宇記云臨津古胡蘓亭在縣西南二十三里在古胡蘇河邉漢書地理志云東光有胡蘓亭即此也滄之饒安無棣臨津饒安臨津今並廢革無棣改隷棣州東光在今景州東光鈎盤在樂陵東南従徳州平昌來樂陵屬滄州寰宇記在縣東南五十里平昌今為徳平縣樂音洛鬲津寰宇記云在樂陵東西北流入饒安在樂陵縣西三里許商云在鬲縣髙齊天保七年併入安徳縣漢世近古止得其三許商所指是唐人遂得其六馬頰覆鬴鈎盤并許商所云為六輿地記又得其一簡潔鄭氏求之不得以為齊桓塞其八流以自廣爾雅注疏云鄭元云周時齊桓公塞之同為一河今河間弓髙以東至平原鬲津往徃有其遺處春秋緯寳乾圗云移河為界在齊吕填閼八流以自廣鄭元盖據此文謂齊桓公塞之故蔡氏以為無稽也夫曲防齊之所禁孟子注云不得曲為隄防壅泉激水以專小利也惟程氏以為九河之地已淪於海此段自漢以來􅊰求九河至論終皆程氏叙說成文惟鄭氏一段非故此以程氏更端下云平州正南有山而名碣石者尚在海中去岸五百餘里愚案程氏本意非謂去平州岸五百里乃去滄州岸五百里耳盖去平州岸只二十三里無許逺也漢王横言溝洫志王莽時大司空掾王横言往者天甞連雨東北風海水溢西南出寖數百里九河之地已為海所漸矣上子廉反禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹所穿也雷夏地志在濟隂郡城陽縣西北地志作成陽寰宇記作郕陽此作城誤今濮州雷澤縣西北今無雷澤縣澤在濮州鄄城縣鄄工掾反屬濟寧路汳水說文注臣鉉曰今作汴非是皮變反案寰宇記陳留縣下云雎溝在縣東南五里輿地志云汴水自滎陽受睢水東至陳留彭城南入泗水自後開通濟渠此渠廢今無水據此則蔡氏以汴為灉以睢為沮皆合其滎陽則㑹同之地也睢音雖獾音歡濋音楚汳音汴沛國芒縣地志芒莫郎反光武改為臨睢隋改為永城即今㱕徳府永城縣也沮有楚音韻㑹在吕反丘名祭之地地墳見左傳僖公四年西北多山東南多水先天之位艮為山居西北故西北多山兊為澤居東南故東南多水兖徐揚三州最居東南下流兖承河濟下流徐承淮泗下流揚承江漢下流漯水出東郡東武陽至千乘入海地志云行千二十里東武陽今濮州朝城縣也千乗今益都路樂安縣也程氏以為此乃漢河與漯殊異然亦不能明言漯河所在未詳其地也案程氏貢道圗云漯出東郡東武陽縣至漢後受河於武陽縣東南大抵東北行至千乗入海此河乃漢河元非禹河愚案程氏意非指漯為漢河盖言今自漯入河處所受河水乃漢以後所徙頓丘之河非禹時澶相以北之河也其漯水仍以東武陽為是料河水未徙之前其自漯入河處則又過武陽以北之地也即無與漯殊異之文故不別言漯所在耳岱泰山在今襲慶府奉符縣襲慶府今為兖州完顔金又扵奉符縣置泰安州並屬山東濟寧路嵎夷今登州之地今登州為般陽路支郡在東海之濵東北西三面皆距海濰水出琅琊郡箕縣今密州莒縣東北濰山也完顔金於莒縣置莒州屬益都路北至都昌入海今濰州昌邑也地志作昌都今濰州屬益都路淄州淄川縣今淄州改為般音盤陽路仍理淄川而泰安州又自有萊蕪縣東至博昌縣入濟今青州壽光縣也濟地志作泲青州今為益都路屬山東壽光仍隷錯盖別為一物如磬錯之錯韻㑹云錯鑢也又云鑢摩錯之也朱子云磋以鑢鐋蔡傳後云磬錯治磬之錯也即今萊州之地在東海之濵隷般陽路汶水出泰山郡萊蕪縣原山今襲慶府萊蕪縣也萊蕪今改屬泰安州鄆州中都縣鄆州今為東平路無中都縣有汶上縣沂水出泰山郡盖縣艾山今沂州沂水縣也盖地志音古盍反今沂水割屬莒州南至于下邳西南入于海地志行六百里下邳今邳州也水出尼丘山在今兖州泗水縣武陽之冠石山在今濮州朝城縣地志云行九百四十里至下邳入泗有漷說文云水在魯苦郭反寰宇記云源出費縣東南連青山下西南入徐州滕縣界沂沭沭食聿反寰宇記云沭水出沂州沂水縣西北沂山東南入泗水沂州費縣寰宇記云蒙山在縣西北八十里髙四十里長六十九里海州朐山縣寰宇記在縣西北九十里鯀所殛處下有羽淵今海州名海寧州仍理朐山為淮東淮安路支郡朐音渠大野在今濟州鉅野縣濟州今升為濟寧路鉅野為倚縣寰宇記云東西百餘里南北三百里濟水至乗氏縣分為二乗氏舊属曹州今廢寰宇記云漢乗氏縣在鉅野縣西南五十里劉宋時癈程氏禹貢圗云水經既扵封丘分南北濟又扵乗氏分為二必有一誤封丘今隷汴梁路東原漢之東平國今之鄆州也今亦稱東平路摶埴之工摶音圑拍也埴時職反黏土也出考工記埏埴以為器出老子十一章埏始然反和也周書作雒此汲冢周書第四十八篇也下文本見度邑萹古書誤以二篇合為一耳其壝本書壝作疆孔晁注云疆疆疊塗案此書傳刻訛舛正如晁注四字亦不可解大槩疆者指其壇耳壇之五方以五色土各隨其方疊塗之也壝則四旁起埒如牆無置黄土之處當以疆字為是壝以醉反鑿取其方面之土苞以黄土苴以白茅以為土封孔晁云其方土謂建東方諸侯以青土也苞覆苴裹土封封之為社也葛嶧山寰宇記嶧陽山在下邳縣西六里西征記下邳城西五里有葛山禹貢所謂嶧陽山也下邳今邳州西北陪尾山寰宇記在泗水縣東西南過彭城彭城今徐州属河南省襲慶府泗水縣今為兖州泗水縣下邳有石磬山石磬當一作磬石寰宇記輿地要覽皆作磬石山在下邳西南八十里寰宇記云泗水中無此石其山在泗水之南四十里今取磬石上供樂府其山出石大小撃之其聲清亮恐禹治水之時水至此山矣濠泗楚皆貢淮白魚濠州今為臨濠府泗仍泗州楚為淮安路及期而大祥及當作又中月而禫禫徒感反說文云除服祭名也鄭元云澹澹然平安之意文公家禮曰大祥後中月而禫中月間一月也二十五月祥後便禫以之為衮所以祭也左傳疏云祭服𤣥衣纁裳詩稱𤣥衮是𤣥衣而畫以衮龍衮之言卷也謂龍首卷然以之為端所以齋也春官司服云士之齋服有𤣥端素端鄭司農云𤣥衣有纁裳者為𤣥端鄭元謂端取其正也以之為冠以為首服也玉藻云𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也論語云羔裘𤣥冠不以弔許慎曰汳水受陳留浚儀隂溝至濛為灉水東入于泗則淮泗之可以達于河者以灉至于泗也自淮入泗至彭城入灉灉之上流即汳水也至浚儀入隂溝自隂溝而後北入河也泗之上源自泲亦可以通河也泝泗水而北至溢為滎處入河滎水即泲水也泲古濟字彭蠡地志在豫章郡彭澤縣東東字誤地志作西漢彭澤今南康之都昌江州之湖口彭澤皆其地也彭蠡在三縣之西南跨豫章饒州南康軍三州之地豫章今龍興路也此湖南至龍興之新建東至饒之鄱陽西至南康之建昌星子北至都昌夏小正夏時之書子夏傳松江寰宇記云松江在蘇州吴縣自太湖出海屈曲七百里又名吴江又名松陵又名笠澤併松江為二江愚案以此為三江固賢扵衆説然亦不合東為中江東為北江之文盖松江出扵太湖之下已與大江不相附近而婁江東江又為松江支流不過為太湖水口耳其於嶓岷江漢邈乎其不相關也若以漢江在荆州之域不當如東坡三江之說而又不必涉中江北江之文而止求其利病之在揚州之域者則水勢之大者莫若揚子大江松江浙江三者耳經文記彭蠡之下何為直捨大江而逺録湖水之支流也唐氏之言未敢遽信然蔡氏主之者以其地有三江之名且合吴越春秋之語捨此他說愈妄故取之耳然導水所謂中江北江則不在此也愚又思之恐三江有二不可合而論之三江既入一也中江北江二也本不相合震澤太湖也在吴縣之西南五十里今蘇州吴縣也蘇州今浙西平江路也太湖縱廣二百八十里周廻六百五十四里為地三萬七千頃其中有洞庭山夫椒山洞庭即包山山有洞庭寳室入地下潛通五嶽見寰宇記如三川震之震三川震國語文楩梓豫章之属楩皮連切豫章木名吴都賦作櫲樟葛越木緜之属吴都賦蕉葛升越弱於羅紈注云蕉葛布之細者升越越布之細者說文云葛絺綌草也韻㑹云越草名蒲屬葛越草布也吴始開邗溝隋人廣之而江淮舟船始通寰宇記云揚州江都縣合瀆渠在縣東二里本吴掘邗溝以通江淮之水路也昔吴王夫差將伐齊北覇中國自廣陵城東南築邗城城下掘深溝謂之邗江亦曰邗溝邗河干切江漢合流于荆去海尚逺據禹迹圗自江漢合流至海洋一千八百餘里長沙下雋地志雋字兖切寰宇記作攜郡國志作雋巴陵瀟湘之淵在九江之間洞庭湖記云沅澧之交瀟湘之㑹九江之間岳州巴陵今隷湖廣行省沅水郡國志云出牂牁且蘭縣地志云行二千五百三十里東南至益陽入江說文云出蜀郡由牂牁至長沙入洞庭湖且子閭切且蘭今播州境也益陽州属潭州路漸水地志云武陵郡索縣漸水東入沅索縣光武時廢未詳其地元水漢志在武陵郡無陽縣字或作沅源出牂牁郡故且蘭縣南入沅或名巫水又曰无水又名潕水㵲水舞水聲之訛也今蔡傳作元亨之元者字之訛也辰水地志出武陵郡辰陽縣三山谷行七百五十里入沅寰宇記作三峿山谷在今辰州路漵浦縣敘水地志云武陵郡義陵縣鄜梁山序水所出西入沅鄜音敷寰宇記作敘水鄜梁作瓠梁在今辰州路溆浦縣酉水地志出武陵郡充縣酉原山行千二百里入沅今辰州路沅陵縣有小酉山酉溪澧水地志出武陵郡充縣厯山行千二百里入沅今澧州路澧陽縣也資水地志出零陵郡都梁縣路山行千八百里入沅都梁今湖南武崗武崗縣也湘水地志出零陵郡零陵縣陽海山行二千五百三十里入江零陵今湖南永州路零陵縣也漢志九江在廬江郡之尋陽縣地志云禹貢九江在南皆東合大江案漢之尋陽縣治在今蘄州界内地名蘭城在江北而地界管至江南今江州之徳化徳安二縣皆其地也九江之名今自蘄州而下至尋陽小水入大江者固不一然並無一名如舊冀之九河遷徙不時至漢尚有可考者大江南北山隴界限千古不移而反無一名存焉可知其說之妄而不足凴也今詳漢九江郡之尋陽乃禹貢揚州之境謂九江之尋陽亦誤尋陽在漢属廬江不属九江九字恐誤秦置九江郡在壽春今安豐路有壽春縣而臨濠府光州和州皆其地也漢之廬江郡則今安慶無為皆其地也無為有廬江縣今之江州在漢則為尋陽縣及豫章郡之柴桑縣王莽時劉歆誤指彭蠡為九江遂使莽改豫章為九江郡改柴桑為九江亭而又改壽春之九江為延平郡扵是九江之名始遷於江南矣東漢九江仍治壽春廬江仍治舒尋陽仍𨽻江州而柴桑仍𨽻豫章晉改九江為淮南郡惠帝元康元年割揚州之豫章鄱陽廬陵臨川南康建安晉安荆州之武昌桂陽安成合十郡因江水之名而置江州初理江北岸地名蘭城在今蘄州界内後温嵪移於湓城永興元年分廬江之尋陽武昌之柴桑置尋陽郡属江州元帝渡江尋陽郡又置九江上甲二縣尋又省九江入尋陽安帝義熈八年省尋陽縣入柴桑縣柴桑仍為郡愚案尋陽縣即今徳化也柴桑即今瑞昌也而今之徳安則又尋陽柴桑之二境也寰宇記云九江在江州西北二十五里名曰白馬江則又以為一江而無九名矣又史記正義曰九江郡都隂陵隂陵故城在濠州定逺縣西六十五里東陵今之巴陵属岳州南郡枝江縣今江陵路属湖北華容縣属岳州路若潛水則未有見也王氏炎曰案隋志南郡松滋縣有涔即古潛字今松滋分為潛江縣属江陵路江夏安陸江夏縣属鄂州安陸古郢州也今為安陸府而徳安府亦有安陸縣雲夢在其南左傳楚子濟江入于雲中定四年又楚子以鄭伯田于江南之夣昭三年别而言之則二澤也江南曰夢江北曰雲朱子云江陵之下岳州之上是雲夣砮者中矢鏃之用今江西吴城龍廟中有東城所蔵石砮一枚色青而質堅長可四寸肅慎氏貢楛矢石砮事見國語董安于之治晉陽事見國語所以供祭祀縮酒之用疏云束茅立之祭前酒沃其上酒滲下若神飲之故謂之縮齊桓公責楚貢包茅不入見左氏僖四年又管子云江淮之間一茅而三脊名曰菁茅見輕重丁篇辰州麻陽縣苞茅山出苞茅見寰宇記今麻陽縣𨽻沅州組綬類崔豹古今注云漢舊制乗輿黄赤綬四采黄赤縹紺淳黄為圭長二丈九尺九寸五百首太龜尺有二寸史記龜䇿傳云龜千嵗滿尺二寸捨舟而陸以達于洛程氏圗荆貢陸行向洛在襄陽北光化鄧州之間熊耳在商州上洛縣商州今為陜西奉元路支郡𢎞農盧氏之熊耳非是今嵩州盧氏縣属河南府路河南縣西北有古榖城縣其北山實瀍水所出北山即名穀城山瀍水出其下澗水出廣陽山寰宇記云一名澠池山河南府河南縣今理洛川縣澠池縣今割属陜州濟水自孟州温縣入河今之懐孟路滎在鄭州滎澤縣西滎澤今屬汴梁路敖倉者古之敖山也寰宇記云書言仲丁遷于嚻詩言搏獸于敖春秋云敖鄗之間漢書云東據敖倉即此地秦時築倉扵山上故曰敖倉今濟水但入河不復過河之南寰宇記云古者濟水出河北截河南流而為滎澤自王莽末濟水但入河不復過河南鄭康成謂滎今塞為平地見春秋傳閔二年注程氏云春秋衛侯及狄人戰于滎澤然則在春秋時既可以戰則已不復受河矣引河東南以通淮泗河水溢出為滎東南流為濟為汳南入泗泗入淮濟水分河東南流漢明帝使王景即滎水故瀆東注浚儀謂之浚儀渠漢志謂滎陽縣有莨蕩渠首受濟者是也南曰莨蕩北曰浚儀其實一也程氏禹貢圗云受河之水至漢陽武縣分流其一𣲖南下者自中牟原圃之東趨大梁未至則為官渡官渡亦名沙水沙讀如蔡即蔡河也班固著莨蕩渠扵滎陽而曰首受泲東南至陳留入潁者即此派也亦戰國之謂鴻溝而楚漢分境者也既至陳留蔡河正派之外支脉散布遽為三名其在開封浚儀之北者為浚儀渠稍東為汳又東行至蒙為獲獲至彭城北遂入于泗此從大梁之北而數之為北來第一水也其浸波溠溠側駕反荷澤在定陶縣今濟隂縣今二縣皆属曹州菏澤在濟隂縣曹州即興仁府也東過冤句縣句音劬今濟隂縣地孟諸在睢陽縣東北今㱕徳府即宋之南京宋州古之梁國仍理睢陽今南京虞城縣西北孟諸澤是今虞城割𨽻濟州属濟寧路岷山在蜀郡湔氐道西徼外湔子千反氐丁奚反道者出徼之路縣之領夷者名曰道如剛氐道平隂道嚴道僰道之類徼吉弔反徼猶塞也東北謂之塞西南謂之徼在今茂州汶山縣江水所出也今為成都路支郡地志云江水出㟭山東南至江都入海行二千六百六十里青城天彭諸山青城天彭二山皆在今灌州天彭亦名灌口山寰宇記云李冰以秦時為蜀守謂汶山為天彭闕灌州舊名永康軍嶓冢山地志云在隴西郡氐道縣漾水所出又云在西縣案地志不云嶓冢在氐道但言瀁水所出至武都為漢扵西縣下却云嶓冢山西漢所出南入廣漢白水又於武都下云東漢水受氐道水一名沔過江夏謂之夏水據此則有西東二漢水其嶓冢則不言出漾而即言西漢所出其氐道則又即言漾出而不言有嶓冢分而為二則不合經文故蔡氏合兩出而並言之今興元府西縣三泉縣也盖嶓冢一山跨于兩縣云寰宇記西縣本後魏嶓冢縣也又云嶓冢山在三泉縣東二十八里又云漾水一名漢水一名沔水源出嶓冢山今興元路属陜西省而西縣三泉皆無之未詳㳂革江沱在成都府郫縣郫音疲今仍為縣永康軍導江縣今軍名灌州縣廢州𨽻成都路巴郡宕渠縣潛水宕徒浪反今東川蓬州地也渠州流江縣流江今廢渠州隷四川東道灊水出洋州真符縣洋州今𨽻興元路縣廢蔡山在雅州嚴道縣蒙山在雅州名山縣二縣並未詳㳂革當在今嘉定路之西三百里沬水史記音妹漢書音本末之本蜀郡太守李冰秦時人和川在雅州嚴道縣西去吐蕃大渡河五日程羅嵒州寰宇記作羅繩巖古蠻州巴郡魚復縣地志復音腹佷山縣地志屬武陵郡孟康曰佷山音恆如周官田一易再易之類周禮云一易之田家二百畝再易之田家三百畝一易者間一嵗耕百畝也再易者間二嵗耕百畝也後世蜀之卓氏程氏以鐵冶富擬封君史記蜀卓氏即鐵山鼓鑄富至僮千人擬扵人君程鄭亦冶鑄富埒卓氏俱居臨卭毳毛織之可以為罽毳昌芮反獸毛之細者罽居例反據說文織皮為罽毳布為􅖯並居例反西傾在洮州臨潭縣今為臨洮府属陜西鞏昌路縣革葭萌地志属廣漢郡宋属利州今為廣元路綿谷昭化二縣皆其地也漢沔地志如淳曰沔陽人謂漢水為沔水師古曰漢上曰沔晉壽宋名利州今為廣元路属四川南道至于襃水逾襃而暨于衙嶺之南溪灌于斜川届于武功而北以入于渭地志扶風郡武功縣斜水出衙嶺山北至郿入渭襃水亦出衙嶺至南鄭入沔斜弋奢反衙音牙郿音媚襃城斜谷南鄭皆在今陜西興元路武功今属陜西乾州漢武帝時人有上書欲通襃斜道及漕事見史記河渠書南陽上沔入襃史記正義云南陽今鄧州案今自有南陽府弱水在張掖郡刪丹縣地志云桑欽以為道弱水自此西至酒泉合黎後漢志云張掖在雒陽西四千二百里寰宇記云東南至洛陽三千三百里今為甘州路又有山丹州即刪丹也後魏曰山丹並𨽻甘肅行省刪丹山名一名焉支山魏太武擊柔然至栗水西行至菟園水又循弱水西行至涿邪山柔然即蠕蠕如兖反事見通鑑宋文帝元嘉六年北史載太武至菟園水分軍搜討出蠕蠕傳云菟園水去平城三千七百餘里東至瀚海西接張掖水北度燕然山東西五千餘里南北三千餘里程氏據西域傳以弱水為在條支其說非是程氏云自西漢以來指言弱水之地其顯著者凡六而班固地志已三出矣條支一也酒泉崑崙二也張掖刪丹本桑欽說以為西至酒泉合黎三也自漢志以外賈耽以張掖郡之張掖河當之唐史以小勃律之娑夷河東女之康延川當之其多如此臣惟取條支媯水之西入西海者以應經文而他皆不取為其地里不與經合也經曰弱水既西桑賈班三家所稱皆不出乎甘肅兩州之間其水未甞西流故臣深所不據而本漢書初通西域時長老所傳條支弱水以為經證其水西流注于西海以聲教該及四海者概之故敢主其說原州百泉縣岍頭山漢書作开頭山寰宇記作笄頭史記作鷄頭在今陜西涇州界内而原州今為鎮原州永興軍髙陵縣永興今陜西奉元路渭州渭源縣鳥鼠山渭州今為平涼府渭源屬臨洮府船司空縣名地志云本主船之官遂以為縣名今廢華州華隂縣今𨽻奉元路隴州汧源縣弦蒲薮有汭水今属鞏昌路漆水自耀州同官縣來耀今改輝州沮水在坊州冝君縣今冝君割属鄜州坊州昇平縣坊州理中部縣今州廢中部撥属鄜州而昇平亦併入冝君縣耀州華原縣合漆水縣今革寰宇記云合漆水入富平石川河至同州朝邑縣入渭同州今属奉元路又漆水出扶風縣今鳯翔府扶風縣岐山普潤縣鳯翔二縣也今𡵨山仍隷鳳翔普潤革灃水出永興軍鄠縣永興奉元也鄠音户至咸陽縣入渭縣属奉元耀州富平縣掘陵原縣属輝州終南在永興軍萬年縣完顔金改萬年為咸寧今為奉元倚縣扶風武功縣武功今属乾州地志古文古文者班固時古地理書也班固引之故稱古文原隰在邠州屬陜西武威縣東北有休屠澤古今以為豬野屠音除故匈奴休屠王地也古今當作古文涼州姑臧縣今西涼州属甘肅行省三危在燉煌燉徒門反今沙州路属甘肅省輿地要覽云三危山有三峯俗名昇雨山後漢西羌傳注亦云三危在沙州昆侖虗虗音墟爾雅疏云帝之下都昆侖之虗方八百里即崑崙山也琅玕石之似珠者爾雅注云状似珠山海經曰崑崙山有琅玕樹注琅玕子似玉積石在鄯州龍支縣鄯州在長安之西一千九百九十三里龍支縣在鄯州南一百三十五里積石山又在縣南宋時鄯蘭二州俱廢今復置蘭州属陜西省鄯在蘭西四百九十里龍門在河中府龍門縣河中属河東山西道縣革熙河路宋神宗改鎮洮軍為熈州以熙河洮岷州通逺軍為一路會州西小河會州在長安之西北一千一百九十里今屬陜西鞏昌路興州今四川南道沔州也属廣元路廣元古利州也今河北亦有興州管冝興興安二縣未知孰是小河鹹水其地生鹽去州一百二十里西安州之東大河分為六七道西安即鹽州在今甘肅省地面崑崙即河源所出在臨羌此據地志也臨羌漢属金城郡山在今甘肅省肅州路境内寰宇記云肅州酒泉縣崑崙山在縣西南八十里馬岌言禹貢崑崙在臨羌之西即此朙矣析支在河闗西千餘里河闗縣名地志属金城郡寰宇記云即涼州也渠搜近朔方之地也地志中部都尉所治属朔方郡隴州吴山縣吴嶽山寰宇記云秦都咸陽以為西嶽故稱吴嶽山在古縣西南五十里隴州今𨽻陜西縣革隴州汧源有岍山岍水所出岍記皆作汧在縣西六十里案寰宇記以吴岳與岍山為二山晁氏以為今之隴山天井金門秦嶺山者皆古之岍也據上文有二說故引此合言之寰宇記隴山在隴州汧源縣西六十二里天水大坂也張衡云欲往從之隴坂長其坂九廻不知髙幾許欲上者七日乃得越絶髙處可容百餘家下處容十萬户東望秦川四五百里極目泯然墟宇桑梓與雲霞一色人上隴者想還故鄉悲思而歌有絶死者秦嶺寰宇記云在隴州隴安縣西南雷首在今河中府河東縣寰宇記云在縣南三十里此山有九名謂歴山首山薄山襄山甘棗山渠豬山獨頭山陑山等之名又名雷首又名首陽底柱在今陜州陜縣三門山是也今属河南府路寰宇記云禹理洪水山陵當水者破之以通河三穿既決河出其間有似門故俗號三門又案文苑英華趙冬曦三門賦云砥柱山之六峯者皆生河之中流盖夏后之所開鑿其最北有兩柱相對距崖而立即所謂三門也次于其南有孤峯揭起峯頂平闊夏禹之廟在焉西有孤石數丈圓如削成復次其南有三峯東曰金門中曰三堆西曰天柱湍水従黄老神前東流湍激蹙于蝦石折流而南潄于三門苞于廟山乃分為四流淙于三峯之下抵于曲隈㑹流東注加以兩崖夾水壁立千仭盤紆激射天下罕比濩澤地志濩烏虢反輯纂音胡郭反非是析城在澤州陽城縣今澤州為平陽路支郡寰宇記云在縣西南七十五里王屋今絳州垣曲縣也今為平陽路支郡寰宇記又云王屋在澤州陽城縣南五十里有僊宫號小有清虗洞天山髙八千丈太行在今懐州河内今懷孟路寰宇記云在縣北二十五里太行山首於河内北至幽州凡百嶺緜亘十二州之界有八陘連山中斷謂之陘也恆山今定州曲陽定州今改中山府曲陽割属保定路河北諸山根本脊脉皆自代北寰武嵐憲諸州乗髙而來愚案河北之山皆従白登山來白登之南為管涔山汾水出其下管涔汾水之東為代為憲西為嵐而山之支分從此始白登在今河東山西道大同路白登縣管涔在今太原路管州界内白登之東諸水東趨于海西為大河其山脊正東西分水處也其脊以西之水則西流以入龍門西河之上流自龍門受汾水入河北至應州之西以及古東受降城一千六七百里皆受山脊西流之水其脊以東之水則東流而為桑乾幽冀以入于海南自趙深河間以北至平州如滱水濡水沾水易水䓁皆東趋于海桑乾音干河在今朔州鄯陽縣冀疑當作薊其西一支為壺口太岳案禹迹圗壷口在汾水之西太岳在汾水之東則壷口太岳不同一支次一支包汾晉之源而南出以為析城王屋而又西折以為雷首自管涔東趨太原又南為羊頭山迤西為太岳又南為析城汾晉皆在其西迤東為王屋别折一支西為雷首抵河又次一支乃為太行自羊頭山分而之東在沁水之北潞水之南沁千浸反又次一支乃為恆山自白登山正東而來與真定府相近數十里王鄭有三條四列之名皆為未當王肅鄭元也王以岍岐至碣石為北條西傾至陪尾為中條嶓冢至敷淺原為南條鄭以岍岐為正隂列西傾為次隂列嶓冢為次陽列岷山為正陽列朱圉在秦州大潭縣秦州今属鞏昌路縣革太華在華州華隂縣今属奉元路潁川郡崈髙縣有崈髙山古文以為外方地志云是為中岳有太室少室山廟崈古崇字西京登封縣今河南府路登封縣嵩髙山也桐柏在唐州桐柏縣唐州今為河南府路支郡縣革陪尾今安州安陸今江陵路徳安府安陸縣也荆山今襄陽府南章縣今作南漳内方今荆門軍長林縣今荆門改州属江陵路漢陽軍漢陽縣北大别山今為岳州路散府縣革衡山今潭州衡山縣今洞庭之南湘水之西資水之東衡州之北敷淺原地志豫章郡歴陵縣南有傅昜山師古曰傅音敷昜音陽今江州徳安縣愽陽山也在廬山之西晁氏以為在鄱陽者非是鄱陽又在彭蠡之東今經文止言過九江至于敷淺原不言過彭蠡也故非是然所謂敷淺原者其山甚小而卑惟廬阜最髙且大冝當紀志恐山川之名古今㦯異案江州圗經南康郡志皆言周成王時有匡俗結廬隠居此山之西北後因名其山曰廬山或曰匡山又曰匡廬審如此說則周以前固未甞名廬山安知其初不名敷淺原及既稱廬山之後而舊名得專之扵支麓小阜乎岷山之脉其北一支為衡山而盡於洞庭之西其南一支度桂嶺北經袁筠之地至徳安所謂敷淺原者二支之間湘水間斷自岷至敷淺原論其山脊緜亘道里甚逺今直曰其北一支為衡山亦未也盖岷山之南為沬若水所限東北又限於涪墊大江諸水其岡脊支脉乃遶行而西自西而南至雲南之境又東趨夜郎已四千餘里乃越五溪之尾至湖南為衡山則又二千五百餘里矣其南一支自桂嶺至零陵為九疑山下郴州迤東北而行徑袁州筠州之間筠今瑞也又下為幕阜白藤髙良諸山乃至南康江州之境大為廬山小為傅昜抵于江而止其自桂而來又二千餘里矣其去衡山則信乎為湘水所隔而不通也合黎山在張掖縣西北亦名羌谷即今甘州路也弱水亦在其地寰宇記云合黎水一名羌谷鮮水案隋志不云亦名羌谷惟寰宇記有此名又以為水不以為山恐言山則獨名合黎言其下水則兼名羌谷也漢志有羌谷水流沙在沙州西八十里即今江肅省沙州路也案五代史晉天福三年髙居誨使于闐還記其山川云自靈州過黄河三十里始渉沙入党項界曰細腰沙神樹沙至三公沙自此沙行四百餘里至黒堡沙沙尤廣自甘州西始渉磧磧無水西北五百里至肅州渡金河出玉門闗至𤓰州沙州𤓰州南十里鳴沙山冬夏殷殷有聲如雷云禹貢流沙也又東南十里三危山云三苗之所竄也又案山水皆原扵西北先天卦位艮西北兊東南故水聚東南而尾西北山聚西北而尾東南所謂山澤通氣也黑水出犍為郡南廣縣汾闗山犍音乾犍為故夜郎國也黒水地志名符黒水犍為今敘州䓁處宣撫司所轄馬湖路富順州長寧軍䓁處地也今嘉定府亦有犍為縣唐樊綽云西夷之水南流入于南海者凡四曰區江曰西珥河曰麗水曰瀰渃江皆入于南海其曰麗水者即古之黒水也三危山臨峙其上渃字字書所無惟唐李華弔古戰塲文中有此一字而讀者無定音寰宇記永江軍導江縣下有此字音如夜反然非瀰渃也程氏禹貢圗皆作瀰諾恐蔡傳誤書言為三點當従程本程氏云唐樊綽咸通中従辟安南親行交阯得其水道曲折載之蠻書其大川南流而入于南海者四西珥河與蘭倉江合一也麗水與瀰諾江合二也新豐川合勃弄諸水三也唐蒙所見盤江四也其謂麗水者綽指言其水正為黒水而邏些城北有山即三危山也四水與蔡傳同異西珥河者却與漢志葉榆澤相貫葉榆属漢益州郡又漢滇池即葉榆之地武帝初開滇巂時其地古有黒水舊祠滇音顛滇池縣地志云属益州郡武帝元封二年開故滇王國也滇池澤有黒水祠巂先橤反滇國今雲南行省所管地也其地在蜀之正西東北距宕昌不逺宕昌即三苗種裔北史云宕昌羌者其先盖三苗之𦙍其地東接中華西通西域南北數千里孟津今孟州河陽縣亦名富平津河陽孟之倚縣古書多作盟津盟亦音孟寰宇記云或謂之富平津又謂之小平津洛汭在河南府鞏縣之東河南即古洛陽山再成曰伾爾雅云山再成英注云兩山相重書云至于大伾疏云山上有一山重累者名伾張揖鄭𤣥臣瓉云云此皆據爾雅疏文又本漢書注文今通利軍黎陽縣臨河有山盖大伾也此正據瓉說寰宇記云在縣南七里又名青檀山通利今為濬州為大名路支郡修武武徳古懐州二縣武徳今革成臯今汴梁路鄭州汜水縣故虎牢之地也洚水今冀州信都縣枯洚渠也今冀州為真定路支郡信都為倚縣魏郡鄴縣有故大河在東北鄴今彰徳路也古洚瀆自唐貝州經城北入南宫貫穿信都貝今恩州也南宫信都皆冀州属縣自大伾而下垠岸髙扵平地故決齧流移水陸變遷水髙扵地故為隄以障之隄壞則河決此所以有水患也輯纂引方氏云建炎紹興後黄河決入鉅野溢于泗以入於淮者謂之南清河由汶合濟至滄州以入海者謂之北清河是時淮僅受河之半金之亡也河自開封北衛州決而入渦河以入淮一淮水獨受大黄河之全以輸之海濟水之絶于王莽時者今其源出河北温縣猶徑枯黄河中以入汶而後趋海清濟貫濁河遂成虚論矣唐張仁愿所築東受降城唐神龍三年置在雲中之地有東西中三城今皆廢漢水有兩源程氏謂東源正嶓冢導漾東流為漢其西源乃嘉陵江自利州已上數百里不為東流與經不合以漢髙帝置廣漢郡而因誤目嘉陵之水為西漢水也蔡傳則略不及嘉陵水而以東漢為漾之下流西漢為沔之下流二漢復合流東行以入大江也程說非是武當縣北四十里漢水中有洲曰滄浪洲水曰滄浪水縣属均州今為襄陽府路支郡寰宇記謂水在均州鄖鄉縣即漁父棹歌處三澨郢州長壽縣郢州今改安陸府属荆湖北道復州景陵縣復州今為沔陽府屬荆湖北道番陽澤在江之南番音鄱在南康之東南饒州之西北去漢水入江處已七百里自南康至漢陽所蓄之水則合饒信徽撫吉贑南安建昌臨江袁筠龍興南康數州之流饒信徽在江東餘十郡在江西饒有餘干水鄱江水信有弋陽水貴溪水徽之婺源有婺水撫有汝水臨川水吉有吉水贑有章水貢水南安之南康縣有益漿水封侯水良熱水建昌南城縣有盱水臨江之新淦州有淦水袁有冝春水筠瑞州也髙安縣有蜀水龍興富州有豐水南康建昌州有脩水已上諸水下流皆入鄱陽湖入江之處西則廬阜東則湖口皆石山峙立水道狹甚西則廬阜之麓名江基東則湖口之雙石鍾山相去一呼今名唐石渡廬江之北有所謂巢湖今湖在淮西無為州廬江縣北三十五里一名焦湖大江在縣東南百九十里合東匯北匯之文愚謂以巢湖當彭蠡信合東匯北匯之文不如番湖之懸絶然二湖之下均為一江以達于海必竟無中江北江之分也諸家惟知求彭蠡而不知求中江北江蔡傳辨論㝡悉雖未見其的姑亦傳疑而已濟水絳州垣曲縣屬平陽路東出孟州濟源縣属懐孟路寰宇記云濟水在縣西北三里平地而出有二源皆繚以周牆虢公臺在孟州温縣俗名賀酒臺再成曰陶在今廣濟軍西爾雅疏云丘形上有兩丘相重累者名陶丘廣濟軍即今曺州定陶縣也濟陰縣自有菏𣲖亦属曹州合汶水今青州愽興縣今博興州𨽻益都路李賢謂濟自鄭以東貫滑曹鄆濟青以入于海鄭州滎陽郡也𨽻河南行省滑州𨽻大名路曹州𨽻濟寧路鄆州今東平路濟州今濟寧路齊州今濟南路青州今益都路樂史謂今東平濟南淄川北海界有水流入海謂之清河見寰宇記孟州濟源縣下淄川今般陽路也北海今益都路也云實菏澤汶水合流亦曰濟河歴城之西盖五十里而有泉湧出髙或致數尺其旁之人名曰趵突之泉厯城縣今属濟南路趵北角反廣韻云足撃也輯纂音方車反非是濼水音鹿舟之通于濟者曽集濟作齊東阿縣属東平淮水出南陽平氏縣胎簪山平氏縣廢山在今唐州界内地志云淮入海行三千二百四十里地志云鳥鼠山者同穴之枝山也案地志隴西郡首陽縣云禹貢鳥鼠同穴山在西南渭水所出東至船司空入河行千八百七十里不言鳥鼠為同穴之枝山也盧氏之熊耳嵩州盧氏縣也九州之山槎木通道已可祭告案益稷言隨山刋木此言九山刋旅必隨其山而刋之導山是其序也其所行有九莭導岍及岐至于荆山一也壷口雷首至于太岳二也厎柱析城至于王屋三也太行恒山至于碣石四也西傾朱圉鳥鼠至于太華五也熊耳外方桐柏至于陪尾六也導嶓冢至于荆山七也内方至于大别八也岷山之陽至于衡山至于敷淺原九也是蓋施工次第九莭非論山脉也亦非以配九州也九州之川濬滌泉源而無壅遏九州之川非一而其所滌之源有九施工次第因而序焉導弱水一也導黒水二也導河積石三也嶓冢導漾四也岷山導江五也導沇水六也導淮自桐柏七也導渭自鳥鼠同穴八也導洛自熊耳九也亦是施工九起非以配九州也九州之澤已有陂障而無決潰九州之澤非一其雲土夢作乂及大陸既作皆可耕治不待陂障餘為陂障者亦有九焉雷夏既澤一也大野既豬二也彭蠡既豬三也震澤厎定四也九江孔殷五也滎波既豬六也導菏澤七也被孟豬八也至于豬野九也此特言其已有陂障者耳非若職方氏分為九州澤藪之比也如周大司徒以土冝之法辨十有二土之名物以任土事十二土分野十二邦各有所冝也如周大司徒辨十有二壤之名物以致稼穡致當作教注云壤亦土也以萬物自生則言土以人所耕而樹藝則言壤錫之土以立國錫之姓以立宗左傳所謂天子建徳因生以賜姓胙之土而命之氏輯纂引林氏云如契封扵商賜姓子稷封扵邰賜姓姬有土有姓昔固有矣至是徧錫之唐陸淳春秋纂例云姓則百代不易唯天子廼得特賜姓故曰因生以賜姓舜賜禹姓曰姒伯夷曰姜武王賜胡公姓曰媯是也又曰胙之以土而命之以氏舜賜禹曰夏伯夷曰吕是也又天子之子例以謚配字僖伯文伯宣叔襄仲之類是也而後代子孫因以其字為氏示所出不亂所謂别子為祖也自餘則㦯以官以邑為其氏族以自分别凡此皆如近代之論房也鄭夾漈氏族略云三代之前姓氏分而為二男子稱氏婦人稱姓扵文女生為姓故姓之字多従女如姬姜嬴姚姒媯姞妘婤姶㚰嫪之類是也凡言姓氏皆本左傳然左氏所明者因生賜姓胙土命氏及以字以官以邑五者而已今則不然論得姓受氏者三十二類一曰以國如虞夏商周魯衛齊宋也二曰以邑如崔盧鮑晏臧費栁楊也三曰以鄉如裴陸龎閻也四曰以亭如麋采歐陽也五曰以地無封土以地居命氏如傅說潁考叔桐門右師禄里先生介之推燭之武之類六曰以姓如姚墟嬴濵姬水姜水故曰因生以賜姓也七曰以字如鄭子駟之孫曰駟帶宋子魚之孫曰魚莒八曰以名如魯公子展之孫曰展無駭展禽鄭公子豐之孫曰豐卷豐施王子朝之後為朝伍員之後為貟九曰以次如伯仲叔季是也十曰以族如丁氏癸氏祖氏禰氏第五氏第八氏之類十一曰以官如司馬司空庾氏錢氏是也十二曰以爵如皇王公侯公乘公士是也十三曰以㓙徳如黥氏梟氏十四曰以吉徳如冬日氏老成氏十五曰以技如巫屠匠卜豢龍御龍十六曰以事如后緡逃出自竇為竇田千秋乗小車為車十七曰以諡如文武哀繆荘僖康宣是也十八曰以爵氏如王叔王孫公子公孫是也十九曰以國係如唐孫氏滕叔氏是也二十曰以族係如季孫氏叔孫氏是也二十一曰以名氏如士季氏伍參氏韓嬰氏臧㑹氏是也二十二曰以國爵如夏侯氏息夫氏白侯氏是也二十三曰以邑係如原伯氏申叔氏沂相氏是也二十四曰以官名如師延氏史晁氏吕相氏侍其氏是也二十五曰以邑諡如苦成氏二十六曰以諡氏如臧文氏二十七曰以爵諡如成公氏成王氏是也二十八曰代北複姓二十九曰闗西複姓三十曰諸方複姓皆夷狄二字姓也三十一曰代北三字姓如侯莫陳是也三十二曰代北四字姓如自死獨膊是也右鄭氏之說甚詳具載通志略姑莭其目以明姓氏之多門焉甸服畿内之地五百里者王城之外四面皆五百里也分甸服五百里而為五等古者以長三百歩為一里一歩六尺計長一百八十丈也王城四面皆五百里是穿心一千里而王城亦在其中矣孟子所謂天子之田方千里周禮所謂方千里曰王畿皆謂是也以開方法緫計之則為方百里者一百箇也以此百箇百里分為五等貢賦則在内四箇百里納緫次外十二箇百里納銍又次外二十箇百里納秸又次外二十八箇百里納粟又㝡外三十六箇百里納米侯服者甸服外四面又各五百里也分侯服五百里為三等若併甸服是穿心二千里也侯服之地開方計之為方百里者三百分為三等則四十箇百里為采地五十二箇百里為男邦二百丹四箇百里為諸侯綏服者侯服外四面又各五百里也分綏服五百里為二等若併侯甸是穿心三千里也綏服之地開方計之為方百里者五百分為二䓁則在内三百里為二百七十六箇百里揆文教在外二百里為二百二十四箇百里奮武衛要服者綏服外四面又各五百里也分要服五百里為二等若併綏侯甸是穿心四千里也要服之地開方計之為方百里者七百分為二等則在内三百里為三百九十六箇百里為夷地在外二百里為三百丹四箇百里為蔡罪之地蔡素達反荒服者要服外四面又各五百里也分荒服五百里為二䓁若併要綏侯甸是穿心五千里也荒服之地開方計之為方百里者九百分為二等則在内三百里為五百一十六箇百里為蠻地在外二百里為三百八十四箇百里為流罪之地也合五服五千之地緫為方百里者二千五百除山川丘陵之類三分去一之外可建百里之國一千六百餘然禹㑹諸侯於塗山執玉帛者萬國盖并蠻夷君長言之舉大數耳堯都冀州冀之北境并雲中涿易亦恐無二千五百里藉使有之亦皆沙漠不毛之地而東南財賦之地則反棄扵要荒以地勢考之殊未可曉案禹迹圗堯都平陽今平陽路也甸服五百里其北則石州太原也南則陜州虢州也東則澤州潞州也西則鄜州坊州也侯服五百里北則朔州也南則鄧州之北也東則濮州也西則涇州也綏服五百里北則雲州之北也南則房州也東則淄州也西則秦州也要服五百里北則在大漠之北南則在江陵之南東則登州西則熈州荒服五百里南則至湘潭而未及衡山東逾海西逾積石而及流沙北則去雲中一千二百里矣凢此所指皆以里數至其境爾周制九畿亦五百里而王畿不在其中併之則四方相距為萬里盖倍禹服之數也相距萬里是百箇百里開方得萬箇百里禹服止有二千五百箇一百里僅當周服四分之一乃是周制三倍扵禹也漢地志亦言東西九千里南北一萬三千里武帝攘却胡越開地斥境南置交阯北置朔方之州東西九千三百二里南北萬三千三百六十八里甘誓甘地名有扈氏國之南郊也在扶風鄠縣寰宇記云秦改為鄠今縣有扈鄉復有扈谷亭又有甘亭是也嚴其坐作進退之莭周禮大司馬中春教振旅以教坐作進退疾徐疏數之莭中冬教大閱羣吏各帥其民質明弊旗乃陳車徒如戰之陳皆坐羣吏聽誓于陳前斬牲以左右徇曰不用命者斬之鼓人三鼓羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆行鼓進鳴鐲車驟徒趋及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且郤及表乃止坐作如初此可見坐作進退之莭矣弊仆也夏有觀扈商有姺邳周有徐奄杜預左傳注云觀國今頓丘衛縣觀陸氏音館姺邳二國商諸侯邳今下邳姺西典反徐奄二國皆嬴姓六卿六鄉之卿也案周禮鄉大夫每鄉卿一人六鄉六卿有事出征則各率其鄉之一萬二千五百人而属扵大司馬所謂軍將皆卿也司馬法曰王國百里為郊六鄉在焉二百里為州六遂在焉每鄉萬二千五百家卿一人長之每遂亦萬二千五百家中大夫一人長之每軍萬二千五百人六鄉為正軍六遂為副軍六軍共計車千乘每乘甲士三人歩卒七十二人通七十五人則千乘該七萬五千人也夏官司馬云王六軍大國三軍次國二軍小國一軍軍将皆命卿三正迭建其來久矣舜協時月正日亦所以一正朔也子丑之建唐虞之前當已有之朱子曰天開扵子地闢扵丑人生扵寅故斗柄建此三辰之月皆可以為嵗首又語録云邵子皇極經世書一元統十二會一萬八百年為一㑹當初一萬八百年而天始開在子㑹又一萬八百年而地始成在丑㑹又一萬八百年而人始生在寅㑹邵子扵寅上方注一開物字子丑寅皆天地人之始故皆可以為正左射以菆菆音騶矢之善者折馘折其左耳詭御孟子作詭遇謂不正而與禽遇也禮曰天子巡狩以遷廟主行曽子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣疏云遷廟主新遷廟主也齊車金路也主木主也天子一尺二寸有遷主者以幣告神而不將幣以出行即埋之兩階之間無遷主者加之以皮圭告扵祖禰遂奉以出祖左陽也社右陰也禮云建國之神位右社稷而左宗廟秋官司厲孥男子以為罪𨽻周禮孥作奴鄭司農云謂坐為盜賊而為奴者輸於罪𨽻五子之歌窮國名羿窮國之君也左氏襄四年魏綘曰昔夏之方衰也后羿自鉏遷于窮石因夏民以代夏政杜預注云鉏羿本國名史記正義引括地志云故鉏城在滑州衛城縣東十里晉地記云河南有窮谷本有窮氏所遷也或曰羿善射者之名說文一曰射師羿羽之羿風謂箭乘風而疾也賈逵說文羿帝嚳射官故其後善射者皆謂之羿有窮之君亦善射故以羿目之也左傳注云羿有窮君之號小弁之詩父子之怨周幽王娶於申生太子冝臼後得襃姒而惑之信其讒黜申后逐冝臼冝臼之傳知其無罪而憫之故述其情以作小弁之詩言其自怨慕親之意也後世序詩者每篇皆有小序三百五萹之詩堯初為唐侯後為天子都陶故曰陶唐堯授舜舜授禹皆都冀州寰宇記云帝堯始封扵唐在太原郡平晉縣北二里有故唐城堯所築也及為天子都平陽平陽即太原注䟽六堯都平陽舜都蒲坂禹都安邑相去不盈二百里皆在冀州典猶周之六典則猶周之八則周禮天官云一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典又云八則治都鄙一曰祭祀二曰法則三曰廢置四曰禄位五曰賦貢六曰禮俗七曰刑賞八曰田役百二十斤為石三十斤為鈞鈞與石五權之最重者也五權者銖兩斤鈞石也黄鍾律管容千二百黍重十二銖兩之為兩故一兩重二十四銖十六兩為斤三十斤為鈞四鈞為石又案法度之制始扵權權與物鈞而生衡衡運生規規圎生矩矩方生繩繩直生準是權衡者又法度之所自出也見前漢律厯志權與物鈞者孟康六謂錘與物鈞所稱適停則衡平也繩直生準者韋昭云立凖以望繩以水為平也䂓矩繩權衡謂之五則準繩連體權衡合徳百工繇焉以定法式輔弼執玉以翼天子故詩云秉國之鈞四方是維此法度之所以自出也𦙍征仲康始即位即命𦙍侯以掌六師次年方有征羲和之命經世書以征羲和為仲康元年事則是即位之次年也古者逾年改元羿廢太康而立仲康然其簒也乃在相之世左傳注云禹孫太康淫放失國夏人立其弟仲康卒子相立羿遂代相如漢文帝入自代邸即皇帝位夜拜宋昌為衛将軍鎮撫南北軍之類漢髙后崩吕禄吕産欲作亂絳侯周勃誅之大臣迎立代王王至代邸即天子位是為文帝其夕入未央宫夜拜宋昌為衛将軍鎮撫南北軍漢衛宫之軍在南為南軍京城之軍在北為北軍南軍者衛尉寺郎衛期門府羽林府都尉是也北軍者中尉府城門校尉及八校尉是也仲康遭夷羿廢立之際權本在羿而危疑未定文帝承大臣迎立之時尊卑已定而權已歸己則仲康之命𦙍侯也難文帝之命宋昌也易由是觀之仲康殆勝於文帝逺矣禄産尚存文帝未必䏻有為也官以職言師以道言非師保之師如承以大夫師長之師辰日月㑹次之名房所次之宿也集漢書作輯集輯通用言日月㑹次不相和輯而掩蝕於房宿也案唐志日蝕在仲康即位之五年一行日度議曰太康十二年戊子嵗冬至應在女十一度書曰乃季秋月朔辰弗集于房劉炫曰房所舎之次也集㑹也㑹合也不合則日蝕可知或以房為房星知不然者且日之所在正可推而知之君子慎疑寧當以日在之宿為文近代善歴者推仲康時九月合朔已在房星北矣案古文集與輯義同日月嘉㑹而隂陽輯睦則陽不疚乎位以常其明隂亦含章示冲以隠其形若變而相傷則不輯矣房者辰之所次星者所次之名其揆一也新厯仲康五年癸巳嵗九月庚戌朔日蝕在房二度炫以五子之歌仲康當是其一肇位四海復脩大禹之典其五年羲和失職則王命徂征虞􅒠以為元年非也古者日蝕則伐鼓用幣以救之春秋傳曰惟正陽之月則然餘則否莊公二十五年夏六月辛未朔日有食之鼓用牲于社非常也唯正月之朔慝未作日有食之扵是乎用幣于社伐鼓于朝注云正月正陽之月夏之四月也周禮庭氏救日之弓矢庭氏掌射國中之天鳥若不見其鳥獸則以救日之弓與月之矢夜射之注云日月之食陰陽相勝之變也扵日食則射太陰月食則射太陽朱子詩傳云日月一嵗凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔日月之合東西同度南北同道則月揜日而日為之食望而日月之對同度同道則月抗日而月為之食是皆有常度矣王者修徳行政䏻使陽盛足以勝陰隂衰不䏻侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相對者所以當食而不食也若國無政君不用善則隂盛陽微當食必食雖曰有常度而實為非常之變矣政典先王政治之典籍也輯纂引陳氏云政典有司馬掌邦政可據𦙍侯為大司馬故引之玩其辭意真誓軍旅之辭諸侯敵愾愾苦愛反左氏文公四年寗武子曰諸侯敵王所愾而獻其功注云敵猶當也愾恨怒也書蔡氏傳旁通卷二
