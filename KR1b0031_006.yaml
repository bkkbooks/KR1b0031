body:
  text: 書蔡氏傳旁通卷六上元陳師凱撰周官按此篇與今周禮不同如三公三孤周禮皆不載周禮未嘗不言公孤之名但不載其專職耳如位次之髙下未嘗不顯然可考也如云王之三公八命出封加一等則九命為伯是舉朝無尊於此者而外朝之位三公在前三槐之下孤卿大夫在左公侯伯子男在右是惟三公可以面天子天子之所禮也孤則亞於三公故其位與諸侯之公相對六卿莫敢先也其六卿之職曰太宰卿一人大司徒卿一人餘皆然其摯孤執皮帛卿執羔則卿亞於孤又可見矣但公孤之任坐而論道者也六卿之職作而行之者也周公六典專為治事而設故以公孤為鄭重而未及言之非周禮與周官二書逈絶也或又謂師氏即太師保氏即太保然以師保之尊而反屬司徒之職亦無是理也師氏僅中大夫保氏乃下大夫豈有三公之尊而資級如是之卑邪周禮注謂周召兼此官必無是理案師氏以三德三行教國子保氏以六藝六儀教國子猶後世國子先生之儔耳故列在司徒之屬周禮六服諸侯有一歲一見者二歲一見者三歲一見者秋官大行人云侯服歲一見甸服二歲一見男服三歲一見采服四歲一見衛服五歲一見要服六歲一見九州之外謂之蕃國世一見注云九州之外夷服鎮服蕃服也周禮非聖人不能作也意周公方條治事之官而未及師保之職書未成而公亡其間法制有未施用故與此異而冬官亦闕要之周禮首末未備周公未成之書也惜哉新安陳氏曰周禮乃周公擬議未全未行之書周官則成王建置訓迪已施行之書也今只當據周官以解周官其與周禮未吻合處姑略之可也王莽時劉歆置周禮博士司空篇亡購千金不得以考工記充之臨川俞庭春曰司空之篇為逸書漢人以考工記附益之相傳之久習以為然雖有巨儒碩學不復致思研慮後世遂以考工之事為六官之一司空所掌日漸訛誤併與其官廢蓋嘗紬繹是書伏而讀之司空之篇實未嘗盡亡也六官之屬誠有顚倒錯亂而未盡正者編次而辨正焉周官三百六十未聞有溢貟也小宰曰其屬六十則六十之外皆羡矣周禮得於秦火之後冝少不冝羡今天官之羡者三地官之羡者十有六春官之羡者九夏官之羡者九秋官之羡者五從其羡而求之冬官不皆亡矣又云詩之逸不可復考獨周禮司空有可得言者反覆之於經質之於書驗之於王制皆有可以是正焉者而司空之篇實雜出於五官之屬且因司空之復而五官之訛誤亦遂可以類考一一摘其要者議之誠有犂然當於人心者不啻寶刀大玉之得而鄆歡龜隂之歸也庭直也釋詁文六服侯甸男采衛并畿內為六服也禹貢五服通畿內周制五服在王畿外也周禮又有九服侯甸男采衛蠻夷鎮蕃與此不同新安陳氏曰巡侯甸即六服而略言之也六服承德即九服而以內五服并王畿言之也內五服九州內外五服九州外以內五服並畿內為六正與侯甸男邦采衛之辭合略外四服耳無不同也周制無萬國大言之耳周禮王畿千里外有九服每服五百里則每方五九四千五百合之為九千里通王畿為方萬里以開方法計之方千里者為方百里者百則方萬里者為方百里者萬矣以百里為諸侯之國率之是九服之內可容萬國然周初會於牧野者八百諸侯王制所計亦止千七百七十三國故孔氏以此為大言之非實數也然史官例以萬邦萬國言一統之廣其來久矣立始辭也三公非始於此立為周家定制則始於此也新安陳氏曰文王時太公已為太師武王時召公已為太保是三公非自成王始立也葉氏曰成王以周召為師保而太傅無聞周公沒召公仍為保而不聞設師傅蓋難之也陳傅良曰周召以師保為冢宰是卿兼三公也顧命自同召太保奭以下皆卿也是時召公為保兼冢宰芮伯為司徒彤伯為宗伯畢公為司馬皆是以三公兼之衛侯康叔為司冦毛公為司空審如是則三公多是六卿兼之但其人足以兼公則加其公之職位無其人則止為卿而已三公三孤皆無其人則闕焉而已而六卿自若也要之成周以三公三孤待非常之德故曰官不必備惟其人隂陽以氣言道者隂陽之理恆而不變者也易曰一隂一陽之謂道是也論者講明之謂經者經綸之謂燮理者和調之也非經綸天下之大經參天地之化育者豈足以任此責古者王佐之才上有以參天地之常道下有以修國家之常典惟其論道則講明精至必能推天而達之人而天下之常經不紊矣惟其燮理隂陽則調和清穆必能存心以事天而天地之常道不變矣一隂一陽之謂道隂陽氣也所以一隂一陽者道也道謂太極之理也元亨利貞萬古周流而不息故曰恆而不變者也其不變者此理而已若論隂陽二氣茍燮理之不至則有常者不能不為之變日月之薄食星緯之錯行山川之崩竭年榖之凶荒札瘥之夭折皆隂陽之變耳如朝廷之上三公得人則必講論精密內有以修其身上有以啓其君經綸有要燮調有道在造化則使三光全而四時和在國家則使三綱止而九法敘而後無愧三公之職焉然豈可以易言哉故曰惟其人而已天地以形言化者天地之用運而無迹者也易曰範圍天地之化是也𢎞者張而大之寅亮者敬而明之也天地之化運而無迹如四時之行六氣之運皆造化之妙用不言而示人者也範模也圍匡郭也聖人範圍天地之化蓋參贊之極功能使造化囿於聖人精神心術之中如物之得其模範匡郭而不違也張而大之如天地得其位萬物得其育也敬而明之如欽若昊天以授人時在璣衡以齊七政是也天官卿治官之長天子之相也百官異職管攝使歸於一四海異宜調劑使得其平吕氏曰三公三孤天子所與調精祲之原而無所治者也統萬事而分治之則六卿之職六卿者萬事之綱也冢宰管攝百官非官官而控制之自百而歸六自六而歸一所操至簡也所調劑者非人人而稱量之也大與之為大小與之為小所居至易也明乎簡易之道相業無餘藴矣馴擾兆民吕氏曰擾者馴習而熟之拊摩而入之畜飬而寬之之謂新安胡氏曰擾者順其自然而導之掌刑不曰刑而曰禁者禁於未然也陳氏曰刑曰邦禁此初設刑之美意禁民使不為惡而非以虐民也按周禮冬官則記考工之事與此不同蓋本闕冬官漢儒以考工記當之也五峯胡宏皇王大紀曰周官司徒掌邦教敷五典者也司空掌邦土居四民者也世傳周禮闕冬官愚考其書而質其事則冬官未嘗闕也乃劉歆顚迷妄以冬官事屬之地官耳俞庭椿曰司空古官也舜以水土命禹而共工則咨垂然則司空之官實重而百工之事無與焉周官曰掌邦土居四民時地利太宰云六曰事典以富邦國以任百官以生萬民小宰云六曰事職以富邦國以養萬民以生百物王制尤詳焉曰司空執度度地居民山川沮澤時四時量地逺近興事任力至民咸安其居樂事勸功尊君親上然後興學凡此皆著見於經而粲然可據者也後人徒以司徒之為地官土地之事地官之類也故司空之屬皆汨乎其中蓋自大司徒之職已皆訛誤大半皆司空事也土地之圖土會之法土宜之法土均之法土圭之法大司馬九畿之籍小司徒會萬民之卒伍乃均土地乃經土地等章天官以九職任萬民皆司空事也百工特司空九職之一耳冢宰相天子統百官乃併數之為六者綱在網中也吕氏云冢宰列於六卿綱固在網中而首非處身之外也乾坤之與六子並列於八方康節曰乾坤縱而六子橫蓋先天圓圖乾南坤北離東坎西兌東南震東北巽西南艮西北乾坤為六卦之父母比於六卿之冢宰六卦為乾坤之男女比於五官也六年一朝會京師十二年王一巡狩六年一朝典周禮不合十二年一巡狩與周禮大行人合考制度猶舜之協時月正日同律度量衡等事也大行人云王之所以撫邦國諸侯者歲遍存三歲遍眺五歲遍省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聽聲音十有一歲達瑞節同度量成牢禮同數器修法則十有二歲王巡狩殷國按此則制度已預飭於前至巡狩特考之若曰言語諭歟辭命協歟書名諭歟聲音雅歟瑞節達歟度量同歟牢禮成歟數器同歟法則修歟凡此者或否歟諸侯各朝方嶽者猶舜之肆覲東后也孟子趙氏注曰太山明堂周天子東巡狩朝諸侯之處齊宣王欲毁之漢時遺址尚在郊祀志云泰山東北址古時有明堂處是也大明黜陟者猶舜之黜陟幽明也林氏曰即王制所謂不敬者君削以地不孝者君黜以爵有功德於民者加地進律是也疏數異時繁簡異制帝王之治因時損益者可見矣吕氏曰諸侯既親承德意於天子天子復親考制度於諸侯禮樂刑政斯四達而不悖矣是制也嘗一見於虞書後千餘年復出於此驗其疏數而世之升降事之繁簡輿衛之多寡用度之豐約與夫成王觀會通以行典禮者皆可得而推矣林氏曰此皆斟酌舜事行之舜五載一巡狩此十二年何也文中子曰舜一歲而巡四嶽兵衛少而徴求寡也以是觀之則周時兵衛日多徴求日衆故不能五年而以十二年也鄭子産鑄刑書見左傳昭公六年自唐以前治罪科條止於律令而已鄭夾漈通志略云舊律其文起自魏文侯李悝撰諸國法著法經六篇蕭何定律益三篇合為九篇叔孫通益律所不及十八篇張湯越宫律二十七篇趙禹朝律六篇合六十篇又漢時決事為令甲以下三百餘篇世有增損馬融鄭康成諸儒章句十有餘家數十萬言凡斷罪所當由用者合二萬六千二百七十二條君陳天子之國五十里為近郊王城方九里謂之王國國外曰郊五十里為近郊百里為逺郊六鄉之地也然則頑民亦在六鄉之數矣物之精華固無二體然形質止而氣臭升止者有方升者無間則馨香者精華之上達者也至治之極馨香發聞感格神明不疾而速凡昭薦黍稷之苾芬是豈黍稷之馨哉所以苾芬者實明德之馨也至治舉其成明德循其本非有二馨香也物之精華固無二體者精華不離於物也形質指犧牲粢盛也止置於此而不動者也氣臭升者燔燎羶香達於彼者也止者有方言物在爼豆有方所也升者無間如臭隂達於淵泉臭陽達於牆屋所達無界限也郊特牲云周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌是也至治之極馨香發聞言至治之格天亦如氣臭之達於上下也聖賢以德為政故至治不離於德假黍稷以薦馨非黍稷之氣可以感神明也蓋有明德本於內至治成於外上帝監此馨香之德已久矣今以黍稷之薦感於神明雖有黍稷之氣實在於明德之馨也明德之馨至治之馨與黍稷之氣合而為一故曰非有二馨香也至治之有明德猶黍稷之有氣臭至治之馨在明德黍稷之馨在氣臭皆精華之可以上達者也然氣臭與黍稷非有二體明德與至治亦非有二體黍稷之馨至治之馨尤不可離而二之也為人上者不恃其黍稷之有氣臭而恃其至治之有明德則精華達於上至治成於下神明尚可感何有頑民而不可化哉職業有修與不修當簡而別之則人勸功進行義之良以率其不良則人勵行愚按多士篇商民自言夏迪簡在王庭有服在百僚此意蓋怨周人之不用已也成王言豫一人惟聽用德今命君陳曰簡厥修進厥良實成王欲踐舊日之言所以簡拔有德而置之在庭百僚也顧命冢宰第一召公領之正義云髙官兼攝下司者漢世以來謂之領此言召公本居太保之位又兼領太宰之職也司徒第二芮伯為之芮姬姓之國今同州朝邑縣芮鄉古芮國也時芮伯以諸侯入王朝為大司徒宗伯第三彤伯為之王肅云彤似姓之國時彤伯以諸侯入王朝為大宗伯司馬第四畢公領之畢公名髙文王之庶子也武王封之於畢在今奉元路咸陽縣時畢公以成王之叔父繼周公為東方諸侯之伯則亦必繼周公為太師又兼領大司馬之職也此後康王又命保釐東郊亦所以繼周公也而康王稱之曰父師則在太師之位無疑矣司寇第五衛侯為之左傳定四年云康叔為司寇而此書列在第五與周禮秋官司寇第五同次故因可推此六人為六卿也詳見康誥司空第六毛公領之毛公名鄭亦文王之庶子時以諸侯入王朝為太傅兼領大司空司空為右官之長在諸侯惟有司徒司馬司空立政亦云然王朝既以冢宰為第一而太保領之則是六卿之冢宰猶三卿之司徒也餘司馬司空故亦以三公領之畢公既繼周公為太師則此毛公當任太傅矣正義云太保是三公官名畢毛又亦稱公故知此三人是三公也此六卿次第蔡傳皆據孔傳成文又案周公位太師時為冢宰周公既沒召公元老當居冢宰而太保則如故畢公以太師領司馬蓋太公望嘗以太師領司馬故畢公居此位不為卑兼分掌東伯則與召公實相並云威者有威可畏儀者有儀可象舉一身之則而言也蓋人受天地之中以生是以有動作威儀之則西山真氏甲記云左氏傳劉康公曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也朱子云這幾個字自古聖賢上下數千年喚得都一般必竟是聖學傳授不斷故能如此至春秋時其傳猶未泯如劉康公論人受中以生其窮理甚精真氏云按民受天地之中以生故凡動作禮義威儀皆有自然之準則過之非中也不及亦非中也所以然者以其有定命也命出於天一定而不可易雖欲違之得乎動作以身言禮義以理言威儀以著於外者言又蒸民之首章曰天生蒸民有物有則朱子曰天生衆民有是物必有是法蓋自百骸九竅五藏而達之父子君臣夫婦長幼無非物也而莫不有法焉如視之明聽之聰貌之恭言之順以至君臣有義父子有親之類皆是也孔子所謂知幾下繫云子曰知幾其神乎幾者動之微吉之先見者也子思所謂謹獨中庸章句云幽暗之中細微之事迹雖未形而幾則已動人雖不知而已獨知之是以君子於此尤加謹焉周子所謂幾善惡通書云幾善惡朱子云幾者動之微善惡之所由分也蓋動於人心之微則天理固當發見而人欲亦已萌乎其間矣語録云天理人欲之分只爭些子故周子只管説幾字然辨之又不可不早故橫渠每説豫字又云通書極力説箇幾字儘有警發人處近則公私邪正逺則廢興存亡只於此處看破便斡轉了綴衣幄帳也王氏曰綴衣其衣連綴帷幄之屬在旁曰帷在上曰幕四合象宫室曰幄幄上承塵曰帟羣臣既退徹出幄帳於庭正義云王先在幄帳中發命訖反寢處遂徹出之將欲為死備也庭路寢之庭也喪大記云疾病君徹懸東首於北墉下懸樂懸也鐘磬之在簨簴者天子宫懸諸侯軒懸非謂幄帳也墉音容記一作牖於其明日王崩皇極經世書成王在位三十七年起丙戌盡壬戌成王十三即位夀五十也唐穆敬文武以降閹寺執國命易主於宫掖而外庭猶不聞唐穆宗中尉梁守謙王守澄所立也敬宗為蘇佐明所弒王守澄復迎立文宗文宗以敬宗子成美為太子宦者以為立不由己廢之而立潁王瀍是為武宗武宗疾篤子幼宦官定策禁中立憲宗子怡是為宣宗宣宗崩宦者立鄆王溫是為懿宗懿宗崩宦官立其少子儼是為僖宗僖宗有疾宦者立夀王傑為太弟是為昭宗昭宗遇弒朱全忠立幼子祚為哀帝而唐遂滅伯相召公也召公以西伯為相時分天下為左右以三公領之曰二伯樂記云五成而分陜周公左召公右蓋自陜以東周公主之自陜以西召公主之故召公為西伯周公卒畢公繼為東伯也狄人設階蓋供喪役而典設張之事者也據禮記狄人設階蓋設梯升屋號復之事也此設黼扆綴衣是典設張之事也設黼扆帳幄如成王生存之日正義云經於四座上言設黼扆綴衣則四座皆設也先施屏風於前又施帳幄於上愚謂四座雖當皆設幄帳惟黼扆當止設户牖間一處餘三座不當設也此平時見羣臣覲諸侯之坐此據古注而古注則據周禮司几筵云大朝覲設黼依加次席黼純左右玉几故知此亦然也天子之席三重周禮文也正義云此四座皆言敷重但舉其上席而言知其下更有席也牖間之坐即周禮扆前之座篾席之下二重其次是繅席畫純其下是莞筵紛純其餘三座禮無其事可推其為三重但不知其下二重是何席耳篾席桃竹枝席也此據古注也竹枝字當乙周禮春官司几筵云加次席黼純注云次席桃枝席有次列成文者爾雅云桃枝四寸有節疏云竹相去四寸有節者名桃枝戴凱之竹譜云桃枝堪為簟又竹記云桃枝竹皮滑可為席南越志云出南海縣緣海而生黼白黑雜繒雜言白黑二色相雜也考工記云白與黑謂之黼純緣也純之尹反緣于絹反周禮吉事變几凶事仍几司几筵文也吉事祭禮凶事喪禮也變更也旦夕聽事之坐亦據古注正義云西序之坐在燕饗坐前以其旦夕聽事重於燕飲故西序為旦夕聽事之坐底席蒲席也正義引王肅云底席青蒲席也綴雜彩正義云綴者連綴諸色席必以彩為緣故以綴為雜彩也文貝有文之貝正義云貝者水蟲取其甲以飾器物釋魚於貝之下云餘蚳黃白文餘泉白黃文李巡曰貝甲以黃為質白為文彩名餘蚳以白為質黃為文名餘泉有文之貝謂此也養國老饗羣臣之坐正義云案燕禮云坐於阼階上西嚮則養國老及饗與燕禮同故知之豐席筍席也筍字必誤下文西夾南嚮自有筍席此不應又訓豐席為筍席也據古注訓豐席為莞此筍席亦當為莞席傳寫誤也正義云釋草云莞苻離詩云下莞上簟莞周禮音官爾雅疏云本草白蒲一名苻離楚謂之莞斯干鄭箋云莞小蒲也莞蒲一草之名而司几筵有莞筵蒲筵則蒲有大小之異為席有精有粗故得為兩種席也爾雅疏又云鼠莞纎細似龍須可以為席親屬私燕之坐正義云夾室之坐在燕饗坐後是隱映之處親屬輕於燕饗故夾室為親屬私燕之坐也筍席竹席也古注云筍蒻竹正義云釋草云筍竹萌孫炎曰竹初萌生謂之筍是筍為蒻竹取筍竹之皮以為席也牖户之間謂之扆爾雅釋宫文也郭璞云窗東户西也天子負扆朝諸侯如上文牖户之間是以地言此又云負扆者是以器言也正義云禮有斧扆形如屏風畫為斧文置於扆地因名為扆故先儒相傳黼扆在户牖之間愚謂據爾雅則扆自是户牖間地名以屏置其地因亦名屏為扆以所畫之色言則曰黼扆以所畫之形言則曰斧扆以天子所倚立而言則曰負扆以天子之位而言則曰當扆而立赤刀赤削也考工記云築氏為削長尺博寸合六而成規注云今之書刀也正義云謂之赤刀者其刀必有赤處又云赤刀者武王誅紂時刀赤為飾周正色也文武之訓亦曰大訓以前成王顧命言嗣守文武大訓琬琰圭名見考工記琬圭琰圭皆長九寸東齋陳氏云琰有鋒芒琬無鋒芒夷常也大玉常玉皆玉璞未琢故不以禮器名之球鳴球也益稷傳云鳴球玉磬名也正義云玉色如天故曰天球河圗伏羲時龍馬負圗出於河一六位北二七位南三八位東四九位西五十居中者謂馬負圗必有文在其背不應別有一物想如今之點數具於馬背毛色耳時必著之竹帛謂之河圗也一六位北北方者水之數一生水六成水也二七位南南方者火之數二生火七成火也三八位東東方者木數三生木八成木也四九位西西方者金數四生金九成金也五十居中中央者土之數五生土十成土也易繫辭云河出圗洛出書聖人則之孔安國劉歆皆言伏羲則河圗而畫八卦八卦之位其橫圗則太極生兩儀兩儀生四象四象生八卦八卦之次乾一兊二離三震四巽五坎六艮七坤八其圎圗位次則乾南坤北離東坎西兊東南震東北巽西南艮西北所謂四象者老陽金象居一含九少隂木象居二含八少陽火象居三含七老隂水象居四含六然以此象數考之河圗則火金易位不為吻合故劉牧以洛書九宫四十五數為河圗而以此河圗五十五數為洛書蔡西山朱夫子皆不之從以十為河圗九為洛書其詳説具啓蒙矣自來先儒傳説伏羲則河圗而畫八卦神禹則洛書而敘九疇夫子於大傳獨載五十有五之數而不及四十有五之數則足證五十五者果河圗也天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也朱子曰此一節夫子所以發明河圗之數也天地之間一氣而已分而為二則為隂陽而五行造化萬物終始無不管於是焉故河圗一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中蓋其所以為數者不過一隂一陽一竒一偶而已陽數竒故一三五七九皆屬乎天隂數偶故二四六八十皆屬乎地積五竒而為二十五積五偶而為三十合是二者而為五十有五此河圗之全數也虛五與十太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兊震巽艮者八卦也大傳又云大衍之數五十其用四十有九朱子云大衍之數五十云者以天地之數五十有五除出金木水火土五數并天一便用四十九數家之説多不同此説却分曉又云河圗自天一至地十積數凡五十有五而其五十者皆因五而後得故五虛中若無所為而實乃五十之所以為五十也大貝如車渠正義引伏生書傳云散冝生之江淮取大貝如大車之渠是言大小如車渠也考工記謂車罔為渠大小如車罔其貝形曲如車罔故比之也王之五輅輅周禮作路見春官巾車之職玉路金路象路謂以玉以金以象飾諸末革路挽之以革而漆之木路不鞔以革漆之而已鞔莫干反成王殯在西序禮記云周人殯於西階之上辨士服冕大夫服正義云垂旒為冕無旒為辨辨冕版皆廣八寸長尺六寸前圎後方楊信齋云冕前後有旒低前一寸二分故取其俯而名曰冕辨制無旒又前後平故名辨用布升數取冠倍之義朝服十五升冕用三十升雀辨赤色辨也綦辨以文鹿子皮為之正義云雀辨色赤而微黑如雀頭也阮諶二禮圖云雀辨以三十升布為之愚謂文鹿子皮者其皮有文如今鹿皮赤質白文者也既以鹿皮為辨其制必不用版安國亦以雀辨為韋辨蓋以周禮司服云凡兵事韋辨服此人執兵宜以韋為之也堂廉曰戺正義云廉稜也所立在堂下近於堂稜惠三隅矛劉鉞屬戣瞿皆戟屬正義云惠狀蓋斜刃冝芟刈戈即今之句子戟劉蓋今鑱斧鉞大斧戣瞿蓋今三鋒矛周禮戈長六尺六寸其餘未聞長短之數古今兵器名異體殊此等形制皆不可得而知也周書曰一人冕執鈗説文所引書皆古文之舊故從之然其餘所引不同者尚多有之東西垂路寢東西序之階上也古語坐不垂堂以切近階也側階北陛之階上也正義云堂北惟一階側猶特也古者執戈戟以宿衛王宫皆士大夫之職吕氏云凡辨士也皆立堂下冕大夫也皆立堂上下及秦漢陛楯執戟又云周廬陛楯衛宏漢官舊儀云五官中郎將左右中郎將郎中令秩皆比二千石左車將右車將左户將右户將皆比千石屬光祿勳與大夫諫議大夫同列皆侍宿衛禁中班固西都賦云陛戟百重周廬千列李善引漢書云武士陛戟陳列殿下史記云周廬設卒甚謹張晏曰直宿曰廬椎埋嚚悍之徒前漢趙肅王傳云椎埋攻剽師古曰椎殺而埋之麻冕三十升麻為冕也升麻之麻當作布朱子云三十升布為之升八十縷則其經二千四百縷矣愚案麻冕用三十升布上染玄下染纁以衣其版康王吉服蘇氏曰麻冕之裳四章此獨用黼示變也正義云王麻冕者蓋衮冕也周禮享先王則衮冕衣五章裳四章則衮衣之裳非獨有黼言黼裳者以裳之章色黼黻有文故特取為文詩采菽之篇言王錫諸侯云玄衮及黼以黼有文故特言之蟻玄色正義云禮祭服皆玄衣纁裳纁赤色之淺者蟻色玄如蟻太宗宗伯也時彤伯為之又稱上宗即周禮大宗伯之職彤纁也祭服皆玄衣纁裳太保受遺受成王臨崩前一日之遺命太史奉册成王顧命之言先已書之於册於此奉之以進康王太宗相禮宗伯掌邦禮大圭天子之守長尺有二寸考工記玉人云鎮圭尺有二寸天子守之瑁方四寸邪刻之以冒諸侯之圭璧以齊瑞信也考工記云天子執冒四寸以朝諸侯奉符寶以傳嗣君符指瑁寶指介圭受同以祭宿進爵也祭祭成王也進爵以爵進成王神座之前也吒奠爵也新安陳氏曰吒有兩説孔氏以為奠爵諸儒多因之蘇氏以為至齒不飲與嚌同義初疑吒字從口意蘇説為是及考字書方知吒與吒同叱怒也禮記無吒食亦怒也㓃與吒同陟駕反祭奠酒爵也吒本㓃字傳寫訛耳孔注音釋下有云説文作㓃由此觀之則吒訓奠爵不可易也酢報祭也新安陳氏曰報祭者亞祼之類即今之亞獻也書蔡氏傳旁通卷六上欽定四庫全書書蔡氏傳旁通卷六下元陳師凱撰康王之誥一曰臯門在外第一門建臯鼓詢事弊訟朝士掌之二曰雉門周禮圖作庫門自外入內第二門也有寶藏之所三曰庫門圖作雉門自外入內第三門也畫雉居五門之中又曰中門旁有兩觀後有明堂四曰應門自外入內第四門也建應鼓又曰朝門五曰路門路門一曰畢門自外入內第五門也又曰虎門下建路鼓外朝在路門外則應門之內蓋內朝所在也內朝當作外朝路門之外即應門之內實外朝所在也又謂之治朝經言王出蓋出路門也內朝在路門裏傳文不得言應門內有內朝也傳寫誤耳自陜以東陜於周時在虢國封內今河南府路陜州也羑里在相州今彰德路也成王初崩未葬未諡故曰新陟王新陟後世謂之大行好惡在理不在我程子所謂喜怒在事則理之當喜怒者也又言顔子之怒在物不在己若舜之誅四凶也可怒在彼己何與焉如鑑之照物妍媸在彼隨物應之而已後世墜先王之業忘祖父之讎上下苟安甚至於口不言兵亦異於召公之見矣蔡氏此言蓋有感而垂戒周幽王為申侯犬戎所殺晉文侯迎立平王於申遷於東都西周故宫鞠為禾黍而平王以申侯立己為有德而忘其弒父為當誅及其錫命文侯則曰其歸視爾師寧爾邦柔遠能邇惠康小民則其口不言兵可見矣蔡氏固有感於此其意又在於建炎紹興之事也春秋嗣王在喪亦書名昭公二十二年夏四月景王崩王子猛在喪春秋書曰劉子單子以王猛居於皇秋劉子單子以王猛入王城冬十月王子猛卒曲禮云天子未除喪曰豫小子生名之死亦名之孔子曰將冠子未及期日而有齊衰大功之喪則因喪服而冠見曾子問疏云因喪服而冠者因著喪之成服而加喪冠也蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也朱子語録潘子善問康王釋喪服而被衮冕諸家皆以為禮之變獨蘇氏以為失禮使周公在必不為此未知當此際合如何區處先生曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十有二月朔亦是新喪伊尹已奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣君韓文外集順宗實録中有此事可考蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣朱子又云康王釋斬衰而服衮冕於禮為非孔子取之又不知如何設使制禮作樂當此之職只得除之畢命豐刑孟康曰逸書篇名鄭元云有册霍侯之事皆妄作也愚案妄作者但記聞畢命篇首數句有自宗周至于豐之文謂康王在豐命畢公故其書曰畢命豐刑非畢命篇外別有豐刑篇也成周下都也在瀍水之東處商民之地十二年曰紀既歷三紀三十六年也成王即位七年而周公始留治洛治之七年而周公薨成王命君陳繼周公之後成王在位凡三十七年則在成王時君陳治洛凡二十三年在康王時又治十二年而後命畢公則通周公君陳治東郊以來至此時四十二年矣言三紀者舉大數也畢公輔導四世四世文武成康也以年逆計之康王此時已在位十二年成王在位三十七年武王十三年伐紂克商後七年而崩通二十年則畢公自武王即位以來已歷六十九年矣又加之以在文王之時已為大臣則此時必九十餘歲可謂國之元老矣君牙王穆王也康王孫昭王子昭王名瑕穆王名滿欲君牙以其祖考事先王者事我成康之時芮伯為司徒此云纘乃舊服無忝祖考又曰由先正舊典時式則君牙之祖父必嘗為周司徒矣然則君牙或芮伯之子孫歟不然下文何故曰追配于前人後世鄭武公父子並為周司徒亦如此類𢎞敷者大而布之也式和者敬而和之也即舜命契敬敷五教在寬之意司徒兼教養之職即既富之而後教之之意小民怨咨而自傷其生之艱難則救死恐不贍奚暇治禮義哉冏命穆王卒章之命望於伯冏者深且長矣此心不繼造父為御周遊天下將必有車轍馬迹導其侈者果出於僕御之間抑不知伯冏猶在職乎否也史記云蜚廉之後有造父以善御幸於周繆王繆音穆得驥溫驪驊駵騄耳之駟西巡狩樂而忘歸徐偃王作亂造父為繆王御長驅歸周以救亂左傳昭公十二年楚右尹子革對楚靈王曰昔穆王欲肆其志周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心王是以獲沒于祗宫其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心吕刑書傳引此多稱甫刑史記作甫侯言於王作修刑辟吕後為甫歟顔師古曰吕侯為周穆王司寇作贖刑之法謂之吕刑後改為甫侯故又稱甫刑孔穎達云吕侯子孫後改封甫如詩云不與我戍甫穆王時未有甫名後人以子孫國號名之追稱甫刑若叔虞封唐子孫封晉而史記作晉世家林氏曰吕與甫猶荆與楚殷與商蚩尤始開暴亂之端古注云九黎之君號曰蚩尤史記注應劭曰蚩尤古天子臣瓉曰孔子三朝記曰蚩尤庶人之貪者索隱云此紀云諸侯相侵伐蚩尤最為暴則蚩尤非天子也又管子曰蚩尤受盧山之金而作五兵明非庶人蓋諸侯號也苖民承蚩尤之暴正義云三苖之主實國君也頑凶若民故謂之苖民重少昊之後黎髙陽之後重即羲黎即和也此承上文言帝舜之事知乃命為帝舜之命又據楚語堯復育重黎之説遂依古注訓重即羲黎即和也史記索隱曰據左氏重是少昊之子黎乃顓頊之胤按國語曰少皡氏之衰九黎亂德見楚語昭王問於觀射父曰周書所謂重黎實使天地不通者何也若無然民將能登天乎對曰非此之謂也古者氏神不雜民之精爽不􅠬二者而又能齊肅衷正則神明降之在男曰覡在女曰巫是使制神之處位次主而為之牲器時服於是乎有天地神民類物之官謂之五官各司其序不相亂也民是以能忠信神是以能有明德民神異業敬而不瀆故神降之嘉生及少皥之衰也九黎亂德九黎黎氏九人民神雜糅不可方物夫人作享夫人人人也家為巫史無有要質民瀆齊盟無有嚴威神狎民則不蠲其為嘉生不降無物以享禍災荐臻莫盡其氣氣受命之氣顓頊受之乃命南正重司天以屬神南陽位正長也司主也屬會也所以會羣神使各有分序不相干亂也周禮則宗伯掌祭祀命火正黎司地以屬民唐尚書云火正當為北北隂位也周禮則司徒掌土地人民也使復舊常無相侵瀆是謂地天通其後三苖復九黎之德其後高辛氏之季年也三苖九黎之後也髙辛氏衰三苖為亂行其凶德如九黎之為也堯興而誅之堯復育重黎之後不忘舊者使復典之育長也堯繼髙辛氏平三苖之亂繼育重黎之後使復典天地之官羲氏和氏是也以至于夏商故重黎氏世敘天地而別其分主者也火正黎新安陳氏曰北正黎或作火正黎北字與火字相似又黎以北正兼火正黎即祝融也所以祕注楊子曰北正黎即火正黎也北正對南正為是愚案月令孟夏其神祝融鄭注云祝融顓頊氏之子曰黎為火官陳説是也禹平水土以定民居愚案主名山川者即爾雅所謂從釋地以下至九河皆禹所名是也命臯陶為士制百姓于刑辟之中所以檢其心而教以祗德也新安陳氏曰鰥寡得言其害於清問之下其無蓋可知表記引德威惟畏德明惟明繼之曰非虞帝其孰能如是乎則皇帝為舜明矣夫舜不輕於用刑也先命重黎絶地天褻瀆之禮次命伯夷降天地人之禮又命禹除民害稷興民利夫然後始命臯陶以刑且本之以威明之德繼期民以祗德勤德刑之本必主於德而刑之用必合於中德與中為吕刑一篇之綱領繼此曰惟克天德曰以成三德曰有德惟刑無非以德為本也曰觀于五刑之中曰中聽獄之兩辭曰罔非在中曰咸庶中正曰非德于民之中曰咸中有慶無非以中為用也刑必合於中而後刑即所以為德以此意讀吕刑其庶幾乎後漢楊賜拜廷尉自以世非法家賜震之孫事見震傳蓋吝之也注云吝恥也格至也正義云格訓至至命不知何命新安胡氏曰下文有敬逆天命此則當云庶幾有以感格天命戒固善心也而用豈可以或戒也哉言欲其無時而不戒也茍或戒而或不戒則不勤而刑不當矣及逮也逮連捕也蘇氏曰罪非己造為人所纍曰及秦漢間謂之逮周官以兩造聽民訟大司寇云以兩造禁民訟入束矢於朝然後聽之審克者察之詳而盡其能也吕氏云審者察之盡其心克者治之盡其力周禮所謂色聽小司寇以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顔色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然墨刻顙而涅之也劓割鼻也剕刖足也宫淫刑也男子割勢婦人幽閉大辟死刑也正義云五刑之名見於經傳唐虞以來皆有之矣未知上古起在何時也漢文帝始除肉刑其刻顙截鼻刖足割勢皆法傳於先代孔君親見之説文云顙額也墨一名鯨先刻其額為瘡以墨塞瘡孔令變色也伏生書傳云男女不以義交者其刑宫是宫刑為淫刑也男子之隂名為勢割去其勢椓去其隂事亦同也婦人幽閉閉於宫使不得出也本制宫刑主為淫者後人被此罪者未必盡皆為淫昭五年左傳楚子以羊舌肸為司宫非坐淫也漢除肉刑除墨劓剕耳宫刑猶在隋開皇之初始除男子宫刑婦人猶閉於宫辟罪也死是罪之大者故謂死刑為大辟周禮注云丈夫割其勢女子閉於宫中若今宦男女也刖斷足也周改臏作刖周禮音義云涅乃結反六兩曰鍰百鍰六百兩也倍二百鍰一千二百兩也倍差五百鍰三千兩也六百鍰三千六百兩也千鍰六千兩也正義云古人贖罪皆用銅或稱黃金或稱黃鐵屬類也三千總計之也周禮司刑所掌五刑之屬二千五百刑雖增舊然輕罪比舊為多而重罪比舊為減也秋官司刑云掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百注云書傳曰決關梁踰城郭而略盜者其刑臏男女不以義交者其刑宫觸易君命革輿服制度姦軌盜攘傷人者其刑劓非事而事之出入不以其道義而誦不詳之辭者其刑墨降畔寇賊劫略奪攘矯虔者其刑死此二千五百罪之目略也輕罪比舊為多者墨劓舊五百今一千各多五百也重罪比舊為減者宫大辟舊各五百今宫減二百大辟減三百也讞獄讞逆結反説文云議罪也此章文有未詳者姑闕之愚以意詳之云民之亂罔不中聽獄之兩辭者謂治民之道惟在於聽其兩辭而得刑之中也無或私家于獄之兩辭者不可以私意鬻獄而圗利其家於兩爭之人也獄貨非寶惟府辜功者謂舞文得貨非所為寶不過自積其枉法之罪狀也報以庶尤者言罪惡貫盈則天必降之百殃也永畏惟罰者言深長思之所可畏者惟刑罰之事也非天不中惟人在命者言非天不以中道待人惟人自取殃禍惟天所命也天罰不極庶民罔有令政在于天下者謂獄貨之人天若不極罰之則庶民不得蒙令善之政于天下也此章蓋言有忠厚之德而後可以聽訟舞文弄法刻剝以取貨者亦必自受其禍也文侯之命幽王為犬戎所殺晉文侯與鄭武公迎太子宜臼立之是為平王遷於東都自穆王之後歷共王繄扈懿王囏孝王辟方夷王燮厲王胡無道國人畔之王出奔晉之彘二相共和十四年而王崩於彘宣王靜立周室中興崩子幽王宫涅立嬖褒姒為犬戎所殺汲冢紀年云自武王滅殷以來至此凡二百五十七年矣愚案自武至幽凡十二世王室三亂穆之逺遊厲之監謗幽之褒姒周室之微其所由來者逺矣宗周豐鎬之基以至𡵨邠之地上自后稷下逮文武千有餘年興王之業平王一旦捐之以畀秦自是以後關西之勢駸駸為東國患不可復制君子固不待王赧之稽首而後知繼周之為秦也夏氏曰古今謂書自此篇以下無復王者之誥命然此乃平王初年書錫命文侯猶有天子之權茍能自是振刷周道亦未至盡墜奈何至魯隱之初在位且五十年竟以不振故孔子託始隱公而春秋作焉書終文侯之命孔子猶有望於平王春秋始於隱公孔子蓋絶望於平王也諸侯受錫命當告其始祖故錫鬯諸侯有大功賜弓矢然後得專征伐王制云諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯於天子按周禮有鬱人有鬯人鬱鬱金草也鬯黑黍之酒名曰秬鬯取和鬯之義鬯人注云秬鬯不和鬱者詳此則秬酒本名秬鬯加鬱金煮之則名曰鬱鬯蔡氏於洛誥直訓鬯為鬱金香草蓋亦因和鬯得名也鬱人注云築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煮之鐎子遙反中停於祭前鬱為草若蘭疏云案王度記云天子以鬯諸侯以薰大夫以蘭芝士以蕭庶人以艾此等皆以和酒諸侯以薰謂未得圭瓉之賜得賜則以鬱耳禮緯云鬯草生庭皆是鬱金之草以其和鬯酒因號為鬯草也又按本草云鬱金香十二葉為百草之英生大秦國四月五月採花狀如紅藍花即是香十二葉為貫捋以煮之用為鬯合而釀酒以降神也平王冝若衛文公越勾踐然左傳閔二年狄人侵衛衛懿公戰于熒澤衛師敗績遂滅衛宋威公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于漕齊桓公使公子無虧帥車三百乘以戍漕戴公卒文公立文公徙居楚丘大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘哀元年吳王夫差敗越于夫椒越子勾踐以甲楯五千保于會稽使大夫種因吳大宰嚭以行成越及吳平伍貟諫弗聽退而告人曰越十年生聚十年教訓二十年之外吳其為沼乎二十二年越伐吳棲吳王於姑蘇之山自殺勾踐已平吳乃以兵北渡淮與齊晉諸侯會於徐州致貢於周周元王賜勾踐胙命為伯諸侯畢賀號稱霸王平王以申侯立己為有德而忘其弒父為當誅方將以復讎討賊之衆而為戌申戌許之舉其忘親背義得罪於天已甚矣揚之水序云刺平王也不撫其民而逺屯戍于母家周人怨思焉朱子曰先王之制諸侯有故則方伯連率以諸侯之師討之王室有故則方伯連率以諸侯之師救之天子鄉遂之民供貢賦衛王室而已今平王微弱威令不行於天下無以保其母家乃勞天子之民逺為諸侯屯守故周人戌申者以非其職而怨思也又況申侯實啓犬戎以致驪山之禍乃平王及其臣民不共戴天之讎也今平王知有母而不知有父知其立己為有德而不知其弒父為可怨至使復讎討賊之師反為報施酬恩之舉則其絶滅天理而得罪於民又益甚矣又云申今鄧州信陽軍之境也甫許皆薑姓許今潁昌府許昌縣也甫即吕刑之吕其地未詳費誓費地名愚按伯禽建國今兖州曲阜縣也費今沂州費縣也寰宇記沂在兖州之東三百八十五里費在沂之西北九十五里曲阜在兖州之東三十里是自曲阜至費邑約二百六十餘里也春秋之初費自為國隱元年傳曰費伯帥師城郎後為魯季氏之邑僖元平傳曰公賜季友汶陽之田及費論語使閔子騫為費宰是也然則伯禽時費決非魯地但魯為方伯費在屬國之中耳孔安國謂費為魯東郊之地穎達附會且言未出魯境皆非也伯禽之誓于費如啓之誓于甘湯於鳴條武王於牧皆臨敵境而後誓所以申令吾將士其時徐戎必冦費故伯禽征之耳淮夷徐戎並起為冦徐州名魯亦在徐州境內淮夷蓋自古有之禹貢於徐州有淮夷蠙魚之貢徐戎亦其類也雖居中國自為戎夷之俗歷代帝王亦以戎夷待之如後世之羈縻州縣也伯禽分封於魯實與為鄰故此戎乘魯之新造相挻而動逺連商邑近結奄民周公故嘗征之成王故嘗踐之不知與此事先後如何耳誓辭首以淮夷徐戎並稱甲戌則惟征徐戎則此誓專為征徐戎而作也然蠢兹戎夷為亂必非一次周公既沒又復為亂禮記曾子問篇子夏曰三年之喪卒哭金革之事無辟也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也注云伯禽周公子有徐戎作難喪卒哭而征之則在成王之十四年也蔡氏於此引吕氏之説則謂伯禽初封之時而洛誥傳又謂費誓在周公東征之時則伯禽就國已十年矣終不可指其的年月也敹縫完也縫完其甲胄勿使斷毁古注甲鎧胄兜鍪正義云經典皆言甲胄秦世以來始有鎧兜鍪之文古作甲用皮秦漢以來用鐵鎧鍪二字皆從金蓋用鐵為之鄭云敹謂穿徹之謂甲繩有斷絶當使敹理穿治之敿楯當有紛繫持之楯即干扞蔽之物紛即紛帨之紛讀如焚周禮注紛如綬有文而狹孔穎達云繫紛於楯以為飾蔡氏謂繫而持之也擭機檻也正義云擭以捕虎豹穿地為深坑又設機其上防其躍而出也穽以捕小獸穿地為深坑入則必不能出上不設機也穽以穿地為名擭以得獸為名馬牛風逸正義云僖四年左傳云唯是風馬牛不相及也賈逵云風放也牝牡相誘謂之風然則馬牛風逸因牝牡相逐至於放逸逺去也國外曰郊郊外曰遂天子六軍則六鄉六遂大國三軍故魯三郊三遂也司馬法曰王國百里為郊王制注云百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊愚按王國百里之郊六鄉在焉二百里為州六遂在焉五家為比二十五家為閭百家為族五百家為黨二千五百家為州萬二千二百家為鄉此一鄉之民數也五家為鄰二十五家為里百家為鄼五百家為鄙二千五百家為縣萬二千五百家為遂此一遂之民數也五人為伍二十五人為兩百人為卒五百人為旅二千五百人為師萬二千五百人為軍此一軍之人數也凡起軍無過家一人王國六軍六鄉為正軍六遂為副軍大國三軍三鄉出正軍三遂出副軍次國二軍二鄉正二遂副小國一軍一鄉正一遂副凡六遂之職皆降六鄉一等副亞於正也凡一軍伍長二千五百人皆下士在鄉為比長亦下士也在遂為鄰長兩司馬五百人皆中士在鄉為閭胥亦中士也在遂為里宰下士也卒長百二十五人皆上士在鄉為族師亦上士也在遂為鄼長中士也旅帥二十五人皆下大夫在鄉為黨正亦下大夫也在遂為鄙師上士也師帥五人皆中大夫在鄉為州長亦中大夫也在遂為縣正下大夫也軍將一人皆命卿在鄉為鄉大夫亦卿也在遂為遂大夫中大夫也此郊遂軍制之大數也秦誓左傳杞子自鄭使告于秦僖公三十年九月晉文公秦穆公圍鄭鄭大夫佚之狐言於鄭文公使燭之武見秦君曰越國以鄙逺君知其難也焉用亡鄭以陪鄰秦伯説與鄭人盟使杞子逄孫楊孫戍之乃還晉師亦去三十二年冬晉文公卒杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪其大夫蹇叔蹇叔曰勞師以襲逺非所聞也公辭焉召百里奚之子孟明視蹇叔之子西乞術及白乙丙使出師伐鄭過周鄭商人弦髙遇之以牛十二犒師且遽告于鄭杞子奔宋孟明曰鄭有備矣滅滑而還晉原軫曰秦違蹇叔天奉我也必伐秦師欒枝曰未報秦施先軫曰秦不哀吾喪而伐吾同姓何施之為遽興薑戎晉襄公墨衰絰三十三年夏四月敗秦師于殽獲秦三帥以歸文嬴請三帥使歸就戮于秦公許之秦伯曰孤違蹇叔以辱二三子孤之罪也大夫何罪復使孟明為政文二年秦師復伐晉晉侯禦之先且居將中軍戰于彭衙秦師敗績秦猶用孟明增修國政冬晉伐秦取汪及彭衙而還三年秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也旅力既愆之良士前日所詆墓木既拱者我猶庶幾得而有之秦師出東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀爾墓之木拱矣古注云旅力衆力也張氏曰衆力如目力耳力手足之力既愆已皆不能及人也蓋言畨畨然老貌者其衆力雖不能及人前日謬以中夀詆之今日思之真良士也蹇叔得不怨我庶幾尚為我有乎射御不違之勇夫前日所誇過門超乘者我庶幾不欲用之秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗此蓋言仡仡然勇敢之夫善射善御而不違於法者雖有超躍升車之力然輕而無禮不如旅力既愆者之善謀也自今以往自悔自艾庶幾我不以此為欲乎勇夫我尚不欲則辨給善巧言能使君子變易其辭説者我遑暇多有之哉此蓋深悔為杞子之言所惑而失不用蹇叔之言也故杞子奔齊而不敢復此三節雖皆悔過之辭然曰我尚有之我尚不欲尚之辭緩辭也非決辭也故卒用孟明而不見終謀於蹇叔彭衙再敗而猶未已焉是蓋知悔而不知改者也蘇氏曰至哉穆公之論此二人也前一人似房元齡後一人似李林甫後之人主監此足矣唐書云元齡當國夙夜強勤任公竭節不欲一物失所無媢忌聞人善若己有之不以己長望人取人不求備雖卑賤皆得盡所能玄宗時張九齡由文學進守正持重林甫特便佞得大任每嫉九齡隂害之林甫有堂如偃月號月堂每欲排大臣即居之思所以中傷者若喜而出即其家碎矣帝詔天下士有一藝者得詣闕就選林甫恐士或斥己即建言請委尚書省試問御史監總無一中程者林甫因賀上以野無留才林甫居相位十九年蔽欺天子耳目諫官無敢正言者杜璡再上書言政事斥為下邽令因以語動其餘曰眀主在上羣臣將順不暇亦何所論君等獨不見立仗馬乎終日無聲而飫三品芻豆一嗚則黜之矣後雖欲不鳴得乎由是諫爭路絶林甫疾儒臣以方略積邊勞且大任欲杜其本以久已權即説帝曰國家強富而夷狄未滅者由文吏為將憚矢石不身先不如用蕃將帝然之因擢安祿山髙仙芝哥舒翰等為大將卒蕩覆天下帝之幸蜀也裴士淹以辨得幸肅宗在靈武每命宰相輒啓聞及房琯為將曰此非破賊才也若姚元崇在賊不足滅至宋璟曰彼賣直取名耳因歷評十餘人皆當至林甫曰是子妬賢嫉能舉無比者士淹因曰陛下誠知之何任之久邪帝默不應書序小序雖出孔壁然非孔子所作蔡氏固不取之猶存於卷末者以其具百篇之目故爾𨽻古本文自堯典第一至秦誓五十八中間禹貢湯誓泰誓不復更端今虞夏商周各有第一者後人所次爾今因小序次第其目庶可一覽而見百篇之舊因以知存亡之相半云虞書堯典第一舜典第二汨作第三亡九共一第四亡九共二第五亡九共三第六亡九共四第七亡九共五第八亡九共六第九亡九共七第十亡九共八第十一亡九共九第十二亡稿飫第十三亡大禹謨第十四臯陶謨第十五益稷第十六夏書禹貢第十七甘誓第十八五子之歌第十九胤征第二十商書帝告第二十一亡釐沃第二十二亡湯征第二十三亡汝鳩第二十四亡汝方第二十五亡湯誓第二十六夏社第二十七亡疑至第二十八亡臣扈第二十九亡典寶第三十亡仲虺之誥第三十一湯誥第三十二明居第三十三亡伊訓第三十四肆命第三十五亡徂后第三十六亡太甲上第三十七太甲中第三十八太甲下第三十九咸有一德第四十沃丁第四十一亡咸乂一第四十二亡咸乂二第四十三亡咸乂三第四十四亡咸乂四第四十五亡伊陟第四十六亡原命第四十七亡仲丁第四十八亡河亶甲第四十九亡祖乙第五十亡盤庚上第五十一盤庚中第五十二盤庚下第五十三説命上第五十四説命中第五十五説命下第五十六髙宗肜日第五十七髙宗之訓第五十八亡西伯戡黎第五十九微子之誥第六十周書泰誓上第六十一泰誓中第六十二泰誓下第六十三牧誓第六十四武城第六十五洪範第六十六分器第六十七亡旅獒第六十八旅巢命第六十九亡金縢第七十大誥第七十一微子之命第七十二歸禾第七十三亡嘉禾第七十四亡康誥第七十五酒誥第七十六梓材第七十七召誥第七十八洛誥第七十九多士第八十無逸第八十一君奭第八十二蔡仲之命第八十三成王政第八十四亡將蒲姑第八十五亡多方第八十六立政第八十七周官第八十八賄肅慎之命第八十九亡亳姑第九十亡君陳第九十一顧命第九十二康王之誥第九十三畢命第九十四君牙第九十五冏命第九十六吕刑第九十七文侯之命第九十八費誓第九十九秦誓第一百右百篇存五十八篇亡四十二篇虞書十六篇亡十一篇今存五篇夏書四篇今皆存商書四十篇亡二十三篇今存十七篇周書四十篇亡八篇今存三十二篇陑在河曲之陽鳴條在安邑之西正義云桀都安邑即漢之河東郡安邑縣是也史記吳起對魏武侯云夏桀之居左河濟右太華伊闕在其南羊腸在其北仁政不修湯放之地理志云上黨郡壷關縣有羊腸坂在安邑之北是桀都安邑明矣陑在河曲之南蓋今潼關左右河曲在安邑西南從陑向北渡河乃東向安邑鳴條在安邑之西桀西出拒湯故戰于鳴條之野今安邑見有鳴條陌上黨壷關今潞州壷關也河東安邑今解州安邑也古安邑城在今解州夏縣寰宇記雷首山一名陑山在河中府河東縣此下序中地名見前經文內者茲不重注帝告新安陳氏云帝告即帝嚳也三朡國名今定陶也今曹州定陶縣也有三朡亭大埛地名正義云未知所在當在定陶向亳之路相湯葬地也史記正義云洛州偃師縣東六里有湯冢近桐宫又云尸鄉在偃師西南東冇城太甲所放處也寰宇記云蒲州寶鼎縣殷湯陵在縣北四十三里後魏太和中有縣人張恩破陵求貨其陵下先有石弩以銅為鎖盜開埏門矢發中三人皆斃恩更為他計卒取得墓中物其物多是鐘磬及諸樂器再得其銘恩恐人知以銘投之汾水後事泄為主司所理乃於水取其銘銘曰吾死後二千年終困於恩由是執事者不復深加其罪劉向云湯無葬地蓋不練其處也愚案此事不經但其地則實耳嚻相在河北耿在河東耿鄉正義云皇甫謐云仲丁自亳徙嚻在河北或云河南敖倉相即相州今彰德路也河亶甲所居故殷城實在今滑州內黃縣內黃元屬相州改𨽻魏州今又改隸滑州也史記索隱河東皮氏有耿鄉寰宇記云蒲州龍門縣古皮氏縣也縣南十里故耿城殷王祖乙所都傅巖在虞虢之間今名聖人窟武王觀兵觀猶示也古亂反馳車戰車革車輜車載器械財貨衣裝者也輜車又名輦人挽以行司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤二版二築十五人挽之司馬法馳車七十五人革車二十五人李衛公兵法云周制步卒七十二人甲士三人者以二十五人為一甲一乘凡三甲共七十五人也曹公新書云攻車七十五人即馳車也前拒一隊一隊二十五人左右角三隊三隊共七十五人守車一隊守車即革車也一隊二十五人炊子十人守裝五人廄養五人樵汲五人共二十五人攻守二乘凡百人即蔡氏所謂一兩也又云諸家兵法唯伍法為要小列之五人大列之二十五人參列之七十五人言殺受立武庚者序自相顧為文顧顧前後序也武成序言武王伐殷此序言勝殷殺受分器序言武王既勝殷是三序自相顧為文也宗廟彞尊也彞酒尊也上有虎蜼之狀取其孝也分與諸侯如錫秬鬯一卣之類史記作薄姑正義云樂安博昌縣北有蒲姑城今按博昌改為博興舊屬青州今改為博興州為山東益都路支郡肅慎後漢東夷傳挹婁古肅慎之國在夫餘東北千餘里東濵大海南與北沃沮接不知其所極五代四夷附録云黑水靺羯本號勿吉當後魏時見中國其國東至海南界髙麗四接突厥北鄰室韋蓋肅慎氏之地也榮伯史正義云周同姓畿內諸侯為卿士畢即畢原之地在奉元路咸陽縣文王武王周公墓皆在曲阜今兖州曲阜縣其地古炎帝之墟有大庭氏之庫其阜委曲長七八里故名古魯城凡十二門上東門鹿門稷門萊門石門子駒門餘失不詳崤正義云在𢎞農澠池今河南路陜州澠池縣也書蔡氏傳旁通卷六下
