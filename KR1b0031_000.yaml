front:
  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0031_WYG_000-1a, image: WYG0062/WYG0062-0209a.png}
body:
  text: 書蔡傳旁通書類提要臣等謹案書蔡傳旁通六卷元陳師凱撰師凱家彭蠡故自題曰東滙澤其始末則不可得詳此書成於至治辛酉以鄱陽董鼎尚書輯録纂注本以羽翼蔡傳然多採先儒問答斷以已意大抵辨論義理而於天文地理律歷禮樂兵刑龜䇿河圖洛書道德性命官職封建之屬皆在所略遇傳文片言之賾隻字之隱讀者不免囁嚅齟齬因作是編於名物度數蔡傳所稱引而未詳者一一博引繁稱析其端委其蔡傳歧誤之處則不復糾正蓋如孔穎達諸經正義主於發揮注文不主於攻駁注文也然不能以回護注文之故廢孔氏之疏則亦不能以回護蔡傳之故廢師凱之書矣知其有所遷就而節取所長可也乾隆三十九年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書書蔡傳旁通序天道無心而成化聖人有心而無為夫惟其有心也故無為而無不為惟其無為而無不為故動而世為天下道行而世為天下法言而世為天下則此二帝三王之所以不能不有書也書既有矣凡一動一行一言雖千萬世而一日矣然書出於千萬世之前而書讀於千萬世之後則其一動一行一言又烏得而備知之此朱蔡師弟子之所以不能不有傳也傳既成矣後之讀者將不能究朱子之所傳不能領蔡氏之所受又不能如其行輩之所講明則雖有傳猶未能備知也此鄱陽董氏之所以有輯録纂注也然其輯録特答問之多端纂注又專門之獨見初學於此茍本傳尚未曉析而乃游目廣覽則茫無畔岸吾誰適從是董氏所纂乃通本傳以後之事殆未可由此以通本傳也此旁通之所以贅出也嗟夫書之有傳如堂之階如室之户未有不由此而可以造其地也然傳文之中片言之嘖隻字之隱呻其占畢之際囁嚅而齟齬者不為無矣況有所謂天文地理律歷禮樂兵刑龜策河圖洛書道德性命官職封建之屬未可以一言盡也是以旁通之筆不厭瑣碎專務釋傳固不能效正義之具舉但值片言隻字之所當尋繹所當考訓者必旁搜而備録之期至於通而後止俾初學之士對本傳於前置旁通於側或有所未了者即轉矚而取之左右庶幾微疑易釋大義易暢乘迎刃之𫝑求指掌之歸吾見其有融㑹貫通之期無囁嚅齟齬之患矣其言道德性命之際文理已明者略為衍說或於名物度數之末無乃太簡者則詳究所出以致弗明弗措之意焉由是以了本傳次及輯録纂注則先入者定而中不搖權度在我而外不惑近可以得諸儒之本㫖逺可以㑹朱蔡之授受若夫二帝三王之所以為天下道為天下法為天下則者則又存乎其人而巳雖然愚之所以云云而不避晉越者非敢為通人道也為初學小子費師說者設也以謏聞而陳之通人之前寧不詒玉巵無當之誚乎姑藏之以俟知者時至治元年嵗次辛酉四月六日後學東匯澤陳師凱序蔡傳旁通引用書目徐鉉校定說文陸德明經典釋文九經古注九經注疏隸古尚書春秋公羊傳春秋穀梁傳儀禮經傳通解楊信齊祭禮通解朱子書說朱子語類朱子大全集朱子四書朱子周易本義朱子易學啓蒙朱子詩傳程子易傳董氏書傳輯纂程氏禹貢圖長安禹迹圖石刻尚書圖陸淳春秋纂例啓蒙附録王太古見易嚴氏詩緝吕氏詩記俞氏周禮復古編史記前漢書後漢書三國志晉書南史北史隋書舊唐書新唐書五代史宋紀事本末金志遼志史記索隱史記正義杜氏通典鄭夾漈通志略國語韋氏解國策鮑氏解稽古録蘇子古史通鑑皇極經世書郭忠恕佩觿衛宏古文竒字序爾雅爾雅疏博雅楚辭注劉向說苑蔡氏律吕本原蔡氏洪範內篇東坡地理指掌圖李善文選注文苑英華文鑑曽南豐文集衛宏漢官舊儀李􅐉續補漢官儀三輔黃圖周子易通管子列子莊子荀卿子楊子法言韻㑹玉篇唐韻樂史寰宇記輿地志輿地要覽崔豹古今注程氏敘論薛氏古文西山讀書記洪範五行傳周書王㑹篇諡法解本草蔡傳旁通隱字審音堯典丌上上居之切婞直上胡冷切舜典周髀下傍术切相近一音攘祈又音祖迎幽宗宗音禜雩宗同祝號上之秀切空圍上音孔摶埴上音圑下音石攦工上力結切大禹謨九韶上音大洚洞上胡貢切益稷乘輴下音春乘樏下力追切作橇下音蕝作毳下昌芮切作橋下丘遙切作梮下九玉切虎蜼下音誄切又以季黹紩上張里切下音姪鷩冕上必列切籈櫟上音真頌鐘上音容簫韶上音簫裸者上力果切禹貢沾縣上丁念切赤緹下音低渴澤上音竭滱水上音彄遼濡下乃官切作泲下子禮切滳河上音商汳水上音汴狙獾下音歡濋水上音楚有漷下苦郭切沂沭下食聿切朐山上音劬埏埴上始然切禫纎上徒感切楩梓上皮連切下雋下字兖切波溠下側駕切冤句下音劬湔氐上子千切西徼下吉弔切沫水上音妹又音末魚復下音腹佷山上音衡毳罽下音計斜川上音邪吐谷下音欲馮翊上音憑休屠下音除燉煌上徒門切濩澤上鳥國切崈髙上音崇傅昜上音敷下音陽犍為上音乾瀰渃渃當作諾讀如字滇池上音顚滇巂下先蘂切砱礫上音零下音力汊水上初化切趵突上北角切蔡放上素達切甘誓觀扈上音館姺邳上西典切以菆下音鄒盤庚作甹下音由說命諒暗上音梁下音菴武成甲釁下音釁旅獒躇階上丑略切梓材疻也上諸氏切洛誥胞翟上音庖下音狄無逸日昳下徒結切多方讋服上質涉切君陳萎薾下乃結切費誓紛繫上扶云切
