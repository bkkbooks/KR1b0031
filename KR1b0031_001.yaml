body:
  text: 書蔡氏傳旁通卷一上元陳師凱撰序文文字也書書籍也説文序云依類象形故謂之文形聲相益即謂之字字者言孳乳而浸多也著於竹帛謂之書書者如也蓋制字之初以象形為本如日月蟲魚之屬次則指事如上下字次則諧聲如江河字次則會意如武信字次則轉注如考老字次則假借如令長字日圓月闕是象形也卜在一上為上卜在一下為下是指事也工與江聲相近可與河聲相近是諧聲也諧和也又名形聲如江字水形工聲河字水形可聲也亡戈為武人言為信是會意也鄭氏通志略云非止戈為武當云亡戈為武亡讀為無也考字足左回老字足右轉是轉注也使令之令借音令尹之令長短之長借音長幼之長是假借也此文字第一門故詳言之揆度也度入聲孟子集注云其揆一者言度之而其道無不同也伏羲以木德王神農以火德王黃帝以土德王少昊以金德王顓頊以水德王髙辛以木德王唐堯以火德王虞舜以土德王夏禹以金德王商湯以水德王周文武以木德王此皆據釋文愚案終始五德之傳起戰國鄒衍之説其合於經者月令五人帝春帝太皥即伏羲也夏帝炎帝即神農也中央黃帝即軒轅也秋帝少皥即少昊也冬帝顓頊即髙陽也此其説之合者也其不合於經者夏后氏尚黑非金德也殷人尚白非水德也周人尚赤非本德也此其不合者也顔師古曰家語云孔騰字子襄此據前漢藝文志注文也陸氏釋文序録云秦禁學孔子之末孫惠壁藏之而釋文注又與師古説同故蔡氏亦據之掌故朝錯掌故官名錯初捕反齊人語多與潁川異伏生齊人朝錯潁川人科斗蟲名蝦蟇子書形似之即三代時字起於黃帝之史倉頡歷代修改至周宣王時太史籀又加損益為大篆十五篇與古文並行孔子書六經時以黑漆寫之於竹簡漆書點畫稠濃形類蝦蟇子秦時獄吏程邈作隸書即今常行楷字李斯作小篆即今玉筯篆時人以隸書便於徒隸書寫簡易皆競習之故三代古文棄而不習至漢時無能識者乃妄稱為科斗書在三代時無科斗之號也幸伏生口傳於前孔壁發藏於後安國得以考論文義遂使三代古文得傳於今日此萬世之功也為隸古定謂用隸書以易古文孔氏疏云言隸古者正謂就古文體而從隸定之釋文序録云古文尚書皆科斗文字孔安國以校伏生所誦為隸古寫之愚案隸古尚書宋時郴學有板其字蓋用隸書筆法寫古文點畫平正無詰屈蟠糾之𫝑若今廣韻玉篇內所載古字非用隸書換易古文也易字當是寫字之誤又案郭忠恕佩觿云尚書宋齊舊本隸寫古文焚書在三十四年疏云始皇三十四年因置酒咸陽宫丞相李斯奏請天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書者棄市令下三十日不燒黥為城旦坑儒在三十五年疏云三十五年始皇以方士盧生求仙藥不得以為誹謗諸生連相告引四百六十餘人皆坑之咸陽又衛宏古文竒字序云秦改古文以為篆隸國人多誹謗秦患天下不從而召諸生至者皆拜為郎凡七百人又密令冬月種瓜於驪山硎谷之中溫處瓜實乃使人上書曰瓜冬有實有詔天下博士諸生説之人人各異則皆使往視之而為伏機諸生方相論難因發機從上填之以土皆終命也詳此章雖説書序序所以作者之意而未嘗以為孔子所作至劉歆班固始以為孔子所作漢書藝文志云書之所起逺矣至孔子纂焉孟康曰纂音撰上斷於堯下訖於秦凡百篇而為之序言其作意志乃班固所刪劉歆七略中語也又案古周書七十篇孔子所刪去者而今每篇亦皆有序冠其篇首則知百篇小序決非孔子所作矣江充造巫蠱敗戻太子疏云蠱者怪惑之名指體則毒藥害人者是若行符厭俗之為魅令人蠱惑夭年傷性皆是也以蠱皆巫之所為故曰巫蠱武帝末年淫惑鬼神由此姦人江充因而行詐先於太子宫埋桐人告上云太子宫有蠱氣上信之使江充治之於太子宫果得桐人太子知己不為此以江充故為陷己因而殺之而帝不知太子實心謂江充言為實即詔丞相劉屈氂發三輔兵討之太子赦長安囚與鬬不勝而出走奔湖關自殺古文安國壁中書也今文伏生口傳書也裁二十餘篇陸氏曰即馬鄭所注二十九篇是也本二十八篇後加偽秦誓一篇堯典舜典合臯陶謨益稷合禹貢草誓湯誓盤庚三篇合髙宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命康王之誥合吕刑文侯之命費誓秦誓已上是伏生口傳二十八篇今開所合者共三十三篇蔡傳後云古文今文皆有者此是也增多伏生二十五篇大禹謨五子之歌胤征仲虺之誥湯誥伊訓太甲三篇咸有一德説命三篇泰誓三篇武城旅獒微子之命蔡仲之命周官君陳畢命君牙冏命已上是壁中書多於伏生者也蔡傳後云今文無古文有者此篇是也凡今文所有古文亦有之故止稱今文無古文有不稱今文有古文無也復出此篇并序舜典益稷盤庚中下二篇康王之誥此五篇伏生所合安國析出之通前伏生二十八篇安國增多二十五篇及此析出五篇并小序一篇共五十九篇除開小序冠篇首正五十八篇也又案隸古尚書自堯典稱第一至秦誓第五十八中間禹貢湯誓泰誓不更稱第一也古文讀應爾雅故解古今語而可知也案藝文志故字上更有一雅字讀連下句顔師古於詩經魯故下注云故者通其指義也它皆類此今流俗毛詩改故訓傳為詁字失真耳又案爾雅有釋詀篇如顔説則雅故者即爾雅釋詁也讀書者依雅故解古今語則義可通矣故字上當補雅字晉書又云鄭沖以古文授蘇愈愈授梁栁栁之內兄皇甫謐又從栁得之而柳又以授臧曹曹始授梅頤頤乃於前晉奏上其書而施行焉據孔頴達敘此歷歷今本晉書無之恐太宗未修以前舊史所載也隋書經籍志云伏生口傳二十八篇又河內女子得泰誓一篇獻之武帝時魯恭王壞孔子舊宅得其末孫惠所藏之書字皆古文孔安國以今文校之得二十五篇其泰誓與河內女子所獻不同又伏生所誦有五篇相合安國並依古文開其篇第以隸古字寫之合成五十八篇作傳會巫蠱事起不得奏上私傳其業於都尉朝朝授膠東庸生謂之尚書古文之學而未得立後漢扶風杜林傳古文尚書同郡賈逵為之作訓馬融作傳鄭元亦為之注然其所傳唯二十九篇又雜以今文非孔舊本自餘絶無師説晉書祕府所存有古文尚書經文今無有傳者及永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾至東晉元帝時豫章內史汝南梅頤字仲真始得安國之傳奏之時又闕舜典一篇齊建武中吳興姚方興於大桁市得其書奏上比馬鄭所注多二十八字於是始列國學又云古文尚書舜典一卷晉豫章太守范寧注釋文序録云齊明帝建武中吳興姚方興采馬王之注造孔傳舜典一篇云於大桁頭買得上之郭忠恕佩觿云吳興大􅟘户剛反船舶之類又通鑑劉裕梟桓元首于大桁桁與􅟘航同船與市未詳孰是張霸所偽作釋文序録云百兩篇者東萊張霸分析二十九篇以為數十又採左傳書序為作首尾凡百二篇篇或數簡文意淺陋成帝時劉向校之非是後遂黜其書堯典説文典從册在丌上尊閣之也本注云典五帝之書也從册在丌上尊閣之也丌居之切下基也愚案典字於六書屬形兼意疏云策長二尺二寸簡長一尺二寸漢書藝文志云率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字愚觀書中脫簡錯簡多不過三十字則古書凡千萬言者簡編甚繁不可無架閣之所也曰粵越通古文作粵此即安國隸古文九族髙祖至玄孫之親此本安國及馬氏鄭氏説髙祖一曽祖二祖三父四已五子六孫七曽孫八玄孫九舉近以該逺五服異姓之親亦在其中也此是包歐陽夏侯及林氏説父族有四父本族一姑夫二姊妹夫三女夫四母族有三母父族一母母族二姨母家三妻族有二妻父族一妻母族二二十八宿衆星為經金木水火土五星為緯經不動者也緯往來行動者也案通志略載殷巫咸齊甘德魏石申三家經星都三百座一千四百六十五星內二十八宿計一百六十六星辰以日月所會分周天之度為十二次也晉天文志云自軫十二至氐四為夀星於辰在辰自氐五至尾九為大火於辰在卯自尾十至斗十一為析木於辰在寅自斗十二至女七為星紀於辰在丑自女八至危十五為玄枵於辰在子自危十六至奎四為諏訾於辰在亥自奎五至胃六為降婁於辰在戌自胃七至畢十一為大梁於辰在酉自畢十二至井十五為實沈於辰在申自井十六至栁八為鶉首於辰在未自栁九至張十六為鶉火於辰在午自張十七至軫十一為鶉尾於辰在已凡二十八宿度數闊狹多少隨時推步故歷代移易不同今但據晉史以見其槩耳其日月所會則每年立春後十六日有餘而日躔諏訾之次其正月合朔則在玄枵矣春分之旦朝方出之日而識其初出之景春分之日初出之景於地則在卯方之中於日則在卯時之中蓋春分已前則冬至日出辰漸漸南來未及乎卯中也春分已後漸漸北去至夏至而日出寅又過乎卯中也直至秋分則又自北而來至于卯中秋分以後又自卯中南行而至于辰為冬至故春分秋分日皆出卯晝夜皆五十刻而氣候亦得寒溫之中也星鳥南方朱鳥七宿唐一行推以鶉火為春分昏之中星也朱鳥七宿井鬼栁星張翼軫也一行玄宗時僧舊唐書云姓張名遂魏州人公謹之孫出家為僧於嵩山一云改名敬賢推周易大衍之數撰開元大衍厯中星者所以正四時日行之所在昏中則夕見於地之正南方旦中則晨見於地之正南方月令記昏旦二中堯典止記昏中古者玉衡之器以玉為管橫設之以二端對南北自南面北望之則北極正對管之北端自北面南望之則昏時某星正直管之南端在南上正午之地故謂之中星其北極一處則凝然不動常對管端其南上中星則逐時移動每夜定挨過一度蓋太陽所在星輝隱沒本不知其行在甚度惟從中星推之中星挨至某宿第幾度則黃道日軌亦退至西上日入處某宿第幾度晝考諸日影夜考諸中星則七政之運皆可推而厯日不差矣鶉火午上栁星張三宿也自驚蟄至清明則此三宿逐次為中星當春分之夕則星宿為中星也然此只是就堯典論之後世如月令史漢晉隋唐宋諸書所載中星皆不同有二十四氣中星又有五更中星蓋後世厯法漸密推步愈精不如古厯之簡易也史記索隱作南為謂所當為之事也索隱云訛依字讀春言東作夏言南訛皆是耕作營為勸農之事史記正義云訛于偽反據此索隱仍依史記作訛但闢孔本作訛耳敬致周禮所謂冬夏致日蓋以夏至之日中祠日而識其景如所謂日至之景尺有五寸謂之地中者也案周禮言致日者五處春官馮相氏云冬夏致日春秋致月以辨四時之敘注云冬至日在牽牛景丈三尺夏至日在東井景尺五寸疏云春秋分日在婁角而景長七尺三寸六分地官大司徒云以土圭之法測土深正日景以求地中又云日至之景尺有五寸謂之地中疏云土圭尺有五寸周公欲求土中而營王城故有土圭度日影之法測度也深謂日景長短之深也正日景者夏日至晝漏半表北得尺五寸景正與土圭等即地中也古注云景尺有五寸者南戴日下萬五千里地與星辰四遊升降於三萬里之中是以半之得地之中也鄭司農云以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然疏云南戴日下萬五千里者景一寸差千里故於地中尺五寸景去南戴日下萬五千里春官典瑞云土圭以致四時日月疏云度其景至不至通卦驗云冬至立八尺之表晝漏半度之表北得丈三尺景是其景至也或長或短則為不至也地官土方氏掌土圭之法以致日景注云致日景者夏至景尺有五寸冬至景丈三尺其間則日有長短疏云謂冬至日極短夏至日極長其極長極短之間冬至後日漸長夏至後日漸短假令冬至日南至之後日漸北之時日行大分六小分四大分者一寸為十分小分者十分寸之一分又為十分但日景一寸則於地千里大分一為百里小分一則為十里則冬至後日向南行六百四十里但冬至丈三尺景除本尺五寸外加丈一尺五寸從冬至至春分晝夜等之時則減五尺七寸半景從春分到夏至又減五尺七寸半景則減盡丈一尺五寸惟有尺五寸在以為夏至之景南戴日下萬五千里謂之地中故云其間則日有長短也冬官玉人云土圭尺有五寸以致日以土地注云致日度日景至否疏云於地中立八尺之表於晝漏半夏至日表北尺五寸景與土圭等冬至日丈三尺為景至若不依此皆為不至故云度景至不也但景至與不至皆由君政得失而來度之者若不至使君改德教也愚案歷代史志皆載日晷其長短並不同文多不録學者當自於全史考之可也日至之景尺有五寸謂之地中晉天文志云鄭衆説土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中今潁川陽城地也鄭元云凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去其下地八萬里矣日邪射陽城則天徑之半也體圓如彈丸地處天之半而陽城為中則日春秋冬夏昏明晝夜去陽城皆等無盈縮矣故知從日斜射陽城為天徑之半也以句股法言之旁萬五千里句也立極八萬里股也從日斜射陽城弦也以句股求弦法入之得八萬一千三百九十四里三十步五尺三寸六分天徑之半而地上去天之數也倍之得十六萬二千七百八十八里六十一步四尺七寸二分天徑之數也以周率乘之徑率約之得五十一萬三千六百八十七里六十八步一尺八寸二分周天之數也一度凡千四百六里二十四步六寸四分隋天文志云先驗昏旦定刻漏分辰次乃立儀表於準平之地名曰南表漏刻上水居日之中更立一表於南表影末名曰中表夜依中表以望北極樞而立北表令參相直三表皆以懸準定乃觀三表直者其立表之地即當子午之正三表曲者地偏僻每觀中表以知所偏中表在西則立表處在地中之西更當向東求地中若中表在東則立表處在地中之東更當向西求地中取三表直者為地中之正又以春秋二分之日旦始出東方半體乃立表於中表之東名曰東表令東表與日及中表參相直是日之夕日入西方半體又立表於中表之西名曰西表亦從中表西望西表及日參相直乃觀三表直者即地南北之中也若中表差近南則所測之地在卯酉之南中表差在北則所測之地在卯酉之北也進退南北求三表直正東西者則其地處中居卯酉之正也宋元嘉十九年遣使往交州測景夏至日影出表南三寸二分何承天計陽城去交州路當萬里而景差一尺八寸二分是六百里而差一寸也唐太史議曰交州去洛九千里蓋山川回折使之然以表考其弦當五千里平五千里影差一尺八寸二分則一千里管三寸六分四十杪日至之景尺有五寸則止該四千里不盡四分四十杪開元二年遣使天下候影太史監南宫説擇河南平地設水準繩墨植表以引度之大率五百二十六里晷差二寸餘南候林邑冬至晷六尺九寸夏至在表南五寸七分北候鐵勒夏至晷四尺一寸三分冬至晷二丈九尺二寸六分計陽城南距林邑經六千一百一十二里五月日在天頂北六度北距鐵勒與林邑正等則五月日在天頂南二十七度四分舊説千里而差一寸疏矣東方蒼龍七宿火謂大火蒼龍七宿角亢氐房心尾箕也大火卯宫氐房心也心亦獨稱大火北方玄武七宿之虛星玄武七宿斗牛女虛危室壁也日行至是則淪於地中萬象幽暗故曰幽都日出止於寅日入止於戌所行黃道則斜繞東南西三方其北方亥子丑三位日行之所不到惟夜半然後轉至地下北方而其光景沈伏不能反照故曰淪於地中萬象幽暗也西方白虎七宿之昴宿白虎七宿奎婁胃昴畢觜參也唐一行所謂嵗差者是也一行日度議曰考古史及日官候簿以通法之三十九分太為一嵗之差自帝堯演紀之端在虛一度及今開元甲子卻三十六度日在虛一則鳥火昴虛皆以仲月昏中合于堯典石刻尚書圖云古法以紀蔀為宗從伏羲先天甲寅積周一千八百一十四紀再入十五紀人元一十有二蔀當癸酉蔀嵗在己丑而生帝堯至甲辰嵗十有六即位越二十有一嵗得甲子而演紀作厯是年天正冬至日在虛一度又案紀元厯嵗周三百六十五度二千四百三十六分此一嵗之氣積也周天三百六十五度二千五百六十四分太陽所躔周天之度也嵗差一百二十八分注云以嵗周數除周天數即得太陽嵗行不及之分度每一萬注以一度為萬分自演紀至開元十二年甲子冬至日在斗十度凡退三十八度四千一百二十八分至乾德二年甲子冬至日在斗六度凡退四十一度四千八百四十八分至仁宗慶厯四年甲申冬至日在斗五度此法通古合今故知堯厯日在虛一度而鳥火昴虛以仲月昏中合堯典愚案自堯二十一年甲子至今至治元年辛酉計三千六百五十八年堯時冬至日在虛一今在箕九退過四十三度即以四十三為法除三千六百五十八得八十五是大約八十五年退一度矣三百六十五度四分度之一者三百六十五度之外其餘分於一度之中當四分之一如以一度分作九百四十分當得二百三十五分也繞地左旋者坐北面南則東為左西為右天運降於西升於東故為左旋常一日一周而過一度者天運一日夜轉一匝三百六十五度四分度之一之外又攙進一度也朱子語録云日月皆從角起日則一日運一周依舊只到那角上天則周了又過那角些子日日纍將去到一年便與日會又曰而今若就天裏看時只是行得三百六十五度四分度之一若把天外來説則是一日過了一度季通嘗言論日月則在天裏論天則在太虛空裏若去那太虛空裏觀天自是日日衮得不在舊時處麗天麗者附而不綴之義二十八宿及衆星不動者皆綴定於天體矣不及一度者恰行一周不及天所攙過一度也朱子語録陳安卿嘗問天道左旋自東而西日月右行則如何朱子曰橫渠説日月皆是左旋説得好蓋天行甚健一日一夜周天三百六十五度四分度之一而又過一度日行速健次於天一日一夜周三百六十五度四分度之一正恰好被天進一度則日卻成每日退了一度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所不及之度亦恰退盡本數遂與天會而成一年月行遲一日一夜三百六十五度四分度之一行不盡比之天郤成退了十三度有竒進數為順天而左退數若逆天而右厯家以進數難算只以退數算之故謂之右行且曰日行遲月行速也九百四十分者厯家額設一日細數也九百四十分日之二百三十五者即四分日之一也與天會者天每日攙過一度則是日每日追不及一度直待三百六十五日四分日之一而後日追及天也如是觀之卻不是日一年一周天乃是天一年而攙過一周天也日一日一周天一年有三百六十五次周天天一年三百六十六次周天十九分度之七者以一度分作十九分月行不及天十三度之外於十九分度之中又不及七分也此是并天攙過一度算如以一度為九百四十分而以十九除之則每分該四十九分四釐七毫三絲六忽八微以七乘之該三百四十六分三釐一毫五絲七忽六微以十九乘為全度該九百三十九分九釐九毫九絲九忽二微虧八微月一日夜實行三百五十二度八百二十八分六釐八毫四絲三忽四微不及天十三度三百四十六分三釐一毫五絲七忽六微九百四十分日之四百九十九者以一日十二時除九百四十則一時該七十八分三分分之一此云四百九十九者是六時令二十九分也而與日會者日月合朔也每年正月朔或立春前或立春後皆會于玄枵二月朔會娵訾逆周十二位十二會得全日三百四十八者十二箇二十九日也五千九百八十八者十二箇四百九十九分也如日法九百四十而一得六者以九百四十為一日之法而除五千九百八十八得六箇九百四十為六日也不盡三百四十八者除六箇九百四十該五千六百四十之外尚餘三百四十八也通計得日三百五十四者有全日三百四十八并餘分之積得六日也九百四十分日之三百四十八者即上除不盡之數計四時令三十四分三分分之二也三百六十者厯家設此為常額多於此者為盈少於此者為虛易曰乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日正謂此也氣盈者從二十四氣算來三百六十之外所多者也朔虛者從十二月朔算來三百六十之內所少者也一嵗閏率者合氣盈朔虛之數也其詳具於左方一日九百四十分一月二十九日四百九十九分一嵗三百六十五日二百三十五分是日行之數二十四氣一周也一年三百五十四日三百四十八分是月行之數十二月朔一周也一期大約三百六十日以為常數從二十四氣算來則日與天會多五日二百三十五分為氣盈從十二月朔算來則月與日會少五日五百九十二分為朔虛合氣盈朔虛而閏生焉一年閏率十日八百二十七分二年閏率二十一日七百一十四分三年閏率三十二日六百一分除二十九日四百九十九分作一閏外餘三日一百二分四年閏率一十三日九百二十九分五年閏率二十四日八百一十六分借下年四日六百二十三分湊作再閏六年閏率六日二百四分七年閏率一十七日九十一分八年閏率二十七日九百一十八分借下年一日五百二十一分作第三閏九年閏率九日三百六分十年閏率二十日一百九十三分十一年閏率三十一日八十分作第四閏外餘一日五百二十一分十二年閏率一十二日四百八分十三年閏率二十三日二百九十五分十四年閏率三十四日一百八十二分作第五閏外餘四日六百二十三分十五年閏率一十五日五百一十分十六年閏率二十六日三百九十七分借下年三日一百二分湊作第六閏十七年閏率七日七百二十五分十八年閏率一十八日六百一十二分十九年閏率二十九日四百九十九分正作第七閏無餘無欠一年率十日八百二十七分十九年積一百九十日一萬五千七百一十三分除為二百六日六百七十三分分為七閏每閏二十九日四百九十九分除盡無餘故曰氣朔分齊謂之一章一行云厯法合二始以定剛柔二中以定律厯二終以紀閏餘二始者一為陽始二為隂始一竒為剛二偶為柔甲丙戊庚壬為剛日乙丁己辛癸為柔日二中者五為陽中六為隂中五者十日六者十二辰也五音及十二律為六十十日十二辰亦為六十故律厯志兼之二終者十為隂終九為陽終故閏法以十九嵗為一章也三嵗一閏非四則三五嵗再閏非十一則十二八嵗三閏非八則九十一嵗四閏非四則五十四嵗五閏非正則二十六嵗六閏非十則九十九嵗七閏非六則七鯀崇伯名疏云崇國伯爵史正義引皇甫謐云崇夏鯀封虞夏商周皆有崇國殷之崇國文王所伐者寰宇記在京兆鄠縣鯀婞直楚辭注婞胡冷反很也書蔡氏傳旁通卷一上欽定四庫全書書蔡氏傳旁通卷一中元陳師凱撰舜典東晉梅賾上孔傳案此注全用孔氏疏檢晉書無之惟隋書經籍志有此事而以姚方興為姚興以方字讀連下文又以大航為大桁未知孰是王范之注王肅范寧也隋志有王肅注古文尚書十一卷范寧注古文尚書舜典一卷陸氏釋文云舜典王氏注相承云梅賾上孔氏傳古文尚書亡舜典一篇時以王肅注頗類孔氏故取王注從慎徽五典以下為舜典以續孔傳徐仙民亦音此本今依舊音之曰若稽古帝舜曰重華協于帝此十二字是姚方興所上孔氏傳本無阮孝緒七録亦云然方興本或此下更有濬哲文明溫恭允塞玄德升聞乃命以位凡二十八字異聊出之於王注無施也愚案此前題云王氏注又云今依舊音之又云聊出之於王注無施則陸氏似謂此注仍是王氏本特附入方興所上二十八字或十二字又案序録云舜典一篇仍用王肅本則今古注舜典是王氏注明矣齊蕭鸞南朝齊明帝隋開皇初購求遺典開皇三年因祕書牛宏上表言典籍散逸詔獻書一卷賚縑一匹左氏所謂無違教也見文十八年此蓋又兼四嶽之官四嶽主四方之諸侯經云賔于四門故知舜以百揆兼四嶽也易震驚百里不喪匕鬯意為近之程子曰雷之震動驚及百里人無不懼而自失唯宗廟祭祀執匕鬯者則不致於喪失人之致其誠敬莫如祭祀則雖雷震之威不能使之懼而失守故臨大震懼能安而不自失者唯誠敬而已朱子曰匕所以舉鼎實鬯以秬黍酒和鬱金所以灌地降神者也天文志云言天體者三家案此段注全據孔氏疏此所謂天文志乃蔡雍所作非諸史之志也一曰周髀傍米切二曰宣夜三曰渾天晉書云一曰蓋天蔡雍所謂周髀者即蓋天之説也其本包犧氏立周天歷度其所傳則周公受於殷商周人志之故曰周髀宣夜絶無師説不知其狀如何孔疏云宣明也夜幽也幽明之數其術兼之但絶無師説今案晉志云宣夜之書云惟漢袐書郎郗萌記先師相傳云天了無質仰而瞻之髙逺無極眼瞀精絶故蒼蒼然也譬之旁望逺道之黃山而皆青俯察千仭之深谷而窈黑夫青非真色而黑非有體也日月衆星自然浮生虛空之中其行其止皆須氣焉是以七曜或逝或住或順或逆伏見無常進退不同由乎無所根繫故各異也故辰極常居其所而北斗不與衆星西沒也攝提填星皆東行日行一度月行十三度遲疾任情其無所繫著可知矣若綴附天體不得爾也愚按此説頗似朱子所謂天無形質只是氣旋轉之説周髀之術晉志云髀股也股者表也其言天似蓋笠地法覆槃天地皆中髙外下北極之下為天地之中其地最髙而滂沱四隤三光隱映以為晝夜天中髙於外衡冬至日之所在六萬里北極下地髙於外衡下地亦六萬里外衡髙於北極下地二萬里天地隆髙相從日去地恆八萬里日麗天而平轉分冬夏之間行道為七衡六間每衡周徑里數各依算術用句股重差推晷景極遊以為逺近之數皆得於表股者也故曰周髀漢王仲任據蓋天之説日隨天而轉非入地夫人目所望不過十里天地合矣實非合也逺使然耳今視日入非入也亦逺耳當日入西方之時其下之人亦將謂之為中也四方之人各以其近者為出逺者為入矣何以明之今試使一人把大炬火夜行於平地去人十里火光滅矣非滅也逺使然耳今日西轉不復見是火滅之類也愚案孔疏下天似下脫蓋笠地法四字蔡傳亦脫之當補渾天説曰天包地外猶卵之裏黃圓如彈丸此説是吳中常侍廬江王蕃所作也晉志亦引之又案晉志及孔疏裏字皆作裹取包裹之義今蔡傳諸本並訛作裏字又隋書謂如卵則稍長不若如彈丸為是其天居地上見者一百八十二度半強此度是自東數向西去直排定者如機上數經絲也北極出地上三十六度南極入地下亦三十六度此下數句論度數直至冬至去極一百一十五度皆是自北數向南去橫布定者如機上數緯絲也愚案在天度數其初止以為日行之限布在黃道上斜繞天腹其三百六十五度如甜瓜文北極如甜瓜蒂其後渾天家見天體圓如彈丸南北東西縱廣如一遂借三百六十五度闊狹之限橫布於天以記三極相去及出地入地冬夏二至春秋二分日行相去中間所隔廣狹多寡之數是以渾天説中所論度數有以縱言者有以橫言者讀者宜别之洛下閎始經營之鮮于妄人又量度之至宣帝時耿夀昌始鑄銅為之象此皆據孔疏漢志不載今案晉志云漢太初初洛下閎鮮于妄人耿夀昌等造圓儀以考厯度又案隋志云渾天儀者羲和之舊器積代相傳謂之機衡又有渾天象者以著天體以布星辰古舊渾象以二分為一度周七尺三寸半而莫知何代所造今案歷喜云洛下閎為武帝於地中轉渾天定時節作泰初厯或其所製也一云洛下閎姓姚氏字長公隱於洛下巴人也愚案隋志分儀象為二篇謂機衡為儀謂有機無衡者為象故注疏及傳亦或言象或言儀各有所指也宋錢樂又作渾天儀衡長八尺孔徑一寸璣徑八尺圓周二丈五尺強錢樂本名樂之孔疏脫之字南史無傳隋志言徑八尺者漢候臺銅儀也又梁華林重雲殿前所置銅儀亦徑八尺檢其鐫題是劉曜光初六年史官丞孔挺所造又云宋文帝元嘉十三年太史令錢樂之采效儀象鑄銅為之徑六尺八分少周一丈八尺二寸六分少地在天內不動以為渾儀則內缺衡管以為渾象則地不在外是别為一體愚案孔疏與正史大同小異蔡傳正據疏義耳歷代以來其法漸密本朝因之為儀三重其在外曰六合儀次其內曰三辰儀最其內曰四逰儀渾儀至唐李淳風一行而法甚密本朝因之者言宋亦因用舊儀之法不曽改創法度也案新唐書天文志貞觀初李淳風上言舜在璿璣玉衡以齊七政則渾天儀也太宗因詔為之七年儀成表裏三重下據準基狀如十字末樹鼇足以張四表一曰六合儀有天經雙規金渾緯規金常規相結於四極之內列二十八宿十日十二辰經緯三百六十五度二曰三辰儀圓徑八尺有璿璣規月逰規列宿距度七曜所行轉於六合之內三曰四遊儀玄樞為軸以連結玉衡逰筒而貫約規矩又玄樞北樹北辰南距地軸傍轉於內玉衡在玄樞之間而南北遊仰以觀天之辰宿下以識器之晷度皆用銅帝稱善置於凝暉閣又舊唐書天文志云開元九年詔一行與梁令瓚更造渾儀鑄銅為圓天之象上具赤道黃道周天度數注水激輪令其自轉一日一夜天轉一周命之曰水運渾天俯視圖置於武成殿前其規環尺寸具載唐志文多不録宋太宗更名太平渾儀四遊儀爾雅疏云地與星辰俱有四遊升降立春西遊春分正中立夏北遊夏至極下立秋東遊秋分正中立冬南遊冬至極上夏至之時地下萬五千里冬至上遊萬五千里升降於三萬里之中愚謂天動地靜地氣雖升降而地之體則隤然不動所謂四遊決無此理輒據此以釋四遊儀之所以得名耳黑雙環所刻去極度數皆是自北數向南去之度赤單環黃單環所刻度數皆是自西數向東去之度厯家之説又以北斗魁四星為璣杓三星為衡史記天官書云北斗七星所謂琁璣玉衡以齊七政索隱曰春秋運斗樞云斗第一天樞第二璇第三璣第四權第五衡第六開陽第七搖光第一至第四為魁第五至第七為杓晉志云魁四星為琁璣杓三星為玉衡郊祀者祭昊天之常祭古者天子以冬至日於國之南郊祭天於圜丘於郊故謂之郊鄭氏通志略云祀昊天上帝禮神之玉以蒼璧其牲及幣各隨玉色牲用一犢幣用繒長丈八尺王服大裘其冕無旒尸服亦然乘玉輅錫繁纓十有再就建太常十有二旒樽及葅醢之器以瓦爵以匏藉神之席以藁秸及蒲翦而不納配以帝嚳禋精意以享之謂見國語所尊祭者其祀有六禮記疏云埋少牢於泰昭祭時也者謂祭四時隂陽之神也泰昭壇名也昭取明也春夏為陽秋冬為隂若祈隂則埋牲祈陽則不應埋之今總云埋者以隂陽之氣俱出入於地中而生萬物故並埋之以享隂陽為義也用少牢者降於天地也自此以下及日月至山林並少牢也先儒並云不薦熟唯殺牲埋之也相近於坎壇祭寒暑也者相近當為攘祈攘郤也寒暑之氣應退而不退則祭攘郤之令退也祈求也寒暑之氣應至而不至則祭求之令至也寒則於坎寒隂也暑則於壇暑陽也王宫祭日也者王君也宫亦壇也營域如宫也日神尊故其壇曰君宫也夜明祭月也者祭月壇名也月明於夜故謂其壇為夜明也幽宗祭星也者祭星壇名也幽暗也宗當為禜禜壇域也星至夜而出故曰幽也為營域而祭之故曰幽禜也雩宗祭水旱也者亦壇名也雩吁嗟也水旱為人所吁嗟禜亦營域也為營域而祭之故曰雩禜也羣神謂丘陵墳衍古昔聖賢之類周禮大司徒辨其山林川澤丘陵墳衍原隰之物注云積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水涯曰墳下平曰衍髙平曰原下濕曰隰愚謂地有十等蔡傳止云丘陵墳衍者又案小宗伯兆山川丘陵墳衍各因其方山川已見上文故此止稱丘陵墳衍也古昔聖賢者小宗伯注云三皇五帝九皇六十四民咸祀之愚謂如祭法有功烈於民者皆是也桓圭周禮疏云桓若屋之桓楹桓宫室之象所以安其上也四植謂之桓柱之豎者豎之則有四稜也桓圭蓋以桓為琢飾長九寸信圭躬圭周禮注云信當作身皆象以人形為琢飾欲其慎行保身皆長七寸榖璧蒲璧周禮注云榖所以養人蒲為席所以安人二玉蓋以榖蒲為琢飾皆徑五寸不執圭者未成國也愚按大宗伯云七命賜國子男五命故云未成國也天子執冒周禮疏云方四寸邪刻之燔柴以祀天禮記燔柴於泰壇燔音煩疏云燔柴於泰壇者謂積薪於壇上而取玉幣及牲置柴上燔之使氣達于天也祭禮通解云陽祀自煙始隂祀自血起五嶽視三公四瀆視諸侯其餘視伯子男者也王制疏云五嶽視三公四瀆視諸侯其餘山川視伯小者視子男鄭注云謂其牲幣粢盛籩豆爵獻之數非謂尊卑劉向説苑曰五嶽何以視三公能大布雲雨焉能大斂雲雨焉觸石而出膚寸而合不崇朝而雨天下施德博大故視三公也四瀆何以視諸侯能蕩滌垢濁焉能遹百川於海焉能出雲雨千里焉為施甚大故視諸侯也山川何以視子男也能出物焉能潤澤物焉能生雲雨為恩多然品類以百數故視子男也肆覲東后王制疏曰覲見也謂見東方諸侯案覲禮云諸侯覲於天子為宫方三百步四門壇十有二尋深四尺鄭注云王巡守至于方嶽之下諸侯會之亦為此宫以見之王升立於壇上南面諸公中階之前北面諸侯東階之東西面諸伯西階之西東面諸子門東北面諸男門西北面王降階南面而見之三揖既升壇使諸侯升公拜於上等侯伯於中等子男於下等律凡十二管皆徑三分有竒空音孔圍九分而黃鍾之長九寸律呂本原云天地之數始於一終於十其一三五七九為陽九者陽之成也其二四六八十為隂十者隂之成也黃鍾者陽聲之始陽氣之動也故其數九分寸之數具于聲氣之元不可得而見及斷竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分積其實得八百一十分是為律本度量權衡於是而受法十一律由是而損益焉大吕以下律吕相間以次而短至應鍾而極焉律吕本原云黃鍾九寸大吕八寸三分七氂六毫太蔟八寸夾鍾七寸四分三釐七毫三絲姑洗七寸一分仲吕六寸五分八氂三毫四絲六忽蕤賔六寸二分八釐林鍾六寸夷則五寸五分五氂一毫南吕五寸三分無射四寸八分八氂四毫八絲應鍾四寸六分六氂以之制樂而節聲音律吕本原云黃鍾之數九九八十一是為五聲之本故宫聲八十一三分損一以下生徵徵聲五十四三分益一以上生商商聲七十二三分損一以下生羽羽聲四十八三分益一以上生角角聲六十四以三分之不盡一算數不可行此聲之數所以止於五也朱子曰五聲之序宫最大而沈濁羽最細而輕清商之大次宫徵之細次羽而角居四者之中焉愚謂五聲之大小出於五行之生數數少者清數多者濁天一生水數最少故羽最清天五生土數最多故宫最濁地二生火故徵之清次羽地四生金故商之濁次宫天三生木居四者之中故角音之清濁亦居四者之中也實本於河洛之自然豈人力之所強為哉以之審度而度長短律吕本原云度者分寸尺丈引所以度長短也生於黃鍾之長以子榖秬黍中者九十枚度之一為一分十分為寸十寸為尺十尺為丈十丈為引注云凡黍實於管中則十三黍三分黍之一而滿一分積九十分則千有二百黍矣故此九十黍之數與下章千二百黍之數其實一也前漢律厯志云以子榖秬黍中者一黍之廣度之蔡元定云一黍之廣為分故纍九十黍為黃鍾之長積一千二百黍為黃鍾之廣愚案孔疏云以一黍之廣度之千二百黍為一分非也以之審量而量多少律吕本原云量者籥合升斗斛所以量多少也生於黃鍾之容以子榖秬黍中者一千二百實其籥以井水準其概以度數審其容合籥為合注云兩籥也十合為升二十籥也十升為斗二百籥也十斗為斛二千籥也愚案元定律吕書以合籥為合而蔡傳謂十籥為合蓋誤於孔疏也孔疏謂十籥為合非也漢志亦謂合籥為合蓋合者取合並二籥之義故一升該二十籥一斛該二千籥也若謂十籥為合則一斛該萬籥而量過於大矣西山父子以律吕名家不應相反是殆誤録疏文而失於檢正也據朱子文集亦作合籥為合洪範內篇亦作合籥為合蔡傳之訛當改以之平衡而權輕重律吕本原云權衡者銖兩斤鈞石所以權輕重也生於黃鍾之重以子榖秬黍中者一千二百實其籥百黍重一銖一籥重十二銖二十四銖為一兩注云兩籥也十六兩為斤三十二籥也三十斤為鈞九百六十籥也四鈞為石三千八百四十籥也孔疏云衡平也權重也稱上謂之衡稱鎚謂之權黃鍾所以為萬事根本史記律書王者制事立法物度軌則一稟於六律六律為萬事根本焉蔡氏又推黃鍾為六律之元故曰黃鍾為萬事根本也五禮吉凶軍賔嘉周禮大宗伯以吉禮事邦國之鬼神示祇以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌風師雨師以血祭祭社稷五祀五嶽以貍埋沈沉祭山林川澤以疈僻辜祭四方百物以肆剔獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀寇亂以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同時聘曰問殷眺曰視以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也以嘉禮親萬民以飲食之禮親宗族兄弟以昏冠之禮親成男女以賔射之禮親故舊朋友以饗燕之禮親四方之賔客以脤膰之禮親兄弟之國以賀慶之禮親異姓之國注云禋祀煙氣之臭聞者槱積也詩薪之槱之三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也司中三能台司命文昌宫風師箕也雨師畢也隂祀自血起貴氣臭也社稷土榖之神社祀勾龍稷祀棄五祀五官之神少昊氏之子曰重為勾芒食於木該為蓐收食於金修及熙為玄冥食於水顓頊氏之子曰黎為祝融后土食於火土五嶽東岱南衡西華北恆中嵩髙祭山林曰埋川澤曰沈疈辜疈牲胸也謂磔攘及蠟祭肆進所解牲體謂薦孰時也獻獻醴謂薦血腥也祼灌以鬱鬯謂始獻尸求神也祫言肆獻祼禘言饋食著有黍稷互相備也札疫癘也禍災水火也禬禮同盟者合會財貨以更其所喪恤鄰國相憂也殷見殷猶衆也殷俯諸侯使卿以大禮衆聘大師用其義勇大均均其地政地守地職所以憂民大田簡車徒大役築宫室大封正封疆嘉善也所以因人心之善者而為之制脤膰社稷宗廟之肉纁玄黃不見禮經蔡傳只據古注孔疏亦云未知出何書王肅所注同羔雁雉疏云羔取其羣而不失其類鴈取其候時而行雉取其守介死不失節雉不可生知一死是雉也民功曰庸夏官司勳文王功曰勳若周公國功曰功若伊尹民功曰庸若后稷事功曰勞若禹治功曰力若咎繇戰功曰多若韓信中古之地但為九州中古指禹治水以前朱子大全集作古者中國之地始分冀東恆山之地為並州東字誤夏官職方氏云正北曰並州其山鎮曰恆山朱子語類云分冀州西為并州今案長安禹迹圖及東坡地理指掌圖皆以並州在冀州之西通典云並州左有恆山之險右有大河之固則在冀之西明矣其東北醫無閭之地為幽州職方氏云東北曰幽州其山鎮曰醫無閭注云醫無閭在遼東書疏云知分冀州為並州者以職方有幽並周立州名必因於古知舜時當有幽並且職方幽並山川於禹貢皆冀州之域知分冀州為之也又分青之東北遼東等處為營州爾雅曰齊曰營州疏云齊有營丘豈是名乎書疏云齊即青州之地知分青州為之董氏輯纂引曾氏謂分冀為營又引王氏謂非分青為營二説皆非又案杜氏通典以安東府屬古青州指掌圖云以青州越海析遼東之地為營州注云今安東府與通典合營非分於冀明甚又案指掌圖云舜肇分為十二州蓋以古冀州南北闊大分衛水為並州衛水在真定分燕以北為幽州又案堯都平陽後為唐國唐後為晉今為平陽路舜都蒲坂為今河中府禹都晉陽又徙安邑安邑屬解州在禹貢時皆屬冀州在舜分十二州時皆屬並州通典言左有恆山右有大河則唐虞夏所都皆在並州之域但並州設未久後復合於冀故五子之歌曰惟彼陶唐有此冀方後世地理書皆以禹貢為定莫能别此三都為並州爾冀州止有河內之地今河東一路是也案地理指掌圖宋河東路所管平陽隆德威勝平定太原大通寧化岢嵐汾遼綘隰火山靖康代欣石憲麟豐保德二十一郡然皆正並州之境不知何以指為冀州之地恐以職方有其浸汾潞之文而並州浸淶易故以河東為冀州歟然汾晉之地自史漢而下皆以為並輿地所載沿革甚詳尚再思之每州封表一山為一州之鎮如職方氏職方氏云東南曰揚州其山鎮曰會稽澤藪曰具區川三江浸五湖正南曰荆州山鎮曰衡山澤藪曰雲夢川江漢浸潁湛河南曰豫州山鎮曰華山澤藪曰圃田川滎雒浸波溠正東曰青州山鎮曰沂山澤藪曰望諸川淮泗浸沂沭河東曰兖州山鎮曰岱山澤藪曰大野川河泲浸盧維正西曰雍州山鎮曰嶽山澤藪曰弦蒲川涇汭浸渭洛東北曰幽州山鎮曰醫無閭澤藪曰貕養川河泲浸淄時河內曰冀州山鎮曰霍山澤藪曰楊紆川漳浸汾潞正北曰并州山鎮曰恆山澤藪曰昭餘祈川呼池嘔夷浸淶易然舜既分十有二州至商時又但言九圍九有周禮職方氏亦止列為九州則是十二州蓋不甚久不知其自何時復合為九也周禮疏云此州界揚荆豫兖雍冀與禹貢略同者不失本處雖得舊處猶有相侵入不得正若周之兖州於禹貢侵青徐之地周之青州於禹貢侵豫州之地周之雍豫於禹貢兼梁州之地周之冀州小於禹貢時冀州以其北有幽燕並州故知也周之九州無徐梁禹貢有徐梁無幽並爾雅云兩河間有冀州河南曰豫州濟東曰徐州河西曰雍州漢南曰荆州江南曰揚州燕曰幽州濟河間曰兖州齊曰營州詩譜曰雍梁荆豫徐揚之民咸被其化數不同者禹貢所云堯舜法爾雅所云似夏法詩譜所云似殷法自古以來皆有九州惟舜時暫置十二州至夏時還為九州故春秋云夏之方有德也貢金九牧是也愚案十二州至禹即位時必復為九州而其州名必合爾雅而不合禹貢爾雅又云從釋地以下至九河皆禹所名既為禹所名乃有幽營而無青梁是不用禹貢舊名也謂禹時未復九州歟則既有十二州何為貢金九牧而所鑄者九鼎邪何為五子之歌以所都為冀方邪可以知省十二為九者必禹時無疑也夏楚二物學記注云夏槄也古雅反楚荆也爾雅注云槄今之山楸金黃金贖贖其罪黃金依孔氏傳疏云黃金銅也古之贖罪皆用銅漢始用黃金但少其斤兩令與銅相敵愚謂贖者贖鞭撲之罪此五句從重入輕典刑最重流宥次之鞭輕撲又輕贖又輕二句或由重而即輕指眚災肆赦所犯雖重然出於過誤不幸直赦之也或由輕而即重指怙終賊刑所犯雖輕然有所倚恃故意再犯必賊殺之也據此經文則五刑有流宥而無金贖金贖在鞭撲之下鞭撲已在五刑之外以待罪之輕者金贖又在鞭撲之外則輕之又輕者蓋典刑至重鞭撲至輕流宥以待典刑之稍輕金贖以待鞭撲之尤輕者當分作三段看典刑流宥為一段所以言其重也鞭撲金贖為一段所以言其輕也眚災怙終為一段所以言法外意也殛則拘囚困苦之朱子語録云殛非殺也洪範云殛死猶今言貶死又云殛鯀于羽山想是偶然在彼而殛之隨其罪之輕重而異法輯纂引孫氏云放重於流竄重於放殛重於竄怒在四凶舜何與焉可怒者在四凶非舜之私意怒之也程子云喜怒在事則理之當喜怒者也又云如鑑之照物姸媸在彼隨物應之而已春秋傳所記四凶之名與此不同説者以窮竒為共工渾敦為歡兜叨餮為三苗檮杌為鯀文公十八年注云渾敦不開通之貌窮竒其行窮其好竒檮杌頑凶無儔匹之貌貪財為叨貪食為餮堯十六即位在位七十載該八十六年又試舜三載該八十九年又不聽政二十八載該一百一十七年稽古録云夀百一十七歲而崩孔氏云喪畢之明年不知何所據蓋以上文有三載字此繫以月正元日故意為百姓既喪三載則舜亦為喪畢之明年也孟子云堯崩三年之喪畢舜避堯之子於南河之南是也能者擾而習之也左傳云不相能也與此能字義相近僉衆也四嶽所領四方諸侯有在朝者也舜問四嶽四嶽止一人而稱僉曰者可知為四嶽所領諸侯之辭也平水土者司空之職周官云司空掌邦土居四民時地利如周以六卿兼三公輯纂引傅良云周召以師保為冢宰是卿兼三公也顧命自同召太保奭以下皆卿也是時召公為保兼冢宰芮伯為司徒彤伯為宗伯畢公為司馬皆是以三公兼之後世以他官平章事知政事亦此類也李沆制詞吕蒙正中書侍郎兼户部尚書平章事鄭獬制詞富弼尚書左僕射兼門下侍郎同中書門下平章事士理官也月令注理獄官也夏曰大理韻會云臯陶為大理吕刑所謂上服下服是也吕刑云上刑適輕下服下刑適重上服蔡傳云事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終者是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚者是也惟大辟棄之於市宫刑則下蠶室餘刑亦就屏處蓋非死刑不欲使風中其瘡誤而至死宫刑腐刑也如草木腐而生意絶也前漢司馬遷傳茸以蠶室師古云茸人勇反推也蠶室初腐刑所居溫密之室也又衛宏漢官舊儀云皇后親桑於苑中蠶室置蠶官令丞諸天下官下法皆詣蠶室與婦人從事又三輔黃圖云蠶室行腐刑之所司馬遷下蠶室屛處隱風處也朱子語録云宫刑下蠶室其他底刑也是就箇隱風處不然牽去當風割了耳鼻豈不害破傷風胡亂死了人又祭義云古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之疏云仞三尺髙一丈也棘牆者牆上置棘外閉謂扇在户外閉也曲禮六工殷制周禮有攻木之工考工記云攻木之工七輪輿弓廬匠車梓攻金之工六築冶鳧栗段桃攻皮之工五函鮑韗韋裘設色之工五畫繢鍾筐㡆刮摩之工五玉楖雕矢磬摶埴之工二陶旊攦工垂之指陸氏釋文云攦吕係反又力結反虞山澤之官周禮分為虞衡屬於夏官夏字誤案周禮地官山虞每大山中士四人下士八人中山下士六人小山下士二人林衡每大林麓下士十有二人中林麓如中山之虞小林麓如小山之虞川衡每大川下士十有二人中川下士六人小川下士二人澤虞每大澤大藪中士四人下士八人中澤中藪如中川之數小澤小藪如小川之數府史胥徒在外輯纂引曽氏云益蓋為衆虞之長耳又周禮注云虞度也度知山之大小及所生者衡平也平林麓之大小及所生者三禮祀天神享人鬼祭地祗之禮其詳已見上文五禮下天神昊天上帝日月星辰司中司命風師雨師是也人鬼先王宗廟是也地祗社稷五祀五嶽山林川澤是也周禮亦謂之宗伯而都家皆有宗人之官周禮春官宗伯掌邦禮其屬有都宗人家宗人注云都王子弟所封及公卿所食邑家謂大夫所食采地大司樂掌成均之法賈氏疏云成均五帝學名大司樂以樂德教國子中和祇庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武蕩滌邪穢斟酌飽滿出史記樂書主聲音而言其和平足以蕩滌人之邪穢其節奏足以斟酌人之飽滿所謂樂而不淫和而不流也周子通書曰樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋動蕩血脈流通精神亦出史記主舞蹈而言其動以干戚飾以羽旄屈伸俯仰綴兆舒疾足以動蕩人之血脈流通人之精神所謂樂行而倫清耳目聰明血氣和平者也養其中和之德而救其氣質之偏者也樂記云先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也又曰樂也者天地之命中和之紀又周子通書云優柔平中德之盛也天下化中治之至也又曰樂者本乎政也政善民安則天下之心和故聖人作樂以宣暢其和心達于天地天地之氣感而大和焉愚案周子之言中和是兼內外體用而言若中庸所謂中和則中為性之德和為情之德靜而無少偏倚則能養其中矣動而無少差繆則能養其和矣蓋氣質之性有剛善剛惡柔善柔惡之偏惟能養其中和之德則直者必溫寬者必栗剛者不至於虐簡者不至於傲矣大抵歌聲長而濁者為宫以漸而清且短則為商為角為徵為羽所謂聲依永也朱子語類云古人曉音律風角鳥占皆能之愚案管子地貟篇云凡聽徵如負豬豕覺而駭凡聽羽如鳴馬在野凡聽宫如牛鳴窖中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清李淳風云宫音如牛鳴牢中隆隆如雷聲響商音如離羣之羊如叩鐘如飛集之羽如汲水咨嗟聲感人角音如千人語銀銀然令人悲哀如人呌啾啾如千人呼嘯如雞登木徵音如奔馬炎上如縛彘駭起羽音如擊濕鼓如流水揚浪激聲相磋如麋鹿鳴人之歌聲難以類比愚嘗察之人聲怒聲多宫哀聲多商樂聲多角喜聲多徵聚聲多羽如歌聲則又以其抑揚髙下而辨之如燕太子丹送荆軻至易水上髙漸離擊築荆軻和而歌為變徵之聲士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慷慨士皆瞋目髮盡上指冠如此皆在歌呼抑揚之間變徵之聲清楚故能使人幽憂涕泣復為羽聲本尚幽怨才加慷慨則其聲頓揚近於變宫便能聳動感激使人瞋目豎髮故人之聽聲必在聲入心通之妙難以言述古之雅歌今皆不傳雖詩章具在終不得其抑揚髙下之法也假令黃鍾為宫則太蔟為商姑洗為角林鍾為徵南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫也三分損益隔八相生者三分黃鍾之長而損其一自子至未下生林鍾長短已見前如黃鍾九寸三分而損一則得六寸為林鍾之長三分林鍾之長而益其一自未至寅上生太蔟三分太蔟之長而損其一自寅至酉下生南吕三分南吕之長而益其一自酉至辰上生姑洗三分姑洗之長而損其一自辰至亥下生應鍾三分應鍾之長而益其一自亥至午上生蕤賔三分蕤賔之長而益其一自午至丑上生大吕三分大吕之長而損其一自丑至申下生夷則三分夷則之長而益其一自申至卯上生夾鍾三分夾鍾之長而損其一自卯至戌下生無射三分無射之長而益其一自戌至已上生仲吕陽律生隂吕謂之下生凡五位布算者倍其實三其法隂吕生陽律謂之上生凡六位四其實三其法又案蔡氏律吕證辨云大吕夾鍾仲吕止得半聲必用倍數乃與天地之氣相應故應鍾上生蕤賔蕤賔又復上生大吕也朱子語類云自唐以前樂律尚有制度可考唐以後都無可考杜佑通典所算本朝范馬諸公非惟不識古制自是於唐制亦不曽看通典又不是隱僻底書不知當時諸公何故皆不看愚案語録朱子多責人不讀通典今據五聲六律十二管還相為宫禮運注疏極詳諸史志亦言之西山蔡氏律吕本原尤為明白兹不遍録具載通典説于后云五聲六律旋相為宫其用之法先以本管為均八音相生或上或下取五聲令足然後為十二律旋相為宫若黃鍾之均以黃鍾為宫黃鍾下生林鍾為徵林鍾上生太蔟為商太蔟下生南吕為羽南吕上生姑洗為角此黃鍾之調也姑洗皆三分之次故用正律之聲也若大吕之均以大吕為宫大吕下生夷則為徵夷則上生夾鍾為商夾鍾下生無射為羽無射上生仲吕為角此大吕之調也仲吕皆三分之次故用正律之聲也太蔟之均以太蔟為宫太蔟下生南吕為徵南吕上生姑洗為商姑洗下生應鍾為羽應鍾上生蕤賔為角此太蔟之調也蕤賔皆三分之次故用正律之聲也夾鍾之均以夾鍾為宫夾鍾下生無射為徵無射上生仲吕為商仲吕上生黃鍾為羽黃鍾正律之聲長非商三分去一之次此用其子聲為羽也黃鍾下生林鍾為角林鍾子聲短非仲吕為商之次故還用林鍾正管之聲為角夾鍾之調有四正聲一子聲姑洗之均以姑洗為宫姑洗下生應鍾為徵應鍾上生蕤賔為商蕤賔上生大吕為羽正聲長用其子聲為羽大吕下生夷則為角夷則子聲短故還用正聲為角此姑洗之調亦正聲四子聲一也仲吕之均以仲吕為宫仲吕上生黃鍾為徵正聲長用其子聲黃鍾下生林鍾為商林鍾子聲短用正聲為商林鍾上生太蔟為羽大蔟正聲長故用其子聲為羽太蔟下生南吕為角此仲吕之調正聲三子聲二也蕤賔之均以蕤賔為宫蕤賔上生大吕為徵大吕正聲長故用子聲為徵大吕下生夷則為商夷則上生夾鍾為羽正聲長故用子聲為羽夾鍾上生無射為角子聲短還用正聲為角此蕤賔之調亦二子聲三正聲也林鍾之均以林鍾為宫林鍾上生太蔟為徵太蔟正聲長用子聲為徵太蔟下生南吕為商南吕上生姑洗為羽姑洗正聲長故用子聲姑洗下生應鍾為角應鍾子聲短還用正聲為角此林鍾之調亦子聲二正聲三也夷則之均以夷則為宫夷則上生夾鍾為徵夾鍾正聲長故用子聲為徵夾鍾下生無射為商子聲短故還用正聲為商無射上生仲吕為羽仲吕正聲長故用子聲為羽仲吕上生黃鍾為角黃鍾正聲長故用子聲為角此夷則之調正聲二子聲三也南吕之均以南吕為宫南吕上生姑洗為徵姑洗正聲長故用子聲為徵姑洗下生應鍾為商應鍾子聲短故用正聲為商應鍾上生蕤賔為羽蕤賔正聲長用子聲為羽蕤賔上生大吕為角正聲長用子聲為角此南吕之調正聲二子聲三也無射之均以無射為宫無射上生仲吕為徵仲吕正聲長用子聲為徵仲吕上生黃鍾為商正聲長用子聲為商黃鍾下生林鍾為羽正聲長用子聲為羽林鍾上生太蔟為角正聲長用子聲為角此無射之調正聲一子聲四也應鍾之均以應鍾為宫應鍾上生蕤賔為徵正聲長用子聲為徵蕤賔上生大吕為商正聲長用子聲為商大吕下生夷則為羽正聲長用子聲為羽夷則上生夾鍾為角正聲長用子聲為角此應鍾之調正聲一子聲四也朱子語類云旋相為宫若到應鍾為宫則下四聲都當低去所以有半聲亦謂之子聲近時所謂清聲是也大率樂家最忌臣民陵君故商聲不得過宫聲愚案如黃鍾全用九寸謂之正聲折半取四寸五分謂之子聲餘皆倣此又案律吕本原黃鍾自為宫變半為無射商變半為夷則角變半為仲吕徵變半為夾鍾羽大吕自為宫半之為應鍾商半之為南吕角半之為蕤賔徵半之為姑洗羽太蔟自為宫全為黃鍾商變半為無射角半之為林鍾徵變半為仲吕羽夾鍾自為宫全為大吕商半之為應鍾角半之為夷則徵半之為蕤賔羽姑洗自為宫全為大蔟商全為黃鍾角半之為南吕徵半之為林鍾羽仲吕自為宫全為夾鍾商全為大吕角半之為無射徵半之為夷則羽蕤賔自為宫全為姑洗商全為太蔟角半之為應鍾徵半之為南吕羽林鍾自為宫變為仲吕商變為夾鍾角全為黃鍾徵變半為無射羽夷則自為宫全為蕤賔商全為姑洗角全為大吕徵半之為應鍾羽南吕自為宫全為林鍾商變為仲吕角全為太蔟徵全為黃鍾羽無射自為宫全為夷則商全為蕤賔角全為夾鍾徵全為大吕羽應鍾自為宫全為南吕商全為林鍾角全為姑洗徵全為太蔟羽又律吕本原云十二律旋相為宫各有七聲合八十四聲宫聲十二商聲十二角聲十二徵聲十二羽聲十二凡六十聲為六十調其變宫十二在羽聲之後宫聲之前變徵十二在角聲之後徵聲之前宫不成宫徵不成徵凡二十四聲不可為調黃鍾宫至夾鍾羽並用黃鍾起調黃鍾畢曲大吕宫至姑洗羽並用大吕起調大吕畢曲太蔟宫至仲吕羽並用太蔟起調太蔟畢曲夾鍾宫至蕤賔羽並用夾鍾起調夾鍾畢曲姑洗宫至林鍾羽並用姑洗起調姑洗畢曲仲吕宫至夷則羽並用仲吕起調仲吕畢曲蕤賔宫至南吕羽並用蕤賔起調蕤賔畢曲林鍾宫至無射羽並用林鍾起調林鍾畢曲夷則宫至應鍾羽並用夷則起調夷則畢曲南吕宫至黃鍾羽並用南吕起調南吕畢曲無射宫至大吕羽並用無射起調無射畢曲應鍾宫至太蔟羽並用應鍾起調應鍾畢曲朱子語類云宫與羽角與徵相去獨逺故於其間製變宫徵二聲愚案律吕本原七聲之序宫一商二角三變徵四徵五羽六變宫七如黃鍾為宫則太蔟為商姑洗為角蕤賔為變徵林鍾為徵南吕為羽應鍾為變宫皆以隔八相生得之其生之序則宫一徵二商三羽四角五變宫六變徵七若正聲長而不能為七聲之次則亦用半聲也蓋聲音之數往而不返故黃鍾不復為他律役而獨為聲氣之元也五聲十二律合之為六十調七聲十二律合之為八十四調通典云殷以前但有五音自周以來加文武二聲謂之為七其五聲為正二聲為變變者和也朱子云二者是樂之和相連接處朱子又云今人曲子所謂黃鍾宫大吕羽這便是調謂如頭一聲是宫聲尾後一聲亦是宫聲這便是宫調愚案前段所謂黃鍾起調黃鍾畢曲者此之謂也愚又案隔八相生至無射生仲吕其道窮矣復變而上生黃鍾謂之變律如仲吕再生黃鍾則不及九寸仲吕律長六寸五分八氂三毫四絲六忽隂生陽四因其實三其除法得八寸七分七釐七毫九絲四忽不盡二算如前所謂變半者則以此變律復折半為用也又案朱子大全集云俗樂之譜合為黃鍾四下為大吕四上為太蔟乙下為夾鍾乙上為姑洗上為仲吕勾為蕤賔尺為林鍾工下為夷則工上為南吕凡下為無射凡上為應鍾六為黃清五下為大清五上為蔟清五尖為夾清此聲俗工皆能知之但或未識古律之名不能移彼以為此故附見其説云被之八音金為鐘石為磬絲為絃竹為管匏為笙土為塤革為鼓木為柷敔敷奏復逆復逆者周禮云小臣掌三公及孤卿之復逆注疏云復是報白之義逆謂上書納言官名周之內史漢之尚書魏晉以來所謂中書門下省皆此職也周禮春官內史掌王之八枋之法以詔王治一曰爵二曰祿三曰廢四曰置五曰殺六曰生七曰豫八曰奪執國法及國令之二以考政事以逆會計掌敘事之法受納訪以詔王聽治李埴續補漢官儀云尚書唐虞官也書曰龍作納言詩云仲山甫王之喉舌秦改稱尚書漢亦尊此官典機密明帝詔曰尚書蓋古之納言出納朕命機事不密則害成可不慎歟漢尚書稱臺魏晉以來為省晉志云給事黃門侍郎與侍中俱管門下衆事舊唐志云秦漢初置侍中曽無臺省之名自晉始置門下省南北朝皆因之侍中二貟隋曰納言武德改侍中掌出納帝命所謂佐天子而統大政者也新唐志云下之通上其制有六一曰奏鈔舊志作抄以度支國用授六品以下官斷流以下罪及除免官用之二曰奏彈三曰露布四曰議五曰表六曰狀自露布以上乃審其餘覆奏書制可而授尚書省此以平水土若百工各為一官而周制同領於司空周官司空掌邦土居四民時地利王制云司空執度度地居民山川沮澤時四時量地逺近興事任力所謂平水土若百工同領於司空也冬官司空之職編簡散亂錯雜於五官之中如土冝土均之法懷方合方之職皆司空之事漢儒不察獨以考工記補之良可歎也此以士一官兼兵刑之事而周禮分為夏秋兩官杜佑通典以兵附於刑謂大刑用兵甲其次用五刑亦猶古意韓子曰竹書紀年帝王之沒皆曰陟見退之黃陵廟碑晉束晳傳云太康二年汲郡人不準不方鳩反盜發魏襄王墓或言安釐王冢得竹書數十車其紀年十三篇方猶雲徂乎方之方揚子法言云雲徂乎方雨流乎淵注云徂往也方四方也零陵蒼梧零陵今湖南永州郡名舜冢在道州界蒼梧今廣西梧州也書蔡氏傳旁通卷一中欽定四庫全書書蔡氏傳旁通卷一下元陳師凱撰大禹謨九州之外世一見曰王周禮秋官大行人云九州之外謂之蕃國世一見注云九州之外無朝貢之歲父死子立及嗣王即位乃一來耳水火金木土榖惟修者水克火火克金金克木木克土而生五榖或相制以泄其過或相助以補其不足而六者無不修矣水克火以烹飪火克金以鍛冶金克木以成器此相制以泄其過者也斫木為耜揉木為耒耒耨之利以教天下此木克土而生五榖相助以補其不足者也雖然此以人事言之也五行之用質生於地而氣行於天聖人因五材而修之其功可見也所以燮調元氣財成輔相而致其參贊化育之功者則不可得而見也然政在養民而又謂之六府則是當以在人者論不以在天者論正德者父慈子孝兄友弟恭夫義婦聽所以正民之德也又云為之惇典敷教以正其德惇典惇五典也敷教敷五教也上云父子兄弟夫婦是五典五教中切於民者也其實并五典盡教之三者舉其近耳九者既已修和各由其理民享其利莫不歌詠而樂其生也朱子語録云九歌便是作韶樂之本看得此歌本是在下之人作歌不知當時如何取之以為樂又曰九歌只是九功之敘可歌想那時田野自有此歌今不可得見周禮所謂九德之歌九韶之舞大司樂云九德之歌九㲈之舞注引左氏云九功之德皆可歌也謂之九歌九㲈讀為大韶太史公所謂佚能思初安能惟始沐浴膏澤而歌詠勤苦者也史記樂書云君子不為約則修德滿則棄禮佚能思初安能惟始沐浴膏澤而歌詠勤苦非大德誰能如斯洚水洚洞孟子集注頭音降又胡貢胡工二反今訓為洚洞當從胡貢反心者人之知覺主於中而應於外者也中庸序云心之虛靈知覺一而已矣蓋虛靈是未發時心之體也知覺是已發時心之用也人心道心皆是已發之心故以知覺言之不必下虛靈字然又云主於中則所主者即體也指其發於形氣者而言則謂之人心如寒欲衣飢欲食目欲色耳欲聲口欲味鼻欲臭四肢欲安佚之類皆從形氣上來此人字非人已之人如天人之人以其皆屬自家身已上事故曰人心指其發於義理者而言則謂之道心如渴不飲盜泉水餓不食嗟來食見孺子入井而怵惕之類皆從義理上來即知覺之得其正者以其合於事物當然之理故曰道心人心易私而難公故危私者我之所獨蓋耳目鼻口皆屬自家體段如專欲求利於己則必違義而生害以至於危而不安矣道心難明而易昧故微道者人之所共由蓋四端之發原於仁義禮智是天下公共之理也然不能即其善端發見而充廣之則人欲縱肆而所謂道者微妙難見矣道心常為之主而人心每聽命焉人心不能無也必道心常為之主則理可勝欲雖形氣之所發者亦無不合乎義理之正而無一毫私意於其間矣動靜云為自無過不及之差而信能執其中矣此時中之中指已發而言也先儒於未發之中則以不偏不倚訓之於已發之中則以無過不及訓之蓋未發之前不見其過與不及也必已發而時中然後見其無過亦無不及焉所謂允執者亦性焉安焉之謂欲執其中者必在精一至於允執則不思不勉而亦無事乎精一矣唯聖者能之大賢以下則擇善固執而已可願猶孟子所謂可欲孟子集注云天下之理其善者必可欲其惡者必可惡其為人也可欲而不可惡則可謂善人矣孟子是論觀人之法書是論修己之法然可欲之善則同龜卜蓍筮蓍所以筮龜所以卜史記云上有搗蓍搗逐留反下有神龜龜千歲乃滿尺二寸蓍百年而一本生百莖分而為五十者二每用四十九莖分挂揲歸十有八變而成卦以占吉凶卜官得大龜以庚辛日殺之剔取其甲以清水澡之東向立灼以荆若剛木灼鑽畢以五兆占之以辨吉凶其祝龜曰假爾泰龜有常祝蓍曰假爾泰筮有常詳見洪範七稽疑神宗堯廟也蘇子古史云神宗者舜之所宗堯也注云舜受命于文祖禹受命于神宗蓋將以天下與人必告其所從受天下者也祭法疏云有虞氏以上尚德禘郊祖宗配用有德者而已虞氏禘郊祖宗之人皆非虞氏之親是尚德也自夏以下稍用其姓代之軍旅曰誓見周禮士師商作誓周作會見禮記檀弓歷山在河中府河東縣韻會云蒲州河東縣雷首山一名中條亦名歷山又越州餘姚縣濮州雷澤及媯州皆有歷山舜井仁覆閔下謂之旻爾雅云秋為旻天詩序云旻愍也毛公云仁覆閔下則稱旻天閔愍通用書疏云求天愍已故呼曰旻天號呼于旻天于其父母朱子語録云號泣于是天呼天而泣也于父母呼父母而泣也怨慕之深孟子集注云怨已之不得其親而思慕也又云自責不知已有何罪耳非怨父母也即孟子所謂底豫也集注云底致也豫恱樂也書所謂不格姦亦允若是也瞍長老之稱集注云瞽瞍舜父名蔡氏於堯典云瞽無目之名於此又云瞍長老之稱蓋舜父老而無目號曰瞽瞍而蔡傳釋其所以為號之由也干楯羽翳也皆舞者所執也爾雅疏云干扞也郭云相扞衛孫炎云干盾自蔽扞纛翳也孫炎云舞者所持羽也郭云今之羽葆幢舞者所以自蔽翳又案周禮春官樂師有羽舞有干舞注云宗廟以羽兵事以干疏云析羽為旌羽舞析羽也干戈兵事所用故以干舞為兵孔氏書疏云武舞執楯文舞執羽干羽皆舞者所執據器言之有武有文用以為舞而不用於敵故教為文也皋陶謨大包藏凶惡之人此指孔壬與舜典而難任人同説文云象人懷妊之形故以包藏訓之禹言三凶而不及鯀者為親者諱也榖梁傳云為尊者諱恥為賢者諱過為親者諱疾公羊傳云春秋為尊者諱為親者諱為賢者諱正言而反應者寬正言也栗反應也餘倣此所以明其德之不偏寬而不栗是偏於寬也栗而不寬是偏於栗也今云寬而栗是能兼有之所以明其德之不偏如伯夷是偏於清也栁下惠是偏於和也若伯夷清而和栁下惠和而清則不偏矣餘倣此皆指成德之自然非以彼濟此之謂也凡寬而且栗柔而且立者皆因氣稟之不偏故其德性之美成於自然非寬者勉求為栗以濟寬柔者強求為立以濟柔也朱子云九德凡十八種是好底氣質木火金水旺於四時而土則寄旺於四季也自立春後木旺七十二日立夏後火旺七十二日立秋後金旺七十二日立冬後水旺七十二日季春辰土旺十八日寄在立夏前季夏未土旺十八日寄在立秋前季秋戌土旺十八日寄在立冬前季冬丑土旺十八日寄在立春前亦共七十二日通為三百六十日有庸馬本作五庸據釋文云衷降衷之衷即所謂典禮也湯誥傳云天之降命而具仁義禮智信之理無所偏倚所謂衷也人之稟命而得仁義禮智信之理與心俱生所謂性也愚案以此為即典禮者蓋父子君臣夫婦長幼朋友之常即仁義禮智信之道聖人所以因而品節為吉凶軍賔嘉之五禮亦無往而非此道故曰天敘又曰天秩蓋本於天而備於我其體則具於中而無少偏倚其用則行於外而非過不及此蔡氏所以謂之即典禮也典禮雖天所秩敘然正之使敘倫而益厚用之使品秩而有常則在我而已朱子云因其生而第之以所當處者謂之敘因其敘而與之以其所當得者謂之秩又云許多典禮都是天敘天秩下了聖人只是因而敕正之因而用出去凡其所謂冠昏喪祭之禮與夫典章制度文物禮樂車輿衣服無一件是聖人自做底都是天做下了聖人只是依傍他天理行將去如推箇車子本自轉將去我這裏只是略扶助之而已民彛物則各得其正所謂和衷也各得其正則發必中節而於天理之自然者皆無所乖沴是以能和衷也輯纂引齊氏云聖人為禮以節之歐陽公所謂順其情而節文之使知尊卑長幼凡人之大倫也此其髙下之宜豐殺之别貴賤偏全之等所以明於人心習熟於人之耳目而終其身不敢肆其情欲於度數之外也此三代帝王防範人心之先務隄防世變之大端也五服五等之服自九章以至一章是也周禮春官司服注云九章一曰龍二曰山三曰華蟲四曰火五曰宗彛皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆希以為繡公之服自衮冕而下衣五章裳四章如王之服侯伯之服自鷩冕而下鷩即華蟲雉也衣三章裳四章凡七無龍與山也子男之服自毳冕而下毳畫虎蜼二獸於宗彛之器衣三章宗彛藻米裳二章黼黻凡五無龍山蟲火也孤之服自希冕而下希者刺粉米於衣無畫也衣一章裳二章黼黻而已凡三大夫之服自玄冕而下玄者衣無文裳一章刺黻而已凡冕服皆玄衣纁裳五服同用冕其旒數則亦異又案楊信齋祭禮經傳通解云衮衣之冕十二斿用玉二百八十八鷩衣之冕九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十玄衣之冕三斿用玉七十二天之明畏非有好惡也因民之好惡以為明畏輯録云問聰明明畏不知明畏是兩字還是一字林氏以為聰明言視聽明畏言好惡未知如何先生曰林氏似是明畏言天之所明所畏所明如明明揚側陋之明所畏如董之用威威用六極之意愚案此蓋謂民之所好者天必明之民之所惡者天必畏之畏與威同益稷四載水乘舟陸乘車泥乘輴山乘樏此據古注也陸氏云輴丑倫反樏力追反輴史記作橇漢書作毳以板為之其狀如箕擲行泥上樏史記作橋漢書作梮以鐵為之其形似錐長半寸施之履下以上山不蹉跌也陸氏云輴漢書作橇如淳音蕝以板置泥上服虔云木橇形如木箕擲行泥上尸子云澤行乘蕝子絶反樏史記作橋徐音近遙反漢書作梮九足反書疏云史記河渠書泥行蹈蕝山行即橋丘遙反徐廣曰橋一作輂几玉反輂直轅車也漢溝洫志泥行乘毳山行則梮居足反毳如箕擲行泥上如淳云以板置泥上通行路也梮謂以鐵如錐頭長半寸施之履下以上山不蹉跌也韋昭云梮木器也如今輿牀人輿以行也輴與毳為一樏與梮輂為一古變形字體改易説者不同未知孰是又史記夏紀云陸行乘車水行乘船泥行乘橇山行乘檋正義云橇形如船而短小兩頭微起人曲一腳泥上擲進用拾泥上之物今杭州溫州海邉有之也檋上山前齒短後齒長下山前齒長後齒短也左傳云井堙木刋見襄二十五年周禮一畝之間廣尺深尺曰畎一同之間廣二尋深二仞曰澮畎澮之間有遂有溝有洫皆通田間水道以小注大言畎澮而不及遂溝洫者舉小大以色其餘也周禮冬官考工記云耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專達於川各載其名凡天下之地勢兩山之間必有川焉大川之上必有塗焉翼為明聽即作股肱耳目之義翼為在股肱明聽在耳目宗彛虎蜼取其孝也爾雅云蜼卬鼻而長尾郭璞云蜼似獼猴而大黃黑色尾長數尺似獺尾末有岐鼻露向上雨即自懸於樹以尾塞鼻或以兩指江東人亦取養之為物捷健蜼音誄廣韻音余救以季二反周禮注讀如蛇虺之虺又讀如公用射隼之隼釋文又音以水反周禮注疏云宗彛者據周之彛尊有虎彛蜼彛因於前代則虞氏有虎彛蜼彛可知若然宗彛是宗廟彛非蟲獸之號而言宗彛者以虎蜼畫於宗彛則因號虎蜼為宗彛其實是虎蜼也但虎蜼同在於彛故此亦并為一章也虎取其嚴猛蜼取其有智以其雨則以尾塞鼻是其智也愚案禮疏謂虎蜼取其嚴猛與智而蔡傳云取其孝者蓋以虎彛蜼彛為四時享祼之器不與諸尊彛同孝思之所在也黼若斧形取其斷也書疏云考工記白與黑謂之黼釋器云斧謂之黼孫炎云黼文如斧形蓋半白半黑似斧刃白而身黑黻為兩已相背取其辨也書疏云刺繡為兩已字相背也考工記云黑與青謂之黻以青黑線刺也取其善惡相背也絺鄭氏讀為黹紩也紩以為繡也釋文絺敕私反此據周禮注釋文云黹張里反疏云鄭君讀希為黹黹紩也謂刺繒為繡也紩音姪韻會云縫也衣之六章其序自上而下裳之六章其序自下而上此言繪繡於衣裳其序如此衣六章日月在上華蟲在下裳六章宗彛在下黼黻在上繪於衣繡於裳皆雜施五采以為五色也考工記云畫繪之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃青與白相次也赤與黑相次也玄與黃相次也青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡土以黃其象方天時變火以圜音環山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧凡畫繢之事後素功注云玄黃相次以上六色繢以為衣五采備以上繡以為裳火以圜者形如半環山以章獐也在衣水以龍在衣鳥獸蛇華蟲也蠱之毛鱗有文采者在衣疏云畫山兼畫獐畫龍兼畫水衣在上陽主輕浮故畫之裳下隂主沈重故刺之也又案周制見春官司服注以日月星辰畫於旗鄭元云王者相變至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也案書疏云桓二年左傳云三辰旗旗三辰即日月星也周禮司常掌九旗之物惟日月為常不言畫星蓋太常之上又畫星也周禮疏云若孔君安國義虞時亦以日月星畫於旌旗與周同鄭意虞時無日月星畫於旌旗若虞時日月星畫於旌旗則衣無日月星也冕服九章登龍於山登火於宗彞周禮疏云鄭知登龍於山者周法皆以蟲獸為章首若不登龍於山則當以山為章首何得猶名衮龍乎又知登火於宗彞者宗彞則毳也若不登火於宗彞上則毳是六章之首不得以毳為五章之首故知登火於宗彞也衮冕九章以龍為首畫龍山華蟲火宗彞五者於衣刺藻米黼黻四者於裳王享先王則衮冕公之服自衮冕而下如王之服鷩冕七章以華蟲為首鷩必列反即華蟲華蟲即雉畫華蟲火宗彞三者於衣刺藻米黼黻四者於裳王享先公享射則鷩冕侯伯之服自鷩冕而下如公之服毳冕五章以虎蜼為首毳虎蜼之毛也畫虎蜼二獸於彞器之腹也其衣三章畫宗彞與藻刺粉米其裳二章刺黼黻凡五也疏云粉米不可畫之物雖在衣亦刺之王祀四望山川則毳冕子男之服自毳冕而下如侯伯之服愚案此下再有希冕三章玄冕一章蔡傳略舉不備録也今具如左希冕三章希音止希刺也刺七亦反刺粉米於衣刺黼黻於裳凡三也王祭社稷五祀則希冕孤之服自希冕而下如子男之服玄冕一章衣無文裳刺黻而已凡冕服皆玄衣纁裳故玄冕一章仍以玄為名眀衣無文玄色而已也王祭羣小祀則玄冕大夫之服自玄冕而下如孤之服又案楊信齋祭禮經傳通解云林之竒曰黃帝始備衣裳之制舜觀古人之象繪日月星辰山龍華蟲於衣繡宗彞藻火粉米黼黻於裳以法乾坤以昭象物所以彰天子之盛德能備此十二物者也使服其服者當須有盛德焉繪以三辰所以則天之眀尤為君德之光自黃帝以來歷代之制莫不然也周人特備以斿留繅皂之數耳周禮乃無十二章之文司服惟有衮冕至玄冕説者謂周登三辰於旗冕服惟有九章嗚呼何説之異也自堯舜至于三代文物日以盛名分日以嚴儀章日以著夫子於四代禮樂特曰服周之冕取其文之備尊卑之有辨也何得至周反去三辰之飾文乃不足乎蓋不過據左氏三辰旗旗之文左氏謂旗有三辰何嘗謂衣無三辰邪豈有王者象三辰之眀歷代皆飾於衣周人特飾於旗有何意乎況又謂上公冕服九章而王服亦九將何所别周公制禮防亂萬世乃至於無别歟郊特牲曰祭之日王被衮以象天則十二章備矣鄭氏曰謂有日月星辰之章此魯禮也夫被衮以象天周制固然也何魯之足云豈有周制止九章魯乃加以十二章之理乎楊氏云周制大裘之上有玄衣玄衣之上有十二章鄭説周止九章非是六律陽律也不言六吕者陽統隂也六律黃鍾太蔟姑洗蕤賔夷則無射六吕大吕夾鍾仲吕林鍾南吕應鍾也六吕又名六同案周禮大師樂注黃鍾子之氣也十一月建焉而辰在星紀大吕丑之氣也十二月建焉而辰在玄枵太蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星蕤賔午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾仲吕已之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁愚案建者謂斗柄所指也辰者謂日月所會也建與辰各自為合而陽律統隂吕之象亦可見矣子與丑合黃鍾統大吕也寅與亥合太蔟統應鍾也戌與卯合無射統夾鍾也辰與酉合姑洗統南吕也申與已合夷則統仲吕也午與未合蕤賔統林鍾也又有律娶妻吕生子之説以類附于下周禮注云黃鍾初九也下生林鍾之初六林鍾上生太蔟之九二太蔟下生南吕之六二南吕上生姑洗之九三姑洗下生應鍾之六三應鍾上生蕤賔之九四蕤賔上生大吕之六四大吕下生夷則之九五夷則上生夾鍾之六五夾鍾下生無射之上九無射上生仲吕之上六同位者象夫妻異位者象子母所謂律娶妻而吕生子也賈氏疏云同位謂若黃鍾之初九下生林鍾之初六俱是初之第一夫婦一體是象夫婦也異位象子母謂若林鍾上生太蔟之九二二於第一為異位象母子但律所生者為夫婦吕所生者為母子十二律吕律所生者常同位吕所生者常異位故云律娶妻而吕生子也黃鍾為天統律長九寸林鍾為地統律長六寸太蔟為人統律長八寸林鍾位在未得為地統者以未衝丑故也有律而後有聲有聲而後八音得以依據周禮云大師掌六律六同以合隂陽之聲皆文之以五聲宫商角徵羽皆播之以八音金石土革絲竹匏木愚謂有律而後有聲者如黃鍾既生十二律然後律吕旋相為宫徵商羽角五聲五聲既具然後八音有所依據而成樂如黃鍾九九八十一以為宫即八十一絲為宫七十二絲為商之類是也聲音之道與政通故審音以知樂審樂以知政樂記云治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫為君商為臣角為民徵為事羽為物五者不亂則無怗滯之音矣宫亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭衛之音亂世之音也其政散其民流誣上行私而不可止也凡音者生於人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道備矣五言者詩歌之協於五聲者也自上達下謂之出自下達上謂之納輯纂引蘇氏云五言詩也以諷詠之言寄於五聲也陳氏曰納采詩而納之於上如命太史陳詩以觀民風與工以納言是也出出詩而播之樂章如關雎用之鄉人用之邦國與時而揚之是也蓋射所以觀德射義云射者進退周還必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行矣其容體必不能比於禮其節奏必不能比於樂其中必不能多射義云古者天子之制諸侯歲獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭周禮王大射則供虎侯熊侯豹侯諸侯則供熊侯豹侯卿大夫供麋侯皆設其鵠此天官司裘職文也大射者祭祀之射王將有郊廟之事以射擇諸侯及羣臣與邦國所貢之士可以與祭者侯者其所射者也以布為之以虎熊豹麋之皮飾其側又方制之以為􅙯音準謂之鵠著於侯中王之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉又梓人為侯廣與崇方三分其廣而鵠居一焉梓人冬官職也崇髙也方等也三分周禮作參分鵠居侯中於髙廣當三分之一也制弓長六尺以射故制侯以弓為節天子大射侯道九十弓每弓取二寸二九一十八是九十弓得一丈八尺為虎侯之崇廣熊侯七十弓崇廣一丈四尺豹侯麋侯五十弓崇廣一丈以三分之則一丈八尺者其鵠方六尺一丈四尺者其鵠方四尺六寸六分一丈者其鵠方三尺三寸三分此所謂參分其廣而鵠居一也諸侯之在國中者亦如之此祭祀之射也其次有賔射諸侯來朝天子入而與之射或諸侯相朝而與之射其次為燕射謂燕息而與之射也天子諸侯大夫三射皆具惟士無大射而有賔射燕射三射之外又有鄉射鄉大夫貢賢能之後行鄉射之禮而詢衆庶又有州長射于州序其侯並同賔射之法又有主皮之射二一是卿大夫從君田獵班餘獲而射一是庶人之射主皮者無侯張獸皮而射之也又有習武之射司弓矢職云弧弓以授射甲革椹質者是也又梓人職云張皮侯而棲鵠此言大射也張五采之侯則逺國屬此賔射也張獸侯則王以燕息此言燕射也朱子中庸云畫布曰正棲皮曰鵠大射則以虎熊豹麋之皮棲于侯中而又以其皮飾于上下惟大射用之賔射用五采之侯所謂畫布曰正也射人注云正之言正也射者內志正也又訓為鳥名射義疏云齊魯之間名懸肩為正射人職云王射三侯五正諸侯射二侯三正卿大夫射一侯二正士射犴侯二正五正者中朱次白次蒼次黃玄居外各從五行所克為次三正損玄黃二正畫朱緑三侯者五正三正二正之侯也餘倣此其侯亦如虎熊豹之崇廣凡中央之赤皆方二尺以外之色分布之其外又畫雲氣以為飾惟士犴侯飾以犴皮犴胡犬也天子以下燕射尊卑皆用一侯禮記疏云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕白質赤質皆以白土赤土塗之大夫士言布則白布不塗也熊麋虎豹鹿豕皆正面畫其頭象於正鵠之處耳所畫處皆丹質君畫一臣畫二陽竒隂耦之數也天子以下其侯道同五十弓崇廣方一丈也又六藝五射一曰參連二曰白矢三曰剡注四曰襄音讓尺五月井儀是射法也如周制鄉黨之官以時書民之孝悌睦姻有學者地官黨正云正歲屬民讀法而書其德行道藝以歲時涖校比族師云月吉則屬民而讀邦法書其孝悌睦姻有學者閭胥云既比則讀法書其敬敏任恤者愚案閭二十五家也族百家也黨五百家也五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉黨正族師閭胥皆鄉大夫所屬故蔡傳不别言之總稱為鄉黨之官也蒼生者蒼蒼然而生視逺之義也莊子云天之蒼蒼其正色邪其逺而無所至極邪其視下也亦若是則已矣漢志堯處子朱於丹淵為諸侯丹朱之國名也見前漢律厯志奡蕩舟奡寒浞之子左傳作澆魚弔反力能陸地行舟塗山國名在今夀春縣東北此據孔氏疏文也在今淮西道臨濠府鍾離縣寰宇記云塗山在縣西九十五里太康地志云塗山古當塗國夏禹所娶也山西南蓋禹會諸侯之地今邑界有當塗故縣後廢五千里者每服五百里五服之地東西南北相距五千里五百里詳見禹貢篇末禹貢之制五百里甸服即自王之宫城算起每面五百里是穿心一千里即為王畿故五服穿心止有五千里也周制則除王畿千里起算通外九服穿心萬里也禹服五千開方為方千里者二十五止得周制四分之一耳十二師者每州立十二諸侯以為之師使之相牧以糾羣后也如王制所載鄭氏以為夏制每州二百一十國除十二國為師外餘一百九十八國以十二師分治之則所掌各得一十六國半天下九州惟天子縣內九十三國通八州千七百七十三國內除為師者一百丹八國餘一千六百六十五國為羣后矣然傳言會諸侯於塗山執玉帛者萬國亦槩言其多乎將通薄海內外而計之乎若以五千五服開平方計之止得方百里者二千五百必如周制九畿之數而後得百里之國者萬也然除山川丘陵之外亦不得以滿此數矣書疏云傳稱萬盈數也萬國舉盈數而言非謂其數滿萬也詩桓曰綏萬邦蒸民曰揉此萬邦豈周之建國復有萬乎天地之勢平原者甚少山川所在不啻居半此以不食之地亦封建國乎又案孔氏古注以二千五百人為師每州用三萬庸是為十二師東萊謂一州一師十二州共立十二師如十二牧蔡氏俱不從者以如古注之説則州境有闊狹用功有多少例言三萬人不知用工日數且治水四年施工必多計日則不合人數計人則不合日數故不從也如吕氏之説則禹治水之時弼成五服之日又止九州不合十二州之數且經文州字居十二上是言每州有十二師非十二州故亦不從也惟注疏引鄭氏之説以為每州十有二師然彼又謂百國一師州十二師則州千二百國八州凡九千六百國餘四百國在圻內則又妄之甚者也蔡傳特取其每州十二師一語其外亦不從也九州之外迫於四海每方各建五人以為之長而統率之也書疏引王制五國以為屬屬有長是通內外皆五國立一人以為長也而蔡傳不從者以十二師繫於州五長繫於海故知五長專在外所謂咸建者是指東西南北皆建之也帝之此言乃在禹未攝位之前非徂征後事蓋威以象刑而苖猶不服然後命禹征之征之不服以益之諌而又增修德教及其來格然後分背之朱子語録云苗頑弗即工此是禹治水時調役他國人夫不動也後方征之既格而服則治其前日之罪而竄之竄之而後分北之今説者謂苗既格而又叛恐無此事又文集云頃在湖南見説溪洞蠻徭略有四種曰獠曰犵曰狑而其最輕捷者曰貓近年數出剽掠為邉患者多此種也豈三苗氏之遺民乎古字少而多通用然則所謂三苗者亦當正作貓字耳詹元善説苗民之國三徙其都初在今之筠州次在今之興國皆在深山中人不可入而已亦難出最後在今之武昌縣則據江山之險可以四出為寇而人不得而近之矣未及問其所據聊並記于此戛擊考擊也考扣也搏至拊循也説文云搏至也廣韻云手擊也然則至者言手之所至也韻會訓撫為循訓拊為擊然則蔡傳訓拊為循者亦取撫摩琴瑟以成輕清之聲歟漢趙充國傳拊循和輯則拊亦訓循矣古注及疏皆以搏拊為一樂器之名以韋為之實之以粳形如鼓所以節樂者而蔡傳不從者以戛擊是作用之名搏拊對之亦當為作用之辭且節樂者不當獨見於堂上又非輕清之聲以合詠歌者故不從舊説也然蔡氏所據則案周禮大師云大祭祀帥瞽登歌令奏擊拊鄭司農云樂或當擊或當拊疏云先鄭之意謂若尚書云擊石拊石皆是作用之名拊非樂器後鄭不從然則蔡氏實據先鄭司農之説也升歌於堂上升瞽人登階也周禮疏云將作樂時大師帥取瞽人登歌於西階之東北面坐而歌者鼓瑟以歌詩也郊特牲云歌者在上貴人聲也神之格思之格朱子云格來也隨感而至也虞賔丹朱也堯之後為賔於虞猶微子作賔於周也微子之命傳云賔以客禮遇之也管猶周禮所謂隂竹之管孤竹之管孫竹之管也周禮大司樂孤竹之管以祀天神孫竹之管以祭地示隂竹之管以享人鬼鄭氏注云孤竹竹特生者孫竹竹枝根之末生者隂竹生於山北者又案小師注云管如篪六孔疏云廣雅云管象簫長尺圍寸八孔無底八孔者蓋轉寫誤當從六孔為正也鄭元云管如笛音笛而小併兩而吹之如今賣飴餳所吹者爾雅疏云長尺圍寸併漆之有底愚案大師注云登歌下管貴人聲也特言管者貴人氣也鼗鼓如鼓而小有柄持而搖之則旁耳自擊此小師注文也又案大司樂祀天神用靁鼓靁鼗祭地示用靈鼓靈鼗享人鬼用路鼓路鼗蔡氏既引隂竹孤竹等以證管而不引此以證鼗者以大師下管奏鼓朄音胤小師下管擊應鼓朄與應皆鼓之小者注謂擊鼓者即事之漸先擊小後擊大鼗亦鼓之小者必先搖鼗後擊鼓故即引小師注而不復引大司樂之文也且後鄭謂靁鼓靁鼗皆八面靈鼓靈鼗皆六面路鼓路鼗皆四面則其器不為小矣是以不取為證也郭璞云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊愚案非如桶也正方如斗耳但不如斗上大下小此則上下皆方二尺四寸深一尺八寸不存斗口六面皆用板平之底板有孔穿柄所謂椎柄正似斛槩耳造時先穿柄於底板然後合成故柄橫木得陷於內引柄撞之其橫木自左右擊也蔡傳所引即爾雅注文但彼注撞作挏爾雅又云所以鼓柷謂之止郭云止者其椎名敔狀如伏虎背上有二十七鉏鋙刻以籈櫟之此亦據爾雅注文爾雅云所以鼓敔謂之籈郭云以木長尺櫟之籈者其名籈者音真書疏云櫟即戛也笙以匏為之列管於匏中又施簧於管端笙師注云笙十三簧疏引廣雅云笙以匏為之十三管宫管在左方爾雅云大笙謂之巢小者謂之和注云大者十九簧疏云簧者笙管之中金薄鐷也韻會引潛夫論云簧削鋭其頭塞蜜蠟有口舌之類鏞大鍾也葉氏曰鍾與笙相應者曰笙鍾與歌相應者曰頌鍾頌或謂之鏞詩賁鼓維鏞是也爾雅云大鍾謂之鏞愚案大射禮云樂人宿縣于阼階東笙磬西面其南笙鍾其南鎛西階之西頌磬東面其南頌鍾其南鎛周禮視瞭擊頌磬笙磬注云磬在東方曰笙在西方曰頌頌或作庸功也疏云東方是生長之方故云笙西方是成功之方故云庸由是觀之則鍾磬俱有笙頌之名不當為賁鼓維鏞之鏞也然蔡氏取之者以經文作鏞且合二孔注疏及爾雅大鍾之義故從之也頌戚氏音容又案郭氏注爾雅云書曰笙鏞以間亦名鑮音博據此則鏞正為其南鎛之鎛不當訓為頌鍾之頌也歌鹿鳴笙南陔間歌魚麗笙由庚或其遺制也朱子詩傳云間代也言一歌一吹又云笙詩有聲無詞意古經篇題之下必有譜焉輯纂引新安陳氏云戛擊之搏拊之以歌詠詩章所謂歌者在上也管鼗鼓柷敔笙鏞皆堂下之樂管竹也笙匏也皆在堂下以間此衆樂與堂上之樂更代而間作也所謂匏竹在下也奏石絲以詠歌之時則堂下之樂不作奏匏竹等衆樂之時則堂上之樂不作以今人之樂觀之亦如此耳今諸解者徒見儀禮鄉飲酒禮燕禮並有間歌魚麗之文遂引以證此章林氏倡於前蔡氏述於後其辭欠明蓋間歌魚麗南有嘉魚南山有臺與笙由庚崇丘由儀相更替也與此以間初不相干不過一間字同間代更替之義亦同耳王氏炎以為堂上登歌堂下間歌直引間歌魚麗之間以解笙鏞以間之間謂以間即是間歌殊不知堂下安得有歌乎簫古文作簫舞者所執之物説文云樂名簫韶季札觀周樂見舞韶簫者則簫韶蓋舜樂之總名也左傳襄二十九年云見舞象簫南籥者注云象簫舞所執文王之樂也簫音朔又云見舞韶簫者注云舜樂簫音簫然則簫有二音於舜樂則音簫於文王樂則音朔然獨於象簫注為舞所執於簫韶不注而蔡氏亦以為舞者所執何也蓋左傳既云見舞韶簫者則為舞者所執可知或云簫韶或云詔簫或音朔或音簫其實一耳韻會入聲注云舞竿也先儒誤以簫管釋之右注及疏皆然九成者樂之九成也功以九敘故樂以九成九成猶周禮所謂九變也周禮大司樂疏云言六變八變九變者謂在天地及廟庭而立四表舞人從南表向第二表為一成一成則一變從第二至第三為二成從第三至北頭第四表為三成舞人各轉身南向於北表之北還從第一至第二為四成從第二至第三為五成從第三至南頭第一表為六成則天神皆降若八變者更從南頭北向第二為七成又從第二至第三為八成地祇皆出若九變者又從第三至北頭第一為九變人鬼可得禮焉此約周之大武象武王代紂故樂記云且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分陜周公左召公右六成復綴以崇其餘大濩以上雖無滅商之事但舞人須有限約亦應立四表以與舞人為曲别也或曰笙之形如鳥翼風俗通云舜作簫其形參差以象鳳翼五經通義曰簫編竹為之長尺有五寸博雅云大者二十三管無底小者十六管有底云笙形如鳥翼未詳鏞之簴為獸形冬官梓人云厚唇弇口出目短大胸耀所教反後大體短脰若是者謂之裸屬虎豹貔螭之屬恆有力而不能走其聲大而宏有力而不能走則於任重宜聲大而宏則於鍾宜若是者以為鍾簴瓠巴鼓瑟而遊魚出聽伯牙鼓琴而六馬仰秣事見荀子注云瓠巴伯牙不知何代人有大磬有編磬有歌磬周禮磬氏疏云磬前長三律二尺七寸後長二律尺八寸是磬有大小之制也爾雅云大磬謂之毊虗嬌反郭璞云毊形似犂錧疏云犂刃為錧韻會云股廣三寸長尺三寸半十六枚同一簴謂之編磬周禮注云股磬之上大者鼓其下小者所當擊者也假令股廣四寸半者股長九寸也鼓廣三寸長尺三寸半厚一寸愚案韻會誤以鼓作股又案編鍾編磬所以用十六枚者蓋十二律當十二枚又有四清聲作四枚共十六枚也歌聲即上文鳴球是也石音屬角最難諧和角音不髙不下太下則近商太髙則近徵為清濁之中故難和也記曰磬以立辨見樂記磬罄罄然辨别也或曰玉振之也者終條理之事故舉磬以終焉孟子集注云玉磬也振收也並奏八音則於其未作而先擊鎛鍾以宣其聲俟其既闋而後擊特磬以收其韻考工記曰天下之大獸五脂者膏者裸者羽者鱗者注云脂牛羊屬膏豕屬裸謂虎豹貔螭為獸淺毛者之屬羽鳥屬鱗龍蛇之屬舜與臯陶之賡歌三百篇之權輿也韻會云權輿始也造衡自權始造車自輿始書蔡氏傳旁通卷一下
