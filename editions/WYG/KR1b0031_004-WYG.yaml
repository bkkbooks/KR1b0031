body:
  text: 書蔡氏傳旁通卷四上元陳師凱撰泰誓上周文王國號後武王因以爲有天下之號史記后稷封於邰公劉子慶節國於豳古公亶父止於岐下徐廣曰山在扶風美陽縣西北其南有周原皇甫謐云邑於周地故始改國曰周愚按周室王業之興始於太王大於文王成於武王故蔡氏截自文王言之耳古公即太王也詩言太王實始翦商是也邰在今鳯翔府扶風縣豳在今邠州岐山在今鳯翔府岐山縣史記云故周城一名美陽城在雍州武功縣西北即太王城也武功今屬乾州又按文王作豐邑自岐下徙都豐武王徙都鎬在今奉元路鄠縣奉元古京兆也伏生二十八篇本無泰誓武帝時僞泰誓出與伏生今文書合爲二十九篇釋文序録云漢宣帝本始中河内女子得泰誓一篇獻之此云武帝時者據注䟽云司馬遷在武帝之世已見泰誓云宣帝時女子所得不可信故蔡氏不從之䟽又云宣帝泰和元年河内有女子壞老子屋得古泰誓三篇然宣帝無泰和年號恐本始之誤十三年者武王即位之十三年也或問伯夷叩馬之諫有父死不葬爰及干戈之說則於蔡傳不能無疑豈有十三年而不葬其父者乎愚曰不然太史公之妄耳伯夷聞西伯善養老久與太公同歸之聖人遂事不說伯夷獨不能諫之於平日而乃卒然發於事不可已之時乎孟津之會文王之葬久矣故知叩馬之諫必無此事也漢孔氏言虞芮質成爲文王受命改元之年䟽云詩云虞芮質厥成毛傳稱天下聞虞芮之訟息歸周者四十餘國故知周自虞芮質成諸侯並附以爲受命之年合爲十有三年䟽云知此十一年非武王即位之年者大戴禮云文王十五而生武王則武王少文王十四歳也禮記文王世子云文王九十七而終武王九十三而終計其終年文王崩時武王已八十三矣八十四即位而九十三崩適滿十年不得以十三年伐紂知此十一年者據文王受命而數之必繼文王年者爲其卒父業故也夫改正朔不改月數於太甲辨之詳矣而四時改易尤爲無藝三代有正朔有正月正月皆以寅起數是爲孟春之月百王之不易者也正朔者又謂之正歳商用十二月即建丑月也周用十一月即建子月也前此諸儒分别未明故有紛紛之論然謂之不改月數謂之改月數則皆有據且所以證改月者如左氏僖五年正月辛亥朔日南至昭二十年二月己丑日南至夫南至即建子月也而左氏見之正月二月孟子言七八月之間旱則苖槁矣朱子謂周七八月夏五六月也又禮記云正月日至可以有事於上帝七月日至可以有事於祖凡此皆足以爲改月數之驗其不改者則如蔡氏之所引然七月篇云十月蟋蟀入我牀下曰爲改歳朱子引東萊吕氏云三正之通於民俗尚矣周特舉而迭用之故朱子每隨文解之於改月不改月迄無定說惟蔡氏立說甚確又按古周書周月篇云維一月既南至日短極是月斗柄建子又云四時成歳歳有春秋冬夏各有孟仲季以名十有二月又云夏數得天百王所同愚謂正月則以寅起數所謂百王所同也其正朔則各不同惟朝覲會同用之其農事自依夏正也考之經傳又似東周以來始有以子月起數者恐末世國異政之所爲在東周之前固無之讀是書者自當以蔡傳爲正不必爲他書所惑也同力度德同德度義意古者兵志之詞輯纂引林氏云凡勝負之理力同則有德者勝德同則有義者勝度德挍善惡也度義挍曲直也百萬曰億輯纂引余氏云此謂百萬曰億洛誥訓十萬曰億新安陳氏曰韋昭注楚語云十萬曰億古數也秦改以萬萬爲億今解尚書合主十萬爲億之說百萬爲億未見所本貫通盈滿也唐孔氏曰紂之惡如繩貫物其貫已滿冡土太社也祭社曰宜冡訓太社土神也故知冡土爲太社孫炎爾雅注云宜者宜求見福佑也泰誓中次止徇循也䟽云左氏莊三年傳云凡師一宿爲舎再宿爲信過信爲次此次字直取止舎之義非左氏三日之例也何則商郊去河四百餘里戊午渡河甲子殺紂相去六日耳是今日次訖又誓明日誓訖即行不容三日止于河旁也徇者說文云徇疾也循行也徇是疾行之意故以徇爲循也一說取撫循師旅之義戊午以武成考之是一月二十八日一月武成傳是建寅月所以知戊午爲二十八日者以武成云惟一月壬辰旁死魄旁死魄爲初二日則此月朔辛卯也數至戊午可知周都豐鎬其地在西韻會云豐在京兆杜陵西南鎬在上林苑中豐東二十五里今並在陜西奉元路古者去國爲喪朱子云喪失位去國也元良微子也知爲微子者以殷王元子長且賢而又去之周也諫輔比干也知爲比干者以剖心爲賊虐之事也知伐商而必勝之輯纂引胡氏曰按蔡傳言伐商以伐訓戎謂以兵戎伐之也林氏曰戎大也如曰殪戎殷曰夑伐大商愚按康誥傳云乃大命文王殪滅大殷是以戎訓大也而此訓伐者蓋本孔傳云以兵誅紂必克之占䟽云訓戎爲兵是以兵誅紂也亂臣十人據孔疏云謂先儒鄭元等皆云然文母邑姜文母文王正妃是爲太姒邑姜武王后也武王弔民伐罪於湯之心爲益明白於天下也于湯有光此先字屬成湯非武王尤光於成湯也故蔡傳云湯之心爲益明白又云湯之心驗之武而益顯武王弔伐所以有光於湯者蓋言成湯公天下之心經六百年其慙未解至武王而始得明白如云在今日爲他發潛德之幽光耳非武王之夸辭也泰誓下天子六軍大國三軍是時武王未備六軍牧誓叙三卿可見此曰六師者史臣之詞也周禮云萬二千五百人爲軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千五百人爲師師帥皆中大夫五百人爲旅旅帥皆下大夫百人爲卒卒長皆上士二十五人爲兩兩司馬皆中士五人爲伍伍皆有長愚按天子之國六郷出正軍七萬五千人六遂出副軍亦七萬五千人司馬法十井八十家共出車一乘一乘計七十五人内甲士三人歩卒七十二人萬井八萬家合出車千乘甲士三千人歩卒七萬二千人其時武王未立六鄉六遂之制不應先爲六軍且孟子言武王之伐殷也革車三百兩亦不合六軍兵車之數牧誓止言司徒司馬司空每一卿爲一軍將合三萬七千五百人該車五百乘孟子止言三百兩者蓋兵士雖有三軍之數而其兵車尚闕二百乘以見聖人之不恃力也如此然此經文言大廵六師周禮以二千五百人爲師則是六師共一萬五千人蔡氏不以此訓者明知一萬五千人上不合大國三軍之數下不合小國一軍之文文王武王相繼爲西伯今日大舉必不止一萬五千人也故直以六師爲六軍武王雖敵紂其時未備天子之制不應有六軍且有牧誓三卿爲質故以爲史臣之詞也以三百計之爲二萬二千五百人孔䟽不計甲士三人只得二萬一千六百人也天有至顯之理其義類甚明至顯之理即典常之理也典常之理即仁義禮智信也此皆天理之自然人心之固有謂之顯道猶言明命也天以此命之於人其義類甚明如父子有親仁也君臣有義義也夫婦有别智也長㓜有序禮也朋友有信信也以五性而合之五品之倫義各有當所謂厥類惟彰也斯理斯類出於天而備於人紂乃狎侮荒怠而弗敬焉所以自絶於天而結怨於民也正士箕子也知正士爲箕子者經言囚奴正士即箕子爲之奴也郊所以祭天古者天子於國之南郊築圜丘之壇冬日至而祭天之主宰者是爲昊天上帝於郊故謂之郊社所以祭地社土神古天子諸侯於公宫之右爲壇以祭之淫巧爲過度之巧淫訓過淫巧過於巧者也祝斷也公羊傳哀十四年子路死子曰天祝予何休云祝斷也殺敵爲果致果爲毅見左氏傳宣二年商周之不敵見左氏傳桓十一年牧誓牧地名在朝歌南即今衛州治之南也衛州今衛輝路也屬河東山西道云在朝歌南又云州治之南者非朝歌即州治蓋州治正牧野地武王陳兵在其少南相去不遠而紂都朝歌則在州之東北七十三里是州治在朝歌之南而陳兵又在州治之南也甲子二月四日也以一月爲辛卯朔大盡則二月當辛酉朔而甲子在初四王無自用鉞之理古注云左手杖鉞示無事於誅右手把旄示有事於敎䟽引太公六韜云大柯斧重八斤一名天鉞蔡氏云王無自用鉞之理者以史記言武王以黄鉞斬紂頭此事必非聖人所爲而徒爲武王萬世之累故特於此因左杖之文直書曰王無自用鉞之理以破司馬遷之誣况經無其事乎司徒司馬司空三卿也武王是時尚爲諸侯故未備六卿司徒掌敎司馬掌兵司空掌事如冢宰宗伯司宼雖無其人事不可廢蓋三卿兼攝之而不備官也司徒主民治徒庶之政令司馬主兵治軍旅之誓戒司空主土治壘壁以營軍此据注䟽蓋專主從軍而言大司徒職曰大軍旅大田役以旗致萬民而治其徒庶之政令大司馬職曰羣吏聽誓於陳前斬牲以左右徇陳曰不用命者斬之周官篇曰司空掌邦土居四民時地利其治壘壁亦匠人之職也愚按蔡氏以此三卿即爲三軍之將而孔䟽所釋又各掌一事非若軍將之所爲何也蓋天子六鄉大國三鄉每鄉卿一人統一萬二千五百家大軍旅則即以爲軍將所謂軍將皆命卿者也蔡氏於甘誓言之詳矣蓋大國三鄉其三卿率其三軍之衆而緫屬於大司馬大司馬自與司徒司空總治三軍之事故司徒治徒庶司馬治誓戒司空治營壘如䟽所云也所謂軍將在亞旅之中矣師氏以兵守門者猶周禮師氏王舉則從者也周禮師氏云凡祭祀賔客會同喪紀軍旅王舉則從使其屬帥四夷之隷各以其兵服守王之門外且蹕朝在野外則守内列愚按此師氏即周禮師氏故古注及䟽皆引以爲說而蔡氏乃曰猶周禮師氏則是本不同何也蓋周禮乃天子制度武王此時未宜有此雖設師氏亦未盡如周禮之制故蔡氏以猶字言之所以著當時之實迹發後世之新義有功於名敎者皆若此然論師氏之職則文武時已有之後來周公修六典始備天子之制也千夫長統千人之帥周之軍制無專統千人者惟有二千五百人爲師師帥皆中大夫故古注以千夫長爲師帥百夫長統百人之帥周禮云百人爲卒卒長皆上士蔡氏不据之者以周禮爲天子之制恐不同耳然六軍三軍雖不同而各軍之制自軍將以下至五人爲伍則皆同也庸濮在江漢之南寰宇記云房州竹山縣本漢上庸縣古之庸國也今爲㐮陽路支郡羅氏路史國名記云濮熊姓在峽外爲楚害楚滅之杜預云建寧郡南濮夷地建故縣今爲鎮隷石首以多曰百濮羌在西蜀詩䟽云氐羌之種漢世猶存在秦隴之西愚按今之西和州即故岷州其地亦古西羌地屬鞏昌便宜都緫帥府韻會云後漢光武紀注羌有百五十四種在西蜀者䟽云羌在蜀西故云西蜀蘇氏注云羌先零䍐开之屬髳微在巴蜀䟽云巴在蜀之東偏漢巴郡所治也愚按巴郡今重慶忠州合州涪州萬州等處皆是諸家皆未能詳髳微之所在路史國名記㣲在扶風郃陽今岐之郿縣有郿鄉即微也盧彭在西北䟽云在東蜀之西北也蘇氏注盧即左傳羅與盧戎兩軍之之盧寰宇記㐮陽郡中廬縣春秋盧戎之國縣今廢輿地要覽云㐮陽路周穀鄧鄾盧羅鄀之地也蘇氏又云彭今屬武陽有彭山愚按即今眉州彭山縣也八國惟蜀地後世甚明故古注据以爲向餘皆難考故蔡氏亦因古注成文觧之牝雞而晨則隂陽反常是爲妖孽䟽云以牝雞之鳴喻婦人知外事婦妲己也䟽引晉語云殷辛伐有蘇氏以妲己女焉昆弟先王之𦙍也紂以昏亂棄其王父母弟而不以道遇之古注云王父祖之昆弟母弟同母弟愚按紂有同祖之弟又有同母親弟故經言王父母弟同一弟字省文也蔡氏言先王之𦙍則包之矣䟽引爾雅云父之考爲王父則王父是祖也春秋之例母弟稱弟母弟謂同母弟也告之以坐作進退之法坐作進退大司馬文也車徒皆坐車徒皆作作起也進車驟徒趨也退鳴鐃且郤也告之以攻殺擊刺之法如車三發徒三刺之類武成死魄朔也漢律歴志文也朔日日月相會二象合沓陽上隂下月體不明故謂之死魄然又謂之朔者朔之爲言蘇也有死而復蘇之機也正義曰此月辛卯朔朔是死魄故二日近死魄旁近也朔後明生而魄死望後明死而魄生翼明也輯纂引王氏云翼輔也以此日爲主則明日爲輔翼此日者故以明日爲翼日周鎬京也時武王已遷都於此即今長安縣昆明池北鎬陂是也三輔黃圖云鎬池在昆明池之北即周之故都也周匝二十一里蓋地三十三頃長安縣今屬奉元路即安西路古亰兆也豐文王舊都即今長安縣西北靈臺豐水之上三輔黃圖云周文王靈臺在長安西北四十里髙二丈周回百二十歩豐水出鄠南山豐谷北入渭桃林今華隂縣潼闗也華隂今屬陜西華州寰宇記云潼闗即左傳晉侯使詹嘉守桃林之塞是也按潼闗是自函谷至於潼闗髙出雲表幽谷祕邃深林茂木白日成昬華山之陽太華山在華隂縣南八里衅許靳反與釁同豆木豆籩竹豆籩豆形制一同名以竹木而分也生魄望後也十六日爲哉生魄此言既生魄未知的爲何日故止以望後言之輯纂引陳氏曰諸家多謂生魄望後也而不察既字以望與既望例之則哉生魄十六日既生魄十七日也其實十七日受命十九日丁未祀周廟簡倒耳先王后稷武王追尊之也追尊爲一代之始祖郊祀則以配天故謂爲先王無諡有諡者自文王起然親廟追尊爲王者止三世文王父也王季祖也太王曾祖也自組紺以上仍稱公故中庸曰上祀先公以天子之禮父加諡因稱文王祖無諡不容單稱王故以字配之以取别然字不可加於爵上故稱王季曾祖亦無諡爲愈尊加太字稱太王也王業自太王起故追王始太王也后稷始封於邰寰宇記云武功縣古有邰國堯封后稷之地故􅘭與邰同城在縣西南二十二里前漢爲􅘭縣後漢省入武功武功縣今屬乾州乾州即唐奉天屬陜西奉元路太王古公亶父也避狄去邠居岐邠與豳同地志云扶風栒邑縣有豳鄉公劉所都今有邠州屬陜西道岐今鳳翔府岐山縣也詩曰居岐之陽實始翦商詩魯頌閟宫之辭朱子云翦斷也太王自邠徙居岐陽四方之民咸歸徃之於是王迹始著蓋有翦商之漸矣至于文王克成厥功大受天命以撫安方夏自爲西伯專征而威德益著於天下凡九年崩朱子語録云問文王不稱王之說曰此事更要考說文王不稱王固好但書中不合有惟九年大統未集一句不知所謂九年者自甚時數起若謂文王固守臣節不稱王則三分天下有其二亦爲不可又書言太王肇基王迹則到太王時周家已自强盛矣今史記於梁惠王三十七年書㐮王元年而竹書紀年以爲後元年想得當時文王之事亦類此故先儒皆以爲自虞芮質厥成之後爲受命之元年也又云周自積累以來其勢日大又當商家無道之時天下趨周其勢自爾至於文王三分天下有其二以服事商孔子乃稱其至德若非文王亦須取了孔子稱至德只二人皆可爲而不爲者也又云文王之事惟孟子識之今按孟子集注云商紂之世文王三分天下有其二以服事殷至武王十三年乃伐紂而有天下張敬夫曰此事閒不容髪一日之閒天命未絶則是君臣當日命絶則爲獨夫然命之絶否何以知之人情而已諸侯不期而會者八百武王安得而止之哉后土社也勾龍爲后土左傳昭公二十九年蔡墨曰土正曰后土又曰共工氏有子曰勾龍爲后土后土爲社䟽云即類于上帝宜于冢土故云后土社也太祝云王過大山川則用事周禮注云用事亦用祭事告行也自相屠戮遂至血流漂杵朱子書說云血流漂杵孟子說盡信書則不如無書者只縁當時恁地戰鬭殘戮恐當時人以此爲口實故說此然看上文自說前徒倒戈攻于後以北不是武王殺他乃紂之人自蹂踐相殺荀子云所以殺之者非周人也商人也封比干墓寰宇記在汲縣北十里後魏孝文太和中親幸其墳刊石曰殷大夫比干之墓薛尚功古文法帖云唐開元四年游子武於偃師耕耘獲一銅盤上有文云左林右泉後岡前道萬世之寧兹焉是寶人以爲武王時物也考之即比干之墓商容商之賢人䟽引帝王世紀云商容及殷民觀周軍之入見畢公至殷民曰是吾新君也容曰非也見太公至民曰是吾新君也容曰非也見周公至民曰是吾新君也容曰非也見武王至民曰是吾新君也容曰然聖人爲海内討惡見惡不怒見善不喜顔色相副是以知之式車前横木有所敬則俯而憑之䟽云男子立乘有所敬則俯而憑式遂以式爲敬名賚予也武王賑窮賙乏䟽云紂所積之府倉名曰鹿臺鉅橋其義未聞寰宇記云鹿臺在衛州衛縣西二十里帝王世紀云紂造飾以美玉七年而成大三里髙千仞餘址宛然衞縣今廢列爵惟五公侯伯子男也愚按此列於邦國之爵也若朝廷之爵則公孤卿大夫士亦五等也分土惟三公侯百里伯七十里子男五十里之三等也愚按此亦頒於邦國之地也孟子云天子之卿受地視侯大夫受地視伯元士受地視子男亦三等也謂之内諸侯王制曰内諸侯禄也外諸侯嗣也又嘗考之孟子論諸侯地方之制雖諸家之通論而周禮大司徒獨異焉曰諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一鄭司農云其食者半所食租税得其半耳其半皆附庸小國也屬天子參之一亦然故魯頌曰錫之山川土田附庸奄有龜䝉遂荒大東至于海邦論語季氏將伐顓㬰孔子曰先王以爲東䝉主且在邦域之中矣是社稷之臣也此非百里之所能容然則方五百里四百里合於魯頌論語之言諸男食者四之一適方五十里獨此與諸家說合耳愚按周禮成於武王崩後恐周公具此制度而未見之於施行也孟子又言周公之封於魯也爲方百里也伯禽既爲侯爵合受百里費誓亦言魯人三郊三遂計七萬五千家合百里萬井之數然以理推之方里而井井占八家百里萬井占八萬家豈魯國百里之地皆爲田井而略無山川城郭陂池園囿之所侵乎如以三分去一除之則又不滿萬井之數而無以容三郊三遂之民而况可容泰山龜蒙之大乎其實田與地不同田則以百里七十里五十里爲限而地之封域則當如大司徒之制也王制曰天子之田方千里公侯田方百里伯七十里子男五十里是專以田爲率夫田非有千百里之地如棊枰之可布也但以田井計之耳八家共一井而爲方一里爲田九百畝也八百家共百井而爲方十里爲田九萬畝也八萬家共萬井而爲方百里爲田九百萬畝也十井八十家出車一乘百井出車十乘千井出車百乘萬井出車千乘故公侯皆謂之千乗之國是蓋百里之田提封萬井也大國三軍三鄉三遂三鄉爲正軍三遂爲副軍每鄉萬二千五百家家出一人故一軍萬二千五百人也其次國二軍小國一軍皆倣此愚故謂蔡氏所釋分土惟三者以田論也論其疆域所包者不止此也五教君臣父子夫婦兄弟長幼五典之教也愚按長幼即兄弟誤重書而遺朋友當改正䘮以送死祭以追逺中庸云父爲大夫子爲士葬以大夫祭以士父爲士子爲大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也此武王周公之事而重民喪祭之驗也按劉氏王氏程子皆有改正次序劉氏原父貢父王氏介甫朱子語録云問先生近定武成新本先生曰前軰定本更差一節王若曰一叚或接于征伐商之下以爲誓師之辭或連受命于周之下以爲命諸侯之辭以爲誓師固是錯以爲命諸侯之辭者此去祭日只爭一兩日無縁有先誥命之理某看却諸侯來便敎他助祭此是祭畢臨遣之辭當在大告武成之下比前軰只差此一節輯纂云近嵗括蒼鮑氏復有定本謂古竹簡一行十有三字偶當句斷處差互四月至豐一節掇王若曰至萬姓恱服在厥四月哉生明之前或以爲然愚按此說甚善惜先儒不及見也書蔡氏傳旁通卷四上欽定四庫全書書蔡氏傳旁通卷四中元陳師凱撰洪範商曰祀周曰年此曰祀者因箕子之辭也箕子甞言商其淪喪我罔爲臣僕史記亦載箕子陳洪範之後武王封於朝鮮而不臣也蓋箕子不可臣武王亦遂其志而不臣之也唐孔氏曰此經文㫖非直問荅而已不是史官叙述必是箕子既對武王之問退而自撰其事故孔傳特云箕子作之又云商曰祀周曰年此周書也泰誓稱年此獨稱祀此篇蓋箕子所作箕子商人故傳記引此篇書皆云商書是箕子所作明矣愚按左傳㐮二年云商書曰無偏無黨意夫子未定百篇之前此篇雜商書中自經夫子之手然後定爲周書以繼武成之後歟今觀箕子有不可臣之實預言罔爲臣僕一也紀周之年而稱祀二也對武王不稱王而曰而曰汝三也特以斯道之在己舎武王無可傳者不得已而授之此武王之問固難其辭而箕子之荅尤難其辭也武王之訪即孟子所謂不召之臣欲有謀焉則就之者新安陳氏曰箕子不臣周所以正萬世君臣之大法其陳洪範所以傳萬世天人之大法也歟朝鮮漢樂浪郡故朝鮮國也周秦時與中國絶武帝元封三年始開寰宇記云平州盧龍縣有朝鮮廢城即殷箕子受封之地今平灤路盧龍縣也彞常倫理也所謂秉彞人倫也朱子詩傳云秉執也彞常也言天生衆民有是物必有是則蓋自百骸九竅五臟達之君臣父子夫婦長幼朋友無非物也而莫不有法焉如視之明聽之聦貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性也愚按武王所問箕子所對其指彞倫蓋合一本萬殊之理言之天地之常經古今之通義近而五常之性散而萬事萬物之所以然與其所當然者皆在其中矣蓋五行五紀在天之彞倫也五事八政三德在人之彞倫也皇極在君在民之彞倫也稽疑在事在物之彞倫也庶徴福極天人感應之彞倫也推之而彌滿六合卷之而退藏於密達之而亘古亘今一散爲萬萬會於一其大無外其小無内體用兼該顯微無間此其所以爲常理此其所以爲洪範歟蓋曰洪範九疇原出於天鯀逆水性汨陳五行故帝震怒不以與之此彞倫之所以敗也鯀治水九載不能順水之性而䟽導之乃以土塞其下流夫水性潤下不得其性則必横流逆決而爲害甚矣夫五行之序水居其首而土居其終當鯀之施工而水土陻塞是汨陳其五行也蓋水得其性地平天成然後木火相生金土呈露而稼穡以成焉今五行既亂則萬物失宜民生不遂舉凡彞倫之當然者皆斁敗而不叙矣夫以鯀之方命圯族斁敗彞倫得罪於天宜上帝之震怒也羽山之殛舜固誅之然舜之誅之也可怒在彼己何與焉故鯀之殛理之所當怒也理之當怒即上帝之所怒也然觀箕子之論謂之彞倫攸斁可言也謂之帝乃震怒亦可言也孰從而知九疇之將畀而不畀哉蓋於禹而後知之也禹使水火金木土榖惟修而畀九疇則汨陳五行者之不得畀從可知矣雖然當陶唐之盛於變時雍之際又何彞倫之斁哉此無他非言朝廷也蓋言水患之甚爲民害也五行既汨九功未叙獸蹄鳥跡之道交於中國堯甚憂之此彞倫之所以斁也豈必綱常絶滅而後謂之斁哉禹順水之性地平天成故天出書于洛禹别之以爲洪範九疇此彞倫之所以敘也彞倫之敘即九疇之所叙者也孟子曰人性之善也猶水之就下也人無有不善水無有不下故君子以人治人則治水者亦當順水之性也先天之位山澤通氣凡天下之水皆出於山而天下之山皆起於西北蓋艮居西北而兊居東南則天下之水必源發於西北之山而委趨於東南之澤者是水之性也天地定位去古未逺神聖繼作財成未備是以水之在地其躍也或激之其趨也或梗之當唐堯之際龍門未闢吕梁未鑿河出孟門之上泛濫衍溢懷山襄陵四海一壑仁人之所惡而帝堯之所憂也舜使禹治之禹知水勢所激在龍門吕梁之間乃先經始壷口等處以殺下流之勢然後治梁及岐鑿龍門䟽底柱使大河西來盤束於山峽間千數百里不致横流逆決然後迤邐東行各循其道河水既定餘川尚多禹之施工皆自下流䟽瀹其壅遏分别其枝𣲖故自冀而兗而青而徐此自北而之東也自徐而揚荆由東而南也自荆而豫由南而至於中土也自豫而梁雍又由中土而後至西北也蓋天下地勢西北至髙東南至下芒芒禹跡必先經理其下流而後浚滌其泉源此所謂順水之性也豈若鯀之陻塞汨亂之爲哉禹也能行其所無事以蓋前人之愆善莫大焉且大哉乾元萬物資始至哉坤元萬物資生天以隂陽五行化生萬物惟能生覆而不能成載故盈天地之間者必麗乎土昔也洪水爲患莫不昏墊今也水患既去地勢已平而天之所生者可以成遂矣如六府孔修三事允治皆是也莫大於天地使天不成而地不平天地亦無如之何也一禹之功上極乎天而天已成下蟠乎地而地已平窮髙極逺而深厚莫測推而放諸四海而四海凖垂之萬世而永有所賴是則功侔造化道通神明固能使天不愛道地不愛寶穹示效靈而川嶽貢珍者也昔者伏羲在御龍馬已嘗負圖出河矣伏羲因之而畫八卦禹之功業充塞天地而垂諸無窮者如此寕不有感而致盛時之嘉瑞乎故洛水之涯天地之中也隂陽之交也風雨之會也有神龜焉乃能於此負書而出許氏說文云書者如也又云著也蓋天地之理與數著見於此而又克如禹之志也伏羲仰觀俯察不待河圖而畫八卦而龍馬出河之數自合於先天之圖故謂之河圖大禹地平天成不待洛書而敘九疇而神龜出洛之數自合於洪範之書故謂之洛書箕子乃言天乃錫禹洪範九疇夫既非人力之可致也則不曰天錫而謂之何哉洪範之訓是爲大法彞倫之訓是曰常理禹之所以爲大法者其存神過化亦已久矣於今而有覩於龜背之數自一至九是何神也天不言豈有世人之字以爲書哉特所具者數而已數之所存理之所寓也聖人以常理寓諸法天以常理寓諸數理同則道無不合矣是故禹也别龜之數敘吾之範龜有九數範有九類九類既彰萬理咸備故曰彞倫之叙即九疇之所叙者也九疇叙於聖人九數闡於洛龜倫既叙於疇而數壹寓於書故後世即謂九疇六十五字爲洛書本文也吁是豈可以易言哉世傳戴九履一左三右七二四爲肩六八爲足即洛書之數也此據龜體記之戴九九數近首也履尾也近尾有一數也左三右七三近左脇七近右脇也二四爲肩二近前右足四近前左足也六八爲足六近右後足八近左後足也又有五數居正背此當補五數居中一句始備本數甞詳言之自一至九而五數居中五者數之宗也一者其始而九者其究也龜背之文分居九位而五爲之宗則五九者龜書之大數也自一至九積而計之凡四十有五則爲五者九爲九者五也然則九者九疇之所以分而五者又九疇之所宗也五不著則九不叙故汨陳五行則彞倫攸斁也何以言之道之大原出於天彞倫者天命之所付也天道之運莫過於五行五行者造化功用之原也在洛書具五行之全數在洪範貫五行之宗㫖其一六者水也二七者火也三八木也四九金也五居中土也此具五行之全數也一五行五氣運於天而五材生於地也二五事五行之發於人也五皇極五數之御於君也稽疑卜五事物吉凶之先見也八庶徴天人休咎之感應也此貫五行之宗㫖也洪範九疇而貫五行者五位焉故初一曰五行而不言用無所往而不用也是孰有大於五行哉且九數之位崇陽抑隂一爲陽之始故居下九爲陽之極故居上五爲陽之中故居中三在五前爲陽中之陽故居左七在五後爲隂中之陽故居右一三者水木之生數自北而東陽生於子誠之通也九七者金火之成數自南而西隂生於午誠之復也二四六八是爲隂偶分居四隅不敢抗陽也六居一西八居三北四居九東二居七南隂隨陽後各從其類也水一加火二爲三三加木三爲六六加金四爲十十加土五爲十五十五則無以復加矣故洛書一二三四五之積爲十五羲畫以太極兩儀四象八卦合之亦十五然洛書之十五陽之積也羲畫之十五隂之積也陽則周流而無窮隂則一定而不易故洛書縱横錯綜皆十五而爲十五者有九以横計之二九四四九二各爲十五一也七五三三五七各爲十五二也六一八八一六各爲十五三也以縱計之二七六六七二各爲十五四也九五一一五九各爲十五五也四三八八三四各爲十五六也以斜計之二五八八五二各爲十五七也四五六六五四各爲十五八也以錯計之正之一三隅之二四以及中五又虚中而七跨八九跨六各爲十五九也愚故曰五九者龜書之大數也雖然十五之數雖有九而其參五數者止五位其二九四六一八二七六四三八則未甞有五豈土居於中而不及四圍乎曰不然一與四自爲五二與三亦爲五土固無所不在也一六爲水數六退五即生一加五即成矣是水之生成不離乎土也二七爲火數七退五即生二加五即成矣是火之生成不離乎土也三八爲木數八退五即生三加五即成矣是木之生成不離乎土也四九爲金數九退五即生四加五即成矣是金之生成不離乎土也土得一四亦生二三亦生合一二三四爲十而後成也水火金木生於土之先成於土之後土生於四者之後成於四者之先所謂土得一四亦生二三亦生者一四合五金生水而金枯也二三合五木生火而木燼也金枯木燼皆爲土矣洛書無十數一二三四之積是爲十不待更著十也此洛書所以具五行之全數而洪範所以貫五行之宗㫖也朱子易學啓䝉云河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以四竒數統四偶數而各居其所蓋主於陽以統隂而肇其變數之用也其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一爲一故參其一陽而爲三圍四者以二爲一故兩其一隂而爲二是所謂參天兩地者也三二之合則爲五矣此河圖洛書之數所以皆以五居中也又云洛書以竒數爲主故其中之所以爲五者亦具五竒數之象焉其下一點天一之象也其左一點天三之象也其中一點天五之象也其右一點天七之象也其上一點天九之象也又云洛書之運行則水克火火克金金克木木克土右旋一周而土復克水也又云洛書之縱横十五而七八九六迭爲消長盈虚五分十而一含九二含八三含七四含六參伍錯綜無適而不遇其合焉此變化無窮之所以爲妙也又云聖人則河圖者虚其中則洛書者緫其實洛書之實其一爲五行其二爲五事其三爲八政其四爲五紀其五爲皇極其六爲三德其七爲稽疑其八爲庶徴其九爲福極其位與數尤曉然矣又云洛書而虚其中五則亦太極也竒偶各居二十則亦兩儀也一二三四含九八七六縱横十五而互爲七八九六則亦四象也四方之正以爲乾坤離坎四隅之偏以爲兊震巽艮則亦八卦也河圖一六爲水二七爲火三八爲木四九爲金五十爲土則固洪範之五行而五十五者又九疇之子目也是則洛書固可以爲易而河圖亦可以爲範矣又安知圖之不爲書書之不爲圖也是其時雖有先後數雖有多寡然其爲理則一而已但易乃伏羲之所先得乎圖而初無待於書範則大禹之所獨得乎書而未必追考於圖爾且以河圖而虚十則洛書四十五之數也虚五則大衍五十之數也積五與十則洛書縱横十五之數也以五乗十以十乗五則又皆大衍之數也洛書之五又自含五則得十而通爲大衍之數也積五與十則得十五而通爲河圖之數矣苟明乎此則横斜曲直無所不通而河圖洛書又豈有彼此先後之閒哉西山蔡氏云古今傳記自孔安國劉向父子班固皆以爲河圖授羲洛書錫禹闗子明邵康節皆以十爲河圖九爲洛書蓋大傳既陳天地五十有五之數洪範又明言天乃錫禹洪範九疇而九宫之數戴九履一正龜背之象也惟劉牧意見以九爲河圖十爲洛書託言出於希夷既與諸儒不合並無明驗漢書劉歆云禹治洪水賜洛書法而陳之九疇是也河圖洛書相爲經緯八卦九章相爲表裏闗子明云洛書之文九前一後三左七右四前左二前右八後左六後右邵子曰方者土也畫州井地之法其放於此乎方者洛書之文禹箕叙之而作範也愚又按蔡氏撰皇極内篇數爲一書以爲易更四聖而象已著範錫神禹而數不傳於是有範數圖八十一章章八十一變共六千五百六十一變曰洛書者數之原也余讀洪範而有感焉上稽天文下察地理中參人物古今之變窮義理之精微究興亡之徴兆㣲顯闡幽彞倫所叙秩然有天地萬物各得其所之妙此九疇之綱也朱子語録云此是箇大綱目天下之事其大者大槩備於此矣又云此是人君爲治之心法周禮一書只是箇八政而已又云洛書本文只有四十五點班固云六十五字皆洛書本文古字畫恐自有模様但今無所考漢儒說此未是恐只是以義起之不是數如此蓋皆以天道人事參互言之五行最急故第一五事又參之於身故第二一身既修可推之於政故八政次之政既成又驗之於天道故五紀次之又繼之以皇極居五蓋能推五行敬五事厚八政修五紀乃所以建極也六三德乃是權衡此皇極者也德既修矣稽疑庶徴繼之者著其驗也又繼之以福極其善惡之效至是不可加矣又云初一次二此讀豆也全讀是以一二爲次第不見洛書本文又不見聖人法象之義故後人至以此章緫為洛書本文皆為句讀不明也王太古見易云範疇有九合乎河圖之綱數王氏以九數爲河圖範之子目五十五合乎洛書之目數王氏以十數爲洛書五行有五事有五政有八紀有五皇極居一德有三卜五占二休徴五咎徴五福極共十一緫五十有五疇有九而五行不言用虚一者體猶太極也目五十五而皇極不言數虚一者理猶太極也昔禹之謨九功其六府以水火金木土榖爲序自上克下河圖九宫之文也及敘九疇其五行以水火木金土爲序依天一地二之次洛書五位之文也其序禹貢又凖洛書以北東南中西相生為序先冀州於北次兖青徐於東水生木也又次揚荆於南木生火也又次豫於中火生土也又次梁雍於西土生金也若此者非䂓䂓求以合之也合乎理故合乎圖合乎書無往而不合也在天惟五行在人惟五事以五事參五行天人合矣輯纂引眞氏曰五行者天之所生以善乎人者也其氣運於天而不息其材用於世而不匱其理則賦於人而爲五常以天道言莫大於此故居九疇之首五事天之所賦而具於人者貌之恭言之從視之明聽之聦思之睿皆形色中天性之本然也必以敬用之則能保其本然之性不以敬用之則貌必慢言必悖視聽則昏且塞思慮則粗且淺而本然之性喪矣五者治心治身之要以人事言莫切於此故居五行之次愚按以五事參五行者言人之貌言視聽思正與天之水火木金土相配合也詳見本疇八政者人之所以因乎天一曰食主於稼穡必因春之發生夏之長茂秋之成遂順天時而施人力然後稼穡可成焉二曰貨以五金爲富必因天地之所産而人取以爲貨焉三曰祀必因天地鬼神爲物之體而不可違故祭祀以報其本焉四曰司空主平水土必因天時地利而使四民各得其所焉五曰司徒敎以人倫必因天叙天秩而敎民明善以復其初焉六曰司寇掌邦禁必因天討有罪而施刑焉七曰賔必因天地之蕃毓而後嘉㑹以合禮焉八曰師必恭行天罰以誅鋤暴亂焉此所謂八政者人之所以因乎天也民以食爲天故以食爲首而又曰農用焉五紀者天之所以示乎人天之爲象以日司晝以月司夜以星辰司位次南北二極示人以樞機東西升没示人以運動日月之㑹示人以晦朔晝夜長短示人以寒暑周匝示人以朞嵗中星之移示人以􅄤度斗杓之指示人以月建天之所以示人者可謂至矣在乎人之所以推測而合之耳故聖人制爲厯數之書詳歩占之法以求其所以合乎天者焉故曰五紀曰恊所以合天也皇極者君之所以建極也皇者君也極者至極之義標凖之名也人君中天下而立定四海之民則當以一身爲四海之標準無所不用其極使民皆仰望而取則焉故皇極曰建所以立極也三德者治之所以應變也聖人之德有常凡民之德則無常也無常則爲變惟聖人爲能隨其變而應之必至於治而後止故曰三德曰乂所以治民也稽疑者以人而聽於天也人心不能無惑惟天可以爲人心之準天者理之所由出也理明則惑祛矣然天不言理無跡聖人必假蓍龜以前民用而使民聽命焉以爲之準故曰稽疑曰明所以辨惑也庶徴者推天而徴之人也雨暘燠寒風五者皆天之所爲也人君必因而反之於己以省吾所以感召之者如何蓋聖人無一時而不戒無一事而不戒天人感應之機必有攸在也故曰庶徴曰念所以省驗也福極者人感而天應也五福者人之所嚮也故因以爲勸六極者人之所畏也故因以爲懲人君而能建其有極則保佑命之自天申之凡民而能錫汝保極則惟天惠民惟辟奉天天人之閒有感必有應者如此夫本之以五行敬之以五事厚之以八政恊之以五紀皇極之所以建也乂之以三德明之以稽疑驗之以庶徴勸懲之以福極皇極之所以行也本之以五行則承天意以從事敬之以五事則身修而道立厚之以八政則萬事得其宜恊之以五紀則四時得其序此皇極以之而立也乂之以三德則俗化日以厚明之以稽疑則事理日以著驗之以庶徴則戒懼日以謹勸懲之以福極則善惡之效不可誣矣皇極之行其備於此矣水火木金土者五行之生序也天一生水地二生火天三生木地四生金天五生土太古王氏曰五行之生成以竒偶爲天地也以先後爲一二也太極渾然初無象數因氣成質先後可紀生之類水最先故曰一數竒而陽故曰天火之生次水故曰二數偶而隂故曰地木金土又次之故曰天三生木地四生金天五生土語其生則土最後蓋有水火木金而後土有以爲質語其成則土才具而四者皆因以成土又因四者之生以爲成本無六七八九十之序也原其生則有是先後之序耳生之者竒則成之者偶生之者偶則成之者竒蓋獨陽獨隂不能以生成也夫所謂水最先者物静而動氣以潛潤呵而雨啗而涎悲而泣愧而汗牝牡之交感果實之包含其初皆水也濕之氣鬱於隂則熱故火次之熱與濕相搏持則凝故木次之俄而堅強不撓故金又次之四者俱備相與沖和故土居其中故曰一水二火三木四金五土也水火木金非土不能以有成故生成之數水之一加於土五則爲六火之二加於土五則爲七木之三加於土五則爲八金之四加於土五則爲九土之五不待加五也以土加土如塗附塗吾知其必不然矣然則土之成數曷爲而成十哉全水火木金之生即土之成數蓋一二三四之積即十數也愚按此論甚精可以發明九宫無十數也又蔡傳引䟽文微著爲次之說亦可與此互相發也潤下炎上曲直從革稼穡東齋集傳云潤下潤濕而下流炎上炎熱而上升曲直謂生而曲與直從革謂可因可革種曰稼歛曰穡作爲也鹹苦酸辛甘者五行之味也輯纂引夏氏云五味必言作者水之發源未嘗鹹也流而至海凝結既久而鹹之味成則鹹者潤下之所作火之始然未甞苦也炎炎不已焦灼既久而苦之味成則苦者炎上之所作木之初生金之初鑛土之始稼穡亦然五行有聲色氣味五行之聲水羽火徴木角金商土宫也五行之色水黑火赤木青金白土黄也五行之氣水朽火焦木羶金腥土香也以性言也以德言也潤下炎上曲直從革而謂之性者是就水火木金之體而言蓋四者形而後有此氣質之性也稼穡而謂之德者稼穡本言五榖五榖乃養人之具非言土之爲體於土而有五榖之可稼可穡焉是土有此養人之德也故不可以爲性也貌言視聽思者五事之敘也其次敘與五行同動容貌發言語視色聽聲思其所思皆人事也故謂之五事貌澤水也言揚火也精之潤澤者爲貌如水之浸潤故屬水氣之發揚者爲言如火之炎上故屬火又貌者精之榮也故爲水言者心之聲也故爲火視散木也聽收金也目内實而精散於色故屬木色之華彩者莫如木也耳内虚而氣接於聲故屬金聲之逺聞者莫如金也故木實則色茂眼實則視廣金虚則聲揚耳虚則聽收思通土也心者一身之主宰萬事之本根也心者思之體思者心之用五事之有思猶五行之有土也水火木金皆不可無土貌言視聽皆不可無思故論語云貌思㳟言思忠視思明聽思聦思於貌言視聽無所不在故土於水火木金亦無所不有故以思屬土也勉齋黃氏云水貌雨太隂火言暘太陽木視燠少陽金聽寒少隂土思風也通乎四者而不同焉恭從明聦睿者五事之德也德者所得之理所謂有物必有則也貌自得恭之理言自得從之理目自得明之理耳自得聦之理思自得睿之理皆天性之本然人事之當然也肅乂哲謀聖五德之用也恭從明聦睿本得於天故爲德之體由是作肅作乂作哲作謀作聖則德之用也蓋貌本具恭之德而乃不能作肅是有體而無用也用不行則體亦無自而立苟貌而作肅言而作乂視而作哲聽而作謀思而作聖則恭從明聦睿五者之德無不備於我而爲有德之人矣顧在所以作之如何耳作字是用之行處又按五事貌居其首蓋貌緫一身其德主敬是敬又爲五德之原也故曰敬用五事如下文農用八政以食爲首故曰農用食者民之所急貨者民之所資故食爲首而貨次之愚按八政皆爲民而設故五事指名三事指官而不及冢宰宗伯司馬民莫急於食貨故首列之在周禮則食貨掌於天官祀掌於宗伯此分言食貨則不及統率百官之事獨言祀則不及朝廷禮樂之事司空安居四民司徒敎民五典司寇禁民姦慝皆切近民事者賔如鄉飲鄉射之類周禮大行人掌大賔之禮本屬司寇今析言之則不及朝覲㑹同之事師如五人爲伍守望相助之類不言司馬則不及陳師鞠旅之事蓋民生日用食貨既足然後修祀事定居室敎以孝悌禁其姦慝㑹賔友尚往來然後能親其上死其長也治民之序固如是若主朝廷布政之職則有不盡於此者禮樂大事而不舉焉愚固以八政皆爲民而設也注䟽亦云如鄭王之說自可皆舉官名何獨三事舉官也蓋八政主農而言非謂公家之事耳歳者序四時也歳者天時之一周故正其歳在於序四時四時得其序而後歳功可成也月者定晦朔也歳統時時統月時有三月故三月爲天道小變之莭不可差也在於定晦朔而已晦爲前月之終朔爲後月之始每於日月所㑹之辰定之則十有二月不差矣日者正􅄤度也在天爲度在歳爲日􅄤者日行於度也天有三百六十五度四分度之一歳有三百六十五日四分日之一日行每與月㑹則爲一月一㑹之期二十九日四百九十九分十二㑹而成一歳則日行之度尚餘十日八百二十七分謂之閏餘積之三歳則置閏月以貯之故日行惟在於正􅄤度􅄤度既正則日月之㑹無先後之差而餘分之積免失閏之謬由是曰月曰歳皆可協矣星經星緯星經星貼天不動凡内官外官二十八舍皆是也緯星麗天而行如杼之緯帛水火木金土五星是也夜則仰觀而識之後倚北極前定昏旦二中伺察五緯晨夕遲疾順逆伏見彗孛流隕皆謹視之以奉天戒辰日月所㑹十二次也自𤣥枵至娵訾各有界限夜考中星知日月之行度以追計其所㑹而定晦朔弦望必於辰推之則歳月日皆可定矣詳見堯典厯數者占歩之法所以紀歳月日星辰也史記太史公曰神農以前尚矣蓋黄帝考定星厯建立五行起消息正閏餘是謂五官各司其序顓頊受之乃命南正重司天北正黎司地堯立羲和之官明時正度年耆禪舜申戒文祖云天之厯數在爾躬舜亦以命禹由是觀之王者所重也夏正以正月殷正以十二月周正以十一月蓋三王之正若循環窮則返本天下有道則不失紀序無道則正朔不行於諸侯愚按占歩之法歴代不同三代不可考矣後世作者莫善於唐一行大衍厯法其詳具載唐史今之授時尤精焉皇君建立也極猶北極之極至極之義標凖之名中立而四方之所取正焉者也朱子皇極辨曰洛書九數而五居中洪範九疇而皇極居五故自孔氏傳訓皇極爲大中而諸儒皆祖其說余獨以經之文義語脉求之而有以知其不然也蓋皇者君之稱也極者至極之義標準之名常在物之中央而四外望之以取正焉者也故以極爲在中之準的則可而便訓極爲中則不可若北辰之爲天極􅆃棟之爲屋極皆然而禮所謂民極詩所謂四方之極者於皇極之義爲尤近顧今之說者既誤於此而并失於彼是以其說展轉迷謬而終不能以自明也即如舊說姑亦無問其他即經文而但讀皇爲大讀極爲中則夫所謂惟大作中大則受之爲何等語乎今以余說推之則人君以眇然之身履至尊之位四方輻輳面内而環觀之自東而望者不過此而西也自南而望者不過此而北也此天下之至中者也既居天下之至中則必有天下之絶德而後可以立至極之標準故必順五行敬五事以修其身厚八政恊五紀以齊其政然後至極之標準卓然有以立乎天下之至中使夫靣内而環觀者莫不於是而取則焉語其仁則極天下之仁而天下之爲仁者莫能加也語其孝則極天下之孝而天下之爲孝者莫能尚也是則所謂皇極者也由是而權之以三德審之以卜筮驗其休咎於天考其祸福於人如挈裘領豈有一毛之不順哉此洛書之數所以雖始於一終於九而必以五居其中洪範之疇所以雖本於五行究於福極而必以皇極爲之主也極者福之本福者極之效極之所建福之所集也人君集福於上非厚其身而已用敷其福以與庶民使人人觀感而化所謂敷錫也朱子又云人君能建其極則爲五福之所聚而又有以使民觀感而化焉則是又能布此福以與其民也愚按極本於理福原於氣極建則福集者蓋理順而氣亦順耳記曰福者備也備者百順之名也人君以皇極爲訓而庶民行之則庶民亦受其福矣君人者豈他有所謂福以付畀之哉庶民與有位之人而無淫朋比德者惟人君爲之極而使之有所取正耳下文言有猷有爲有守此庶民之無淫朋者有能有爲此正人之無比德者人民二字分言甚明諸說要以蔡傳爲正新安陳氏曰作有扶植振起之意建立作興大略相似不建不作則斯道廢墜矣帝念哉之念言人君於有猷有爲有守之人念之而不忘當如帝舜之念臯陶也歸斯受之之受言民有未合於善不陷於惡人君所當受之蓋如孟子所謂逃楊墨而歸儒者有可與爲善之機也故歸斯受之見於外而有安和之色發於中而有好德之言汝於是則錫之以福而是人斯其惟皇之極矣朱子又云夫人之有能革面從君而以好德自名則雖未必出於中心之實人君亦當因其自名而與之以善則是人者亦得以君爲極而勉其實也新安陳氏曰而康而色傳辨皆作民言孔氏謂汝當安汝顔色以謙下人兩而字皆指武王言假容色以俯就誘掖人則人心感發無隱於君曰我所好在德君則尤當迎其善意而錫之福也蓋攸好德爲五福之一實福之本也愚按此說儘善而朱蔡並不從孔者蓋經文此一節本說庶民有此三等所當念之者是中人以上有可見之德者也所當受之者中人之資可與進德者也彼安和其色自謂好德者中人以下者也朱子所謂革面從君者謂如論篤是與君子者乎色莊者乎汝則錫之福者與其過而棄之寧若過而與之人君於此三等或念之而不忘或受之而不拒或錫之而不吝則時人斯其惟皇之極而無不勉爲善矣如孔氏之意止言念之受之兩等緫以謙下之而錫之福也如此則中人以下之資皆棄於聖人陶冶之外矣下文尚言無虐煢獨况於革面而知以好德自名者乎此朱蔡不從孔氏之㫖也煢獨庶民之至微者也髙明有位之尊顯者也各指其甚者而言煢獨微賤無善可録又出於上文三等之下人之所易忽者也髙明尊顯聞望久著又出於有能有爲之上人之所易畏者也於此無虐而無畏焉則抑揚予奪之閒其必有道矣在三德之疇惟辟作福惟辟作威是也此一節兼言民人又以煢獨爲庶民之微者故以結上章之末髙明爲有位之尊者故以冠下章之首也朱子辨中併下文至而邦其昌解之謂君之與民一視同仁凡有才能使皆進善則人才衆多而國賴以興也與蔡傳不同此言有位者也此亦分三段者第一段言在位而又有才智施設使羞其行則是嘉其已善而益進其後效也第二段言富則方榖貧則陷罪是中人而在位者必養其恒心而後責其善行也第三段言無德而錫福者是謂用咎蓋爵罔及惡德之義也誠以列於庶位之人善惡有未易先知者必考其實而黜陟之也詳此民人兩章各分三節其論人君升降予奪之權既明且嚴誠以居上御下威福在己一失其道則下不得所其將何以建其有極而使民人皆錫汝保極哉又按其作汝用咎朱子謂至於無好德之心而後始欲敎之以脩身勸之以求福則已無及於事而其起以報汝惟有惡而無善矣蔡氏謂則爲汝用咎惡之人愚謂作起也咎歸怨也如舉枉錯諸直則民不服之意謂於無德之人若錫之福禄則人皆起而歸怨於汝矣此章蓋詩之體所以使人吟詠而得其情性者也性字下當補之正二字性與氣雜情與欲流未必皆正故皇極之君以彞理爲訓惟欲使人得其情性之正耳愚又按此章有戒辭有勸辭上六句用無字者所謂戒之以私而懲創其邪思也下六句用王字者所謂訓之以極而感發其善性也前言無偏陂好惡禁止之意重後言無偏黨反側禁止之意輕蓋人慾之萌能遏之於心則及其既發自然中節而無事禁止之嚴矣方㑹其有極也必指其所當行者故曰遵義遵道遵路遵而不失則自忘其傾邪狹小之念矣及歸其有極也莫不識其正大之體故曰蕩蕩平平正直如行者之赴家而自達於公平廣大之域矣始而行道終而造道皆以人君爲標準而自求至極之理於吾心也故在君曰建其有極在民曰㑹其有極歸其有極所有者各有其有耳非人有之而己獨無也又非得他人之所有以爲己有也合而來也各有其有來而至也同有其有此皇極君民所以相與之盛歟與周禮太師敎以六詩者同一機而尤要者也春官太師云敎六詩曰風曰賦曰比曰興曰雅曰頌以六德爲之本以六律爲之音愚按太師敎詩而本之以六德是固可以融㑹性情而興起志意然三百篇之多一言之要在思無邪而已曷若皇極之敷言是彞是訓使人諷誦之閒恍然而悟油然而得者故比之六詩雖同一機括而尤爲切要者也曰者民之辭也謂之父母者指其恩育而言親之之意謂之王者指其君長而言尊之之意凡民之所以有生者父母也父母有我合天地之氣以成形具天地之理以成性然父母之所以恩育我者其初惟能保此天地之氣而使形體之長茂爾其賢不肖固未可必之於後日也有聖人焉繼天立極是彞是訓能使天下之民皆有以明天地之理以全其固有之性則其敎誨式榖有父母之所不能備者於是時也服膺皇極之訓親近天子之光皆曰生我者父母也而能備敎育之恩者吾君又爲一父母也則其歡欣愛戴之私不極其歸往之辭不止也故曰以爲天下王夫自古未甞一日無王也而得民之尊己者爲難惟以徳行仁者而後天下以爲王也蓋生我者一家之父母也而建其有極者天下之父母也爲天下之父母則天下之赤子皆往歸之不謂之王而謂之何哉箕子之爲是言以天下之公義而推望於武王者深矣正直剛柔三德也三德一疇須分君民之别然後義明正者無邪直者無曲剛克柔克者威福予奪抑揚進退之用也此三德之在君者所謂爲政以德德者出治之本也人君道全德備剛柔正直各臻其極隨所遇而應之爾彊弗友者彊梗弗順者也燮友者和柔委順者也沉潛者沉深潛退不及中者也髙明者髙亢明爽過乎中者也蓋習俗之偏氣禀之過者也此三德之在民者并正直爲三德人君能建其有極故三德皆吉凡民有氣稟之殊習俗之異故正直之德甚少而剛柔過不及之德甚多皇極之化所以抑揚進退者皆欲過不及者之歸於正直也故平康正直無所事乎矯拂無爲而治是也正直即前所謂王道正直是也平康即前所謂無反無側後所謂家用平康是也在下者無反側在上者惟正直夫何爲哉恭已正南面而已矣正直之用一剛柔之用四也正直用之於平康剛柔用之於習俗之偏氣禀之過者也習俗之偏言習於彊而偏於剛習於夑而偏於柔氣禀之過謂所禀沉潛而過於柔所禀髙明而過於剛聖人撫世酬物因時制宜平康强梗委弱有舉世而然有一家一國而然有一身一時而然聖人抑揚進退威福予奪所謂酬物制宜者也三德乂用陽以舒之隂以斂之三德在君皆主於治民在民各從君所治民所習者剛或所禀者柔則君皆以剛克之民所習者柔或所禀者剛則君皆以柔克之陽以舒之者言夑友柔克沉潛剛克皆人君之所予也隂以斂之者言彊弗友剛克髙明柔克者皆人君之所抑也執其兩端用其中於民所以納天下民俗於皇極者蓋如此兩端用中皆借說聖人稟中和之氣三德備具其爲治也全體立於此而大用行於彼如鑑之照物妍媸在彼隨物應之而已或以剛克或以柔克抑其過而引其不及而卒化天下於平康所謂用其中於民也兩端言剛柔也中言正直也聖人豈不欲天下之人皆正直而無所事乎矯拂哉不可必得故盡其撫世酬物因時制宜之妙㑹極歸極而終得以歸於聖人之天也故曰三德者治之所以應變也福威者上之所以御下玉食者下之所以奉上前皇極傳云作好作惡好惡加人之意也此云作福作威亦以威福加人之意如可貴可賤可富可貧可生可殺之類孔傳云玉食美食也釋文云珍食也臣無有者戒其臣不可上僭也禮始諸飲食蓋飲食乃日用之切身者凡臣下僭上威福之外未有不玉食者故以切近者爲戒頗不平也頗普多反與無偏無陂同訓不平舊本作無偏無頗唐𤣥宗以頗不恊義字韻詔改爲陂事見郭忠恕佩觿大夫必害於而家諸侯必凶於而國有位者固側頗僻而不安其分小民亦僭忒而踰越其常而家而國與皇極疇而邦其昌好于而家同而字皆訓汝彼而邦指周言此國字指侯國言大夫之家諸侯之國而謂之而家而國者蓋王者一統天下諸侯大夫不敢有其室雖寄治於諸侯大夫其實無非天子之家國也天子不能作福作威而使權移於下是自害汝家自凶汝國耳魯用天子之禮樂其流之弊遂使季氏僭八佾三家僭雍徹陪臣執國命是其驗也龜曰卜蓍曰筮輯纂引東齋集傳云龜歳久則靈蓍生百年一本百莖亦物之神靈者卜筮實問鬼神以蓍龜神靈之物故假之以驗其卦兆卜法以明火爇柴灼龜爲兆筮法以四十九蓍分掛揲扐凡十有八變而成卦又西山蔡氏云皇極之君以人謀未免乎有心有心未免乎有私此所以洗心齋戒以聽天命而無所容其心也擇建立卜筮人者非其人則不可非其職則不專必得其人而立之然後乃可命之卜筮定天下之吉凶成天下之亹亹非細事也兩者如雨其兆爲水霽者開霽其兆爲火䝉者䝉昧其兆爲木驛者絡繹不屬其兆爲金克者交錯有相勝之意其兆爲土此五者雖無一二之次然立言自合五行之生序蓋龜兆随時而見不如五事有先後之倫也絡繹孔氏作落驛䟽云希䟽之意愚按五兆蔡氏與孔氏所釋大同但孔氏不知爲五行之兆耳又䟽云今之用龜其兆横者爲土立者爲木斜向徑者爲金背徑者爲火因兆而細曲者爲水不知與此五者同異如何又史記龜䇿傳其兆有首仰首俛足開足肣音琴歛也横吉之類是漢太卜法其文雖存而今之學者亦罕通之又周禮太卜掌三兆之法其經兆之體皆百有二十其頌皆千有二百䟽云體者謂龜之金木水火土五兆之體經兆之體者名體爲經也占人云凡卜筮君占體大夫占色史占墨卜人占坼注云體兆象也色兆氣也墨兆廣也坼兆亹也體有吉凶色有善惡墨有大小坼有微明尊者視兆象卑者以次詳其餘也内卦爲貞外卦爲悔朱子語録云貞訓正事方正如此悔吝皆是事過後方有内卦之占是事正如此外卦之占是已如此二字有終始之意一貞八悔如重乾澤天夬火天大有雷天大壮風天小畜水天需山天大畜地天泰内體是乾是一貞外體八卦是八悔餘倣此左傳蠱之貞風其悔山是也䟽云僖十五年秦伯伐晉卜徒父筮之其卦遇蠱蠱卦巽下艮上說卦云巽爲風艮爲山其占蠱之貞風也其悔山也是内卦爲貞外卦爲悔也筮法爻從下起故以下體爲内上體爲外下體爲本因而重之故以下卦爲貞貞正也言下體是其正鄭元云悔之言晦晦猶終也晦是月之終故以爲終言上體是其終也下體言正以見上體不正上體言終以見下體爲始二名互相明也又有以遇卦爲貞之卦爲悔國語貞屯悔豫皆八是也晉語云公子親筮之曰尚有晉國韋昭云命筮之辭也得貞屯悔豫皆八也韋昭云内曰貞外日悔震在屯爲貞在豫爲悔八爲震兩隂爻在貞在悔皆不利朱子啓䝉云三爻變則占本卦之彖辭而以本卦爲貞之卦爲悔沙隨程氏曰晉公子重耳筮得國遇貞屯悔豫皆八蓋初與四五凡三爻變也初與五用九變四用六變其不變者二三上在兩卦皆爲八故云皆八而司空季子曰皆利建侯舊說卜有玉兆瓦兆原兆筮有連山歸藏周易者非是䟽云言三人占是占此卜筮法當有三人周禮太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆掌三易之法一曰連山二曰歸藏三曰周易三法並卜法有一人故三人也又周禮䟽云其形可占者其象似玉瓦田之璺罅謂破而不相離也原原田也杜子春云玉兆帝顓頊之兆瓦兆帝堯之兆原兆有周之兆又云連山伏羲歸藏黄帝鄭元云夏曰連山殷曰歸藏皇甫謐云夏人因炎帝曰連山殷人因黃帝曰歸藏西山蔡氏曰恐非是禹敘洛書之時未有原兆與周易也人一從而龜筮不違者亦吉卜筮有六條第一是大同最吉第二是君從第三卿士從第四庶民從此皆人一從而龜筮不違者爲次吉龜從筮逆則可作内不可作外是第五條爲次凶龜筮共違則可静不可作是第六條最凶然有龜從筮逆而無筮從龜逆者龜尤聖人所重也故禮記大事卜小事筮傳謂筮短龜長是也僖公四年左傳云晉獻公欲以驪姬爲夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長杜預注云物生而後有象象而後有滋滋而後有數龜象筮數故象長數短又朱子語録云易占不用龜而每言蓍龜皆具此理也筮短龜長者謂龜惟鑚灼之易而筮有扐揲之煩龜之兆一灼便成亦有自然之易雨屬水暘屬火燠屬木寒屬金風屬土按朱子太極圖解水隂盛故爲雨火陽盛故爲暘木陽穉故爲燠金隂穉故爲寒土沖氣故爲風此序亦與五行生序同漢志引狐突金寒之言五行志貌之不恭時則有服妖引左傳閔公二年晉獻公使太子申生帥師公衣之偏衣佩之金玦狐突歎曰尨凉冬殺金寒玦離胡可恃也師古曰金行在西是謂之寒輯纂引新安陳氏曰雨暘燠寒吳氏引證其屬水火木金甚當風之屬土獨缺其證當如莊子風生於土囊之口及大塊噫氣其名爲風證之風爲土氣豈不章章明矣乎又孔氏䟽云風土氣也凡氣非風不行猶金木水火非土不處故土氣爲風葵初王氏曰吳斗南以雨暘燠寒風屬水火木金土引證甚明但風土無所證今以孔氏陳氏之說補之極合造化愚按五事思曰睿睿作聖休徴曰聖時風若蓋思無不通曰睿有八風宣暢之象五行乃生數自然之序五事則本於五行庶徴則本於五事其條理次第相爲貫通一曰水在事爲貌在徴爲雨二曰火在事爲言在徴爲暘三曰木在事爲視在徴爲燠四曰金在事爲聽在徴爲寒五曰土在事爲思在徴爲風皆自然之合也在天爲五行在人爲五事五事修則休徴各以類應之五事失則咎徴各以類應之自然之應也然必曰某事得則某休徴應某事失則某咎徴應則亦膠固不通而不足與語造化之妙矣愚按蔡氏既曰五事修則休徴各以類應五事失則咎徴各以類應是其失得感應之條緖有不可紊者矣然又以膠固不通而不足與語造化之妙者是何言之相反也此無他蓋言理不可爽事不可泥以深懲漢儒穿鑿之弊以解後世之惑耳前言自然之應者以其理有不可爽故也後言膠固不通者以其事有不可泥故也且經文明言念用庶徴又曰王省惟歳且以五事之得失詳著其效驗如此是固人君之所必當省念而克謹天戒者豈妄爲虚文以厚誣天人哉朱子語録云今人讀書麄心大膽如何看得古人意思如說八庶徴這若不細心體識如何㑹見得肅時雨若肅是恭肅便自有滋潤底意思所以便說時兩順應之乂時暘若乂是整治便自有開明底意思所以便說時暘順應之哲時燠若哲是昭融便自有和暖底意思所以便說時燠順應之謀時寒若謀是藏密便自有寒結底意思所以便說時寒順應之聖時風若聖是通明便自有爽快底意思所以便說時風順應之愚按漢儒以五行論災異正爲不知五行五事皆有自然之序而恣爲穿鑿之說其言曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾爲妻則火不炎上治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭侵邊境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下貌之不恭是謂不肅厥咎狂厥罰恒雨厥極惡時則有服妖時則有龜孽時則有雞旤時則有下體生上之疴時則有青眚青祥唯金沴木言之不從是謂不乂厥咎僭厥罰恒暘厥極憂時則有詩妖時則有介蟲之孽時則有犬旤時則有口舌之疴時則有白眚白祥惟木沴金視之不明是謂不哲厥咎舒厥罰恒燠厥極疾時則有草妖時則有蠃蟲之孽時則有羊旤時則有目疴時則有赤眚赤祥惟水沴火聽之不聦是謂不謀厥罰恒寒厥極貧時則有鼓妖時則有魚孽時則有豕旤時則有耳疴時則有黒眚黒祥惟火沴水思心之不睿是謂不聖厥咎霧厥罰恒風厥極凶短折時則有脂夜之妖時則有華孽時則有牛旤時則有心腹之疴時則有黄眚黄祥時則有金木水火沴土皇之不極是謂不建厥咎眊厥罰恒隂厥極弱時則有射妖時則有龍虵之孽時則有馬旤時則有下人伐上之疴時則有日月亂行星辰逆行唐孔氏曰洪範本體與人主作法皆據人主爲說五行傳曰貌屬木言屬金視屬火聽屬水思屬土五行傳伏生之書也漢書五行志云河圖洛書相爲經緯八卦九章相爲表裏昔殷道弛文王演周易周道敝孔子述春秋則乾坤之隂陽效洪範之咎徴天人之道粲然著矣漢興承秦滅學之後景武之世董仲舒治公羊春秋始推隂陽爲儒者宗宣元之後劉向治穀梁春秋數其旤福傳以洪範與仲舒錯至向子歆治左氏傳其於春秋意亦已乖矣言五行傳又頗不同是以與仲舒别向歆傳載眭孟夏侯勝京房谷永李尋之徒所陳行事迄於王莽舉十二世以傳春秋著於篇朱子語録云伯謨云老蘇著洪範論不取五行傳而東坡以爲漢儒五行傳不可廢此亦自是既廢則後世有忽天之心先生曰漢儒也穿鑿如五事一事錯則皆錯如何却云聽之不聦則某事應貌之不恭則某事應西山蔡氏云君即五者之應以察吾五事之得失一事得則五事從休徴無不應矣一事失則五事違咎徴無不應矣鯀陻洪水水失其性爾而五行爲之汨陳以是理也漢儒不得其意而事爲之說驗之於古則鑿而不經推之將來則膠而不應又以福極强配五行而以弱配皇之不極非鑿歟復齋董氏曰仲舒劉向五行傳以五行五事皇極庶徴福極五者牽合相從至於庶徴分配五福而六極衍其一則於咎徴各増其一曰皇之不極厥咎眊厥罰常隂厥極弱此則於箕文之外别立此以遷就其說其失箕子之意逺矣愚謂洪範九章五行居首而其相貫者五事庶徴而已漢儒分析六極甚無謂也蔡氏知其牽合穿鑿泥於災異將以防人君之失而適以啓世主之惑故深闢之而又以其理有不可爽者故以自然之應論之可謂深切著明者矣今以經之成文事之定理係其感應約爲條緒遵蔡氏之㫖正漢儒之謬曰天有五行散爲五氣順則時若逆則恒若人有五事具爲五德修則徴休過則徴咎天人相應理氣存焉大君受命欽若昊天建其有極惟謹厥德反躬克念休咎靡忒天一生水水性潤下在事爲貌在氣爲雨貌德爲恭貌澤爲水恭而作肅時雨順之弗念而狂恒雨順之地二生火火性炎上在事爲言在氣爲暘言德惟從言揚爲火從而作乂時暘順之弗念而僭恒暘順之天三生木木性曲直在事爲視在氣爲燠視德惟明視散爲木明而作哲時燠順之弗念而豫恒燠順之地四生金金性從革在事爲聽在氣爲寒聽德惟聦聽收爲金聦而作謀時寒順之弗念而急恒寒順之天五生土土德稼穡在事爲思在氣爲風思德惟睿思通爲土睿而作聖時風順之弗念而蒙恒風順之人主一身示天下準財成輔相惟明克允匪曰一動厥咎易彰匪曰一言厥休永臧誠之於思視聽無違念兹庶徴内外兩持惟德惟至惟義惟極居中御外孰曰罔克斂兹五福以錫萬邦永孚於休外順内昌上帝降監保兹皇極於萬斯年爲民之式王者之失得其徴以歳卿士之失得其徴以月師尹之失得其徴以日王者統卿士卿士統師尹如歳統月月統日故王者之省念以歳計之卿士以月計之師尹以日計之職任愈卑則省念愈詳師尹上之於卿士卿士上之於天子天子反躬自省視吾之五事失得如何或有大旱淫雨愆陽伏隂之災闗一歳之利害者王曰是吾之咎也一月之閒隂陽不和卿士則曰是吾之咎也未及一月以日計之而亦爲災害者師尹則曰是吾之咎也蓋災害之大者則上屬於君其次則係於大臣其次則係於羣臣上下之間交相儆戒不敢有一豪忽天之心則必和氣致祥休慶軿集歲月日時無所變易而稼穡治功人才家國無不各順其宜矣其或玩月愒日昬迷天象災眚荐至若罔聞知自下至上互爲欺蔽積日至月積月成歲師尹不致其憂卿士不疚其心天子不能反躬修德遂使日月至歳變其時若百度皆廢休咎所致有如此者可不謹哉好風者箕星好雨者畢星漢志言軫星亦好雨此雨字誤漢志作風漢天文志云箕星爲風東北之星也及巽在東南爲風風陽中之隂其星軫也月去中道移而東北入箕若東南入軫則多風西方爲雨雨少隂之位也月失中道移而西入畢則多雨故詩云月離於畢俾滂沱矣言多雨也晉志亦言軫主風日有中道中道者黄道也北至東井去極近南至牽牛去極逺東至角西至婁去極中日極南至於牽牛則爲冬至極北至於東井則爲夏至南北中東至角西至婁則爲春秋分此皆据漢志文愚謂天體至圓非有界限爲日月五星之道路也惟有經星綴天不動可借之以誌界限於是記取日所經歴之處周圍有二十八星名曰二十八舍又記取日行之路名曰黄道黄道貫穿二十八舍之閒斜繞天腹一日行一周而不及天少許蓋天亦動日亦動皆自東而西天至健一晝夜一周而過一度初不知其爲一度也則見日行於内一晝夜恰一周而不及天所攙過者積三百六十五日四分日之一而日行恰退過一周遂即其所誌二十八舎分爲三百六十五度四分度之一蓋以日一日不及天少許之處爲一度地位也其黄道既斜繞天腹則去北極自有逺近所謂北至東井去極近南至牽牛去極逺者北至者夏至之時也南至者冬至之時也東井本在南方朱鳥七宿中牽牛本在北方𤣥武七宿中今以夏至日行在人間天北井度近於北極冬至日行在人間天南牛度逺於北極故曰北至東井去極近南至牽牛去極逺也東至角爲秋分日行所退之處西至婁爲春分日行所退之處此云東西者則按天圖言之角在東方七宿婁在西方七宿也又非人間之東西也日至牽牛而爲冬至在東井而爲夏至在婁爲春分在角爲秋分此皆漢厯然也天運於外日行於内每歳有差至八十餘年則差一度唐一行謂堯時冬至日在虛一度及開元甲子却差三十六度自開元至於今又不同矣今則北至井四南至斗初東至軫二西至壁九與漢不同漢厯亦與周初不同也而蔡氏引之者亦示人以厯法大槩使學者知日月之行所以有冬有夏者如此耳月有九行九行者黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東并黄道為九行也立春春分從青道立秋秋分從白道立冬冬至從黑道立夏夏至從赤道此亦据漢志文又按大衍厯云凡合朔所交冬在隂厯夏在陽厯月行青道冬至夏至後青道半交在春分之宿當黄道東立冬立夏後青道半交在立春之宿當黄道東南至所衝之宿亦如之冬在陽厯夏在隂厯月行白道冬至夏至後白道半交在秋分之宿當黄道西立冬立夏後白道半交在立秋之宿當黄道西北至所衝之宿亦如之春在陽厯秋在隂厯月行朱道春分秋分後朱道半交在夏至之宿當黄道南立春立秋後朱道半交在立夏之宿當黄道西南至所衝之宿亦如之春在隂厯秋在陽厯月行黑道春分秋分後黒道半交在冬至之宿當黄道北立春立秋後黑道半交在立冬之宿當黄道東北至所衝之宿亦如之四序離為八節至隂陽之所交皆與黄道相㑹故月有九行其去黄道六度凡日以赤道内爲隂外爲陽月以黄道内爲隂外爲陽愚甞思之月有九行合洛書九宫之數分爲八節合洛書八方之數每一節四十五日合洛書之目數五日爲一候九候爲一節合洛書九數皆以五爲宗也故五九四十五日也一節四十五日八節各三百六十日爲一朞之數也洛書縱横十五故月十五日而望也一六配黒道三八配青道四九配朱道二七配白道五配黄道六爲老隂一合五亦爲六在北爲立冬冬至八爲少隂三合五亦爲八在東爲立春春分九爲老陽四合五亦爲九在南爲立夏夏至七爲少陽二合五亦爲七在西爲立秋秋分月行東北入于箕則多風月行西南入于畢則多雨南字衍丈漢志無南字朱子語録云問箕星好風畢星好雨曰箕是簸箕以其簸揚而鼓風故月宿之則風古語云月宿箕風揚沙畢是义網漉魚底义子亦謂之畢漉魚則其汁水淋漓而下若雨然畢星名義蓋取此今畢星上有一柄下開兩义形象亦類畢故月宿之則雨漢書謂月行東北入箕若東南入軫則風者軫是東南方屬巽爲風所以好風恐未必然五福六極在君則係於極之建不建在民則由於訓之行不行感應之理微矣人君建其有極而民人㑹極歸極者所謂理一也福有五而極有六者所謂分殊也夫死生祸福貧富壽夭得於有生之初各有一定之分而不可移者今而嚮用五福所以勸善威用六極所以懲惡然則福極果出於人力而不謂命哉曰不然皇極之理與天爲一故栽者培之傾者覆之天之道也天者理之所自出也皇極既建是訓是行此天之所培也嚮用五福固有可致之理也背道滅德自暴自棄此天之所覆也威用六極固有可召之機其福極之本皆原於氣壽得氣之長富得氣之厚康寧得氣之安攸好徳得氣之純考終命得氣之正凶得氣之暴短折得氣之促疾得氣之疵憂得氣之鬱貧得氣之薄惡得氣之沴弱得氣之衰無非氣禀之所爲者然氣非理無所主理無不善有生之後氣拘物蔽在乎善返其初與否耳理順則氣順順則爲福蓋理之所至氣亦隨之而化故曰禍福無不自己求之者皇極之君德盛仁熟斂福於身推以爲訓而與民由之所謂錫福也其或自外於聖人之天而無攸好德之實則鮮不陷於六極矣雖然有常有變爲善致福爲惡致祸此常也盜跖之壽顔淵之夭此變也君子語常而不語變盍惟於吾心之天求之輯纂董氏曰自初一曰五行至威用六極禹之本文九疇之經也自一五行至篇終箕子之敘論九疇之傳也先經以明其綱後傳以詳其目洪範可得而讀矣蓋天地之所以爲造化者隂陽五行而已聖人不能違也天地以其氣生育民物而理行乎其中聖人以其理修己治人而氣參乎上大抵一二三四皆經常之疇法天以治乎人者也六七八九皆權變之疇即人以驗諸天者也而五皇極一疇則守常制變之主與天爲徒爲民之則者也洪範法之大不出九疇外則彝倫道之常即在九疇中矣舎是何以敘彝倫哉書蔡氏傳旁通卷四中欽定四庫全書書蔡氏傳旁通卷四下元陳師凱撰旅􅋙九夷八蠻多之稱也職方言四夷八蠻爾雅言九夷八蠻但言其非一而已周禮注云東方曰夷南方曰蠻四八周之所服國數也爾雅注䟽云東夷有九種一曰𤣥菟二曰樂浪三曰髙驪四曰蒲飾五曰鳬㬰六曰索豕七曰東屠八曰倭人九曰天鄙八蠻者李廵云一曰天竺二曰咳首三曰僬僥四曰跛踵五曰穿胷六曰儋耳七曰狗軹八曰旁舂武王克商之後威徳廣被九州之外蠻夷戎狄莫不梯山航海而至按汲冡周書王㑹篇所載蠻夷戎狄所獻有曰稷慎文璧曰穢人前兒曰良夷在子曰揚州禺魚曰𤼵人鹿人曰俞人雖馬曰青丘狐九尾曰周頭抵輝曰黒齒白鹿白馬曰白民黄乘曰東越海􅧳曰甌人蟬蛇曰於越納曰姑妹珍曰且甌文蜃曰共人元貝曰海陽大蟹曰自深桂曰㑹稽􅥜曰義渠兹白曰央林尊耳曰唐戎閭曰渠叟䶂犬曰樓煩星施曰卜盧以牛曰區陽鼈封曰䂓矩麟曰西申鳯鳥曰氐羌鸞鳥曰巴人比翼鳥曰方煬皇鳥曰蜀人文翰曰方人孔鳥曰卜人丹砂曰夷閵木曰康民桴苡曰州靡費費曰都郭生生欺羽曰竒幹善芳曰髙夷嗛羊曰獨鹿卭卭距虚曰孤竹距虚曰不令支元獏曰不屠何青熊曰東胡黄羆曰山戎戎菽曰般吾白虎曰屠州黒豹曰禺氏騊駼曰大夏兹白牛曰犬戎古皇之乘曰楚數每牛曰匃奴狡曰權扶玉自曰白州比閭曰禽人管曰路人大竹曰長沙鼈曰魚復鼓鍾鍾牛曰蠻楊之翟曰倉吾翡翠正義所謂王㑹備焉者此也犬髙四尺曰獒据爾雅公羊傳曰晉靈公欲殺趙盾盾躇階而走見宣公六年躇丑略反何休注云躇猶超遽不暇以次太保召公奭也史記云與周同姓姬氏史記註譙周云周之支族食邑於召索隱云召者畿内采地或者謂文王取岐周故墟召地分爵二公故詩有周召二南言皆在岐山之陽故言南也後武王封之北燕以元子就封而次子留周室代為召公至宣王時邵康公虎其後也謹徳蓋一篇之綱領新安陳氏云一篇皆自明王慎徳一句推廣之曰昭徳之致曰惟徳其物曰徳盛不狎悔曰玩人䘮徳曰終累大徳徳之一辭諄諄焉惟慎徳所以自能致貢物惟所貢無異物所以見其慎徳若竒玩之物非所當獻亦非所當受一受之則荒怠之心生而慎徳之意失矣其所貢獻惟服食器用而已無異物也正義云𤣥纁絺紵供服也橘柚菁茅供食也羽毛齒革瑶琨篠簜供器用也如分陳以肅慎氏之矢魯語云仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之来也逺矣此肅慎氏之矢也昔武王克商通道于九夷百蠻使各以其方物来貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令徳之致逺也以示後人使永監焉故銘其楛曰肅慎氏之貢矢以分太姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求之得之金櫝如之分魯以夏后氏之璜之類左定四年衛子魚曰昔武王克商成王定之選建明徳以藩屏周故周公相王室以尹天下於周為睦分魯以大路大旂夏后氏之璜封父之繁弱殷民六族分康叔以大路少帛綪茷旃旌大吕殷民七族分唐叔以大路宻須之鼓闕鞏甲名也沽洗懐姓九宗職官五正不役於耳目之所好不為聲色所役也心箴云心為形役乃獸乃禽周穆王得白狐白鹿而荒服因以不至狐當作狼史記穆王將征犬戎祭公謀父諫王遂征之得四白狼四白鹿以歸自是荒服者不至以武王之聖召公所以警戒之者如此董氏曰聖人不以細行而不謹大臣不以細過而不諫此古之所以君明臣良而後世鮮儷也漢文帝無太保之訓而却千里馬其賢矣哉金縢藏於金縢之匱王日休曰縢緘也以金緘封若金鎻然鄭氏曰凡藏秘書皆然非始周公築土曰壇除地曰墠築土封土也除地平地也鄭元云時為壇墠於豐壇墠之處猶存焉詩言圭璧既卒雲漢之辭既卒既盡用也周禮祼圭以祀先王先公冬官玉人云祼圭尺有二寸有瓉以祀廟瓚如盤其柄為圭也林氏云植璧於壇秉圭於手愚案祼圭有瓚非所秉者所秉於手者乃桓圭信圭躬圭耳當如雲漢總為禮神之玉若為所秉於手者則非祼圭也故孔註以為周公秉桓圭以為贄蔡氏雖以為祼圭而遂不容解秉字要之周公當時亦無酌酒降神之事當依古註為是若爾三王是有丕子之責于天蓋武王為天元子三王當任其保䕶之責于天不可令其死也于天之下疑有闕文舊說謂天責取武王者非是新安陳氏曰蔡氏謂任保䕶之責于天未然惟不用師說所以疑于天之下有缺文朱子語録云此一段先儒都解錯了只有晁以道說得好他解丕子之責如史傳中責其侍子之責蓋云上帝責三王之侍子侍子指武王也上帝責其来服事左右故周公乞代其死言三王若有侍子之責于天則不如以我代之我多材多藝能事上帝武王不若旦多材多藝不能事鬼神不如且留他在世上定你之子孫與四方之民文意如此周公忠誠切至欲代其死以輸危急林氏曰旦多材藝元孫之死不若旦之死元孫能畏服四方則旦之生不若元孫之生習重也謂三龜之兆一同開籥見卜兆之書乃并是吉蔡氏及古註皆不明指是字為何物所并者何兆愚竊謂以三龜卜之見兩兆皆吉故云一習吉及啟籥見書乃云并此兆亦吉也體兆之體也薛氏曰體與詩爾卜爾筮體無咎言之體同周禮占人云凡卜君占體大夫占色史占墨卜人占拆然證以詩之語則卜看兆體亦可通上下言之翼日公歸之明日也瘳愈也林氏曰請代武王之死者周公之本心也王瘳而公不死者天也非人之所能為也孺子成王也按稽古録武王克商七年而崩子成王誦立成王年十三周公為冢宰攝行天子事據此則武王克商二年病時成王僅八嵗故不知卜事至此十三嵗而即位聞流言周公居東二年則成王已十五嵗所謂五尺童子也故稱孺子沖子自成王即位至周公復辟時凡七年而成王二十嵗所謂六尺之孤也流言無根之言如水之流自彼而至此也詩䟽云流謂水流造作虚言使人傳之如水之流然辟讀為避鄭氏詩傳言周公以管蔡流言辟居東都是也見七月詩序下詩䟽云居東者出處東國待罪以需王之察已是說避居之意也周公避居東都史傳更無其事古者避辟扶亦反譬僻皆作辟字而借聲為義鄭讀辟為避故為此說朱子與蔡仲黙書云弗辟之說只從鄭氏為是向董叔重得書亦辨此一條一時信筆答之謂當從古註說後来思之不然是時三叔方流言於國周公處兄弟骨肉之間豈應以片言半語便遽然興師以誅之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請於王王亦未必見從則當時事勢亦未必然雖曰聖人之心公平正大區區嫌疑似不必避但舜避堯之子於南河之南禹避舜之子於陽城自是合如此若居堯之宫逼堯之子即為簒矣又謂成王疑周公故周公居東不幸成王終不悟不知周公如何處愚謂周公亦惟盡其忠誠而已鴟鴞惡鳥也以其破巢取卵比武庚之敗管蔡及王室也嚴氏詩緝云鴟鴞惡聲之鷙鳥喜破鳥巢而食其子託為鳥之愛其巢者呼鴟鴞而告之曰汝先已取我子食之矣無更毁我巢也喻為惡者既陷管蔡於罪矣無更謀危王室也恩愛勤勞鬻養此子誠可傷憫今既取之其毒甚矣况又毁我巢乎程子曰鴟鴞謂為惡者子喻管蔡室喻王室吕氏曰殷民流言中傷周公謀危王室故周公白管蔡親也爾既以惡汚染使陷於罪是害我兄弟矣又欲謀危王室則不可也誚讓也讓責也吕氏曰王欲誚公而未敢所謂未敢則悔過之根本也新當作親案陸氏釋文云新逆馬本作親逆大誥三叔懼遂與武庚叛東齋陳氏曰武王以公義封武庚而不虞其怨以親愛用三叔而不料其反仁人之過也使舎武庚而立微子三監雖欲叛而不從舎三叔而任他人武庚雖欲反而不敢朱子語録云當初紂之暴虐天下之人胥怨無不欲誅之及武王既奉天下之心以誅紂於是天下之怨皆解而歸徳於周矣然商之遺民及與紂同事之臣一旦見故主遭人戮宗社為墟寧不動心兹固叛心之所由生也蓋始於苦紂之暴而欲其亡固人之心及紂既死則怨已解而人心復有所不忍亦事勢人情之必然者又况商之流風善政畢竟尚有在人心者及其頑民感商恩意之深此其所以叛也後来樂毅伐齊亦如此紹介天明以定吉凶韻㑹云紹介行也謂行人之副也書䟽云天道𤣥逺龜是神靈能傳天意以示吉凶故疑則卜之以繼天明道林氏曰天之吉凶示人甚明然其道幽㝠無介紹以傳其意惟卜之以龜則天之明曉可見反鄙邑我周邦左傳宣十四年宋華元曰過我而不假道鄙我也鄙我亡也杜預云以我比其邊鄙是與亡國同微子之命成王既殺武庚封微子於宋以奉湯祀林氏曰不曰宋公之命而曰微子之命蓋周以賓待之非欲臣之也吴氏曰武王克殷封武庚於殷墟封微子於宋樂記曰武王下車投殷後於宋是也及武庚叛成王殺之始即微子已封之宋國建之為上公以奉湯祀蓋申命之書非先未封至此始封也史記世家言周公既承王命誅武庚乃命微子代殷後奉先祀作微子之命以申之其說為是且武王猶封箕子於朝鮮豈有捨微子不封待成王而後封乎新安陳氏曰殺武庚始命微子奉湯祀者蓋紂以嫡子立為天子武庚紂子實為大宗子微子不過支子耳武庚在為殷後奉湯祀者武庚也微子不得與也武庚死殷命黜微子始得代之為殷後歟微子帝乙之長子紂之庶兄也正義曰吕氏春秋仲冬紀云紂之母生微子啟與仲衍尚為妾已而為妻後生紂紂父欲立啟為太子太史據法而争之曰有妻之子不可立妾之子故紂為後鄭云微子啟紂同母庶兄也宋亳在東故曰東夏自豐鎬言之則宋在東宋國即隋之宋州唐之睢陽郡宋升應天府今為歸徳府屬河南即髙辛氏閼伯所居商丘也有微子墓服命上公服命也周禮典命云上公九命為伯其國家宫室車旗衣服禮儀皆以九為節司服云公之服自衮冕而下如王之服康誥武王誥命為衛侯朱子語録云五峯胡氏於皇王大紀考究得康誥非周公成王時乃武王時蓋有朕其弟之語若成王則康叔為叔父矣又首尾只稱文考成王周公必不只稱文考又有寡兄之語亦是武王自稱無疑如今人稱劣兄之類又唐叔得禾傳記所載成王先封唐叔後封康叔無姪先叔之理武王分封之時年已九十武王年九十三而終克商後七年而崩則克商時已八十六嵗及至分封則近九十矣衛康叔封布兹徐廣曰兹者籍席之名諸侯病曰負兹索隠曰兹一作苙公明草也言兹舉成器言苙見潔草也三月周公攝政七年之三月也始生魄十六日也蘇氏曰此洛誥之文當在周公拜手稽首之上新安陳氏曰初基定基址也鎬在西洛在東故曰東國洛見士朝見而趨事也民大和㑹人心本自和也播民和因人心之和而播敷宣暢其和也恱以使民民忘其勞公不忘民之勞而勤勞之所以得民心也以召誥考之周公以三月十二日乙卯至洛先觀召公營洛規模十四日丁巳行郊禮十五日戊午行社禮十六日己未初基作洛繼此五日内號召齊集計度區畫分配科𣲖至二十一日甲子朝乃用書命庶殷諸侯丕作召誥所謂用書命丕作即此所謂洪大誥治也如召誥傳中引春秋傳云云之類參以召誥日月脗合洛誥冠以此九句方有頭緒强附之此全不相應其為洛誥脫簡何可疑者諸家阿附牽强解之非矣孟長也言為諸侯之長吳氏曰詩序言衛不能修方伯連率之職康叔之為方伯無疑明徳慎罰一篇之綱領林氏曰案蘇忿生以温為司寇立政司寇蘇公是也又定四年云武王之母弟八人康叔為司寇則康叔以衛侯入繼蘇公為之故并以詰姦刑暴之事告之臬法也為準限之義東齋陳氏曰臬門梱也有限準之義故以訓法猶謂法為律也愚案律即黄鐘十二律也毫釐不可差刑法亦然故稱法為律吕氏曰外事衛國事也史記言康叔為周司寇職任内事故以衛國對言為外事云云異時成王或舉以任司寇之職而此未必然也新安陳氏曰左傳定公四年有曰武王之母弟八人周公為大宰康叔為司寇則康叔以諸侯入為王朝之卿明矣為司寇與即衛封兩不相妨往来乎朝廷邦國之閒何往不可吕氏内事外事之說極當蔡氏何必疑之而乃添出異時成王或舉以任司寇之職一句適以助後世成王封康叔之說何也權用殷罰有倫者正是初得天下初分封時事若是後来何必師用殷罰為哉味此語愈見得此為武王之書也要囚獄辭之要者也東齋陳氏曰要者結罪之辭要囚謂結定其囚之罪也蔽要囚謂斷其所結定之囚猶今世引斷也今世大辟囚已結罪後猶有審覆經年者顛越人䟽云謂不死而傷戛法也新安陳氏曰蔡訓戛為法未見所本愚案釋詰以典彛法則律戛皆訓常郭註云皆謂常法耳䟽引不率大戛蔡氏蓋据此也酒誥妹邦即詩所謂沬鄉孔氏曰妹地紂所都朝歌以北是薛氏曰妹古沬字水名因水名地愚案古文水名多從女如媯水姜水是也毛詩傳云沬衛邑也穆敬也詩曰穆穆文王是也或曰文王世次為穆亦通新安陳氏曰案昭穆之穆與左傳合不易之論以穆考為穆穆之穆則詩稱武王曰率見昭考此昭字又如何訓耶穆穆之證非也天始令民作酒䟽云世本云儀狄造酒又云杜康造酒本人以意為之今言天降命蓋人為亦天之所使也酒之禍人也而以為天降威者禍亂之成是亦天耳新安陳氏曰天降命與天降威當對觀設酒之初意本為祭祀乃天之降命也酒之流生禍亦天之降威也酒一而已用以祀者此酒也䘮徳䘮邦者亦此酒也天理人欲同行異情人之於酒知其祭祀而本於降命之天又能於燕飲而凛然知有降威之天則天理行而人欲窒方無酒禍矣史氏漸曰吾切喜衛人何其服酒誥之訓世守於無窮也始也商俗淫􅊺武王以酒誥戒之逮幽王之世上下沈湎衛武公作賔之初筵以見衛人非特一時聞訓不敢自越於禁防又能以其所以為禁防者𫝊為子孫法焉肇敏葵初王氏曰肇訓敏未可曉愚案釋言云肇敏也郭云肇牽車牛蔡氏正据此而葵初妄譏甚矣學不可不博汝當用力戒謹殷之賢臣與鄰國之侯甸男衛使之不湎于酒林氏曰康叔為諸侯長故劼毖及侯甸男衛太史掌六典八法八則内史掌八柄之法太史内史在周官為宗伯屬而六典八法八則則冡宰所建以治百官而太史又建六典以為王逆邦國之治掌法以逆官府之治掌則以逆都鄙之治太宰既以八柄詔王内史又居中貳之以詔王治六典治典教典禮典政典刑典事典也八法官屬官職官聨官常官成官法官刑官計也八則祭祀法則廢置禄位賦貢禮俗刑賞田役也八柄曰爵曰禄曰予曰置曰生曰奪曰廢曰誅也薛氏曰二史掌邦法在王朝則貳冡宰在侯國則居賔友之地陳氏傅良曰諸侯有太史無内史内史惟天子有之内史是商之故臣康叔所當親之為友者也愚案此章冠之以汝劼毖殷獻臣當如陳氏說位三卿者大國三卿也圻父政官司馬也主封圻圻詩作祈毛云祈父司馬也職掌封圻之兵甲釋文云封圻當作畿古作祈圻畿同大司馬云制畿封國以正邦國農父教官司徒也主農大司徒云以土㑹之法辨五地之物生以土宜之法辨十有二土之名物以任土事辨十有二壤之物而知其種以教稼穡樹藝以土均之法辨五物九等制天下之地征乃經土地而井牧其田野凡此皆農事既富而後教先王之政也宏父事官司空也主廓地居民周官云司空掌邦土居四民時地利正義云諸侯三卿以上有司馬司徒故知宏父是司空宏大也言大父者以營造為廣大國家之父羣飲蓋亦當時之法其詳不可得而聞矣史記註云漢律三人已上無故羣飲罰金故賜酺得㑹聚飲食酒誥羣飲之執其類此歟梓材大家孔氏曰卿大夫及都家也正義云卿大夫在朝者都家亦卿大夫所得邑也又公邑而大夫所治亦是也愚案定四年云分康叔殷民七族陶氏施氏繁音婆氏錡氏樊氏饑氏終葵氏即衛之大家也律所謂知情藏匿貲給三者皆因罪人所歴過或知情或藏匿或貲給之貲當作資以貲資之也漢律所謂疻也疻說文云毆傷也諸氏切此章文多未詳新安胡氏曰蔡傳僅訓字而云多未詳信當缺之愚以意解之云汝若常言及曰我固有官師為師三卿及正官之長及衆大夫然必自曰我不可厲虐殺人亦以為人上者當率先恭敬勞来故在下者無往而不恭敬勞来矣惟其有欽恤之心勞来之意其用刑也故於往日為姦為宄或殺人或歴人皆宥之故亦於見其君事而有毁傷人者亦宥之往日紂在時也見厥君事亦紂事也蓋商紂之時其民多有為惡者康叔於此不當追咎於既往而與之更新可也康叔所封亦受畿内之民當時亦謂之監受紂也非授受之受東齋陳氏曰康叔孟侯故稱之為監敷菑廣去草棘也敷廣也爾雅云田一嵗曰菑郭璞云江東呼初耕地反草為菑畎通水渠也周禮匠人為􅗂洫廣尺深尺曰畎塗塈泥飾也說文云塈仰塗也茨蓋也穀梁傳註云茨謂茅蓋屋也梓良材梓木名雘采色之名正義云雘是采色之名有青色者有朱色者鄭𤣥引山海經云青丘之山多有青雘此經知是朱者與丹連文故也樸斲以喻制度陳東齋云具粗曰樸致巧曰斲肆今也新安陳氏曰蔡氏訓肆為今未安愚案釋詁云肆故今也郭云肆既為故又為今今亦為故故亦為今蔡氏正據此陳氏未考耳監視也此人臣祈君永命之辭也案梓材有自古王若兹監罔攸辟之語而編書誤以監為句讀而爛簡適有已若兹監之語以為意類合為一篇而不知其句讀之本不同文義之本不類也新安陳氏曰已若兹監與自古王若兹監相似而實不同上文之監平聲三監之監此之監去聲監觀之監已乎君其監觀于兹臣所祈於君惟曰欲自今至于萬年當為天下王王之子子孫孫永保民而已其人臣祈君永命忠愛無窮之心歟書蔡氏傳旁通卷四下
