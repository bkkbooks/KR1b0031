body:
  text: 書蔡氏傳旁通卷五元陳師凱撰召誥武王克商遷九鼎于洛邑見左傳桓二年又宣三年云王孫滿對楚子曰昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物以承天休桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周成王定鼎于郟鄏卜世三十卜年七百天所命也史記載武王言我南望三途史作塗北望嶽鄙顧詹有河粤詹洛伊毋逺天室營周居於洛邑而後云史記索隠云杜預曰三塗山名大行轘轅崤黽也在陸渾縣南嶽蓋河北太行山鄙都鄙謂近嶽之邑愚謂顧詹有河謂回視河水在後也粤詹雒伊毋逺天室史記正義謂粤者審慎之辭言審慎詹雒伊二水之陽無逺離此為天室也愚謂粤與越同及也及視雒伊二水之傍若天室之所在宜為王者之都毋捨此而逺去也天室猶天府也既望十六日也乙未二十一日也林氏曰漢志曰周公攝政七年二月乙亥朔庚寅既望故二十一日為乙未戊申三月五日也漢志曰三月甲辰朔三日丙午愚案二月小盡故三月得甲辰朔五日得戊申規度其城郭宗廟郊社朝市之位周禮匠人營國方九里旁三門國中九經九緯經涂九軌左祖右社面朝後市市朝一夫王宫門阿之制五雉宫隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌旁三門則四面通十二門也國中城内也九經直路九條也九緯横路九條也涂路也九軌言路之廣也軌車轍也乘車之轍六尺六寸兩旁加各七寸通八尺九軌之廣七十二尺也左祖宗廟在王宫之東也右社社稷壇在西也面朝者面猶郷也布政之朝廷在王宫之前也後市市在後也市朝一夫市與朝各方百歩也阿棟也髙一丈長三丈謂之一雉王宫之門屋脊髙五丈也隅者角上浮思也䟽云浮思小樓也上刻畫雲氣蟲獸宫隅之制七雉者王宫之四角髙七丈也城隅之制九雉者城角髙九丈也環涂者遶城下路也七軌廣五丈六尺也野涂國外之路也五軌廣四丈也又案周書作雒云周公將致政乃作大邑成周于土中城方千七百二十丈郛十七里南繋于洛水北因于郏山以為天下湊乃設丘兆于南郊以祀上帝配后稷愚案以六尺為歩算之則九里之城計方一千六百二十丈汲書云七百者古本字訛耳郏山即郏鄏之郏史記正義云郏山名鄏邑名括地志云故王城一名河南城本郏鄏周公新築在洛州河南縣北九里苑内也郊祭天地也故用二牛社祭用太牢禮也孔氏云郊以后稷配故二牛䟽云記及公羊皆曰養牲必養二帝牛不吉以為稷牛吕氏曰郊祭天社祭地愚案上三說皆是也古者無天地合祭之禮所以郊用二牛者一為上帝之牛一為配帝后稷之牛蔡傳謂祭天地故用二牛此說誠誤社為土神即祭地之禮朱子言之詳矣蔡氏不用何也王制曰天子社稷皆太牢春秋傳曰士彌牟營成周見昭公十二年即周敬王十年揣髙低仞溝洫物土方度髙曰揣度深曰仞物相也相取土之方面也邦伯者侯甸男服之邦伯也邦伯諸侯之長也王氏曰成王欲宅洛邑者以天事言則日東景朝當作夕多陽當作風日西景夕當作朝多隂日南景短多暑日北景長多寒洛天地之中風雨之所㑹隂陽之所和也大司徒云以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然馮氏子亮云土中之說蔡氏引王氏所論而今本多訛日東景夕多風誤為景朝多陽日西景朝多隂誤為景夕多隂宜正之又案王氏據周禮而鄭註不明蓋地官司徒測土深正日景所以求地之中也所謂日南景短日北景長日東景夕日西景朝者是指其立表之處而言其不中也日南云者是立表於晝日之南也表立於此則其影必短於圭而其地多暑是偏於南矣日北者是立表於晝日之北也表立於此則其影必長於圭而地多寒是偏於北矣表立於晝日之東則日至夕而表影方與圭齊是又偏於東而其地多風矣表立於晝日之西則日方朝而表影已與圭齊是又偏於西而其地多隂矣凡此皆非地之中也而用此法者乃所以求中也案歩占之說以為日與地相去一萬五千里為地之中土圭之法圭長一尺五寸以一寸準千里當晝漏方半置圭立表以測度之夏至之日立八尺之表其影適與土圭等定此為地中也又案寰宇記云河南府登封縣測景臺在縣東南二十五里髙一丈周廻十六歩周禮地中在此也縣北有陽城山王之初服若生子無不在於初生習為善則善矣自貽其哲命為政之道亦猶是也新安陳氏曰明哲之性與生俱生初生之時習於善則明可作哲習於惡則靡哲不愚哲則為天所命愚則天不命焉是自貽哲命如所謂自求多福此所謂無不在其初生時自貽哲命者王之初服亦猶是也此一節𤼵明王乃初服之意蓋今日作邑而自服土中乃所謂初服是又中天下定四海之一初也天之命吉凶判於此王之能敬徳祈永命與不能亦判於此召公所以欲王乘此一初之機而疾敬徳也疾敬徳則能用徳疾云者欲其乘此機而速勉之洛誥復如逆復之復逆復出周禮已見龍作納言下復命于王葉氏曰如孟子有復于王之復王莽居攝幾傾漢鼎皆儒者有以啟之古註云周公言我復還明君之政於子新安陳氏曰王莽廢漢孺子嬰為安定公執其手流涕曰昔周公攝位終得復子明辟今予獨廹皇天威命不得如意蓋因孔氏釋經之誤莽遂借此以文其姦也洛師猶言京師也京大也師衆也河朔黎水河北水交流之内也蘇氏曰黎水今黎陽也黎陽漢縣今大名路濬州也地有黎陽津亦名白馬津澗水東瀍水西王城也朝㑹之地瀍水東下都處商民之地王城在澗瀍之間下都在瀍水之外其地皆近洛水故兩云惟洛食也史氏漸曰澗瀍之東西即洛之中也澗水之東即洛之偏也同名為洛而王城頑民之居不同非洛自為洛澗瀍自為澗瀍洛邑居天下之中伊洛瀍澗實周流於其間天子南響則澗水在洛之右瀍水在洛之左周公於澗瀍之中龜兆告吉遂營王城以建王居定郊社宗廟是為郏鄏之地今之河南是也又循之左越瀍水之東龜復告吉遂營下都名曰成周又曰東郊以居殷民今之洛陽是也二城相距十有八里下逮胞翟之賤亦皆有孚顒若祭統云夫祭者畀煇運胞庖翟閽者恵下之道也煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也易云觀盥而不薦有孚顒若程子云盥謂祭祀之始盥手酌鬰鬯於地求神之時薦謂獻腥獻熟之時居上者正其表儀如始盥之初勿使神意如既薦之後則天下之人莫不盡其孚誠顒然瞻仰之矣顒仰望也予惟謂之曰庶幾其有所事乎公但微示其意以待成王自教詔之也新安陳氏曰周公言我今整齊共營洛之百官使從王于宗周我惟謂之曰王庶㡬將適新邑而有事乎國之大事在祀與戎故古人於祭祀皆曰有事公但微示王將行祀事於洛之意於百官以待王之自教詔之也宗周之四輔漢三輔本諸此朱子云四輔猶四隣漢三輔京兆馮翊扶風三郡也案王制曰設四輔及三公四輔左輔右弼前疑後丞也蔡不據此者以成周未嘗設四輔官時公旦任太師在三公列不聞為四輔故止引漢三輔為比周家非有三郡特以王城鎬京相為鄰輔如朱子四鄰之義耳公又言其自是宅中圗治此言曰其自時中乂案召誥云旦曰其作大邑其自時配皇天毖祀于上下其自時中乂周公固嘗舉與召公言之此又舉以答成王也秬黒黍也一稃二米和氣所生鬯鬰金香草也正義云以黒黍為酒煮鬰金之草築而和之使芬香調暢謂之秬鬯徐鉉云稃米殻也音孚爾雅曰秬黒黍秠一稃二米郭云秠亦黒黍但中米異耳漢和帝時任城生黒黍或三四實實二米得黍三斛八斗是也詳此則一稃二米名曰秠常罕得既名秬鬯則不必其皆一稃二米也卣中尊也爾雅文也孫炎云尊彛為上罍為下卣居中郭璞云卣不大不小者爾雅䟽云是在罍彛之間即周禮犧象壺着大山六尊是也罍者尊之大者也案禮圗云六彛為上受三斗六尊為中受五斗六罍為下受一斛毛詩說金罍大一碩是也彛卣罍三者皆為盛酒器也酒清人渴而不敢飲也肉乾人飢而不敢食也聘義文享有體薦見左傳宣十六年敬之至者其禮如祭新安陳氏曰寧如歸寧父母之寧曰明禋拜手稽首休享者述王命使之辭曰此明潔以敬祀之酒今拜稽而致休美以享公焉敬之至者其禮如祭傳曰享有體薦一證也記曰君子敬則用祭器又一證也宿與顧命三宿之宿同宿進爵也顧命則謂三進爵於神前此則周公言我不敢自進此酒則用以祭文武也戊辰十二月之戊辰日也蔡氏於康誥篇首以三月哉生魄為周公攝政七年之三月則此十二月亦在七年也康誥篇首乃洛誥脫簡及召誥洛誥月日皆第七年中事今以漢志考之云周公攝政七年二月乙亥朔召誥言二月既望十六日庚寅也越六日乙未二十一日也三月甲辰朔惟丙午朏三月初三也越三日戊申初五日也越三日庚戌初七日也越五日甲寅十一日也若翼日乙卯十二日也越三日丁巳十四日也越翼日戊午十五日也此接康誥三月哉生魄十六日己未也又召誥越七日甲子二十一日也洛誥子惟乙卯即召誥三月十二日也戊辰王在新邑十二月三十日也唐孔氏謂此嵗有閏九月辛未朔小則十二月三十日戊辰晦也烝祭之禮冬曰烝周尚赤故用騂騂赤色毛也宗廟禮太牢合用牛一羊一豕一此用特牛舉盛禮文武各一牛故為盛逸史佚也時太史名佚古字通作逸太室清廟中央室也明堂中央曰太廟太室樂記註云文王之廟為明堂制周頌云清廟祀文王也䟽云天徳清明文王能象天之清明故謂其廟為清廟然則清廟者洛邑文王廟名以其制如明堂故亦有中央太室此蔡氏所以訓太室為清廟中央室也周公自留洛之後凡七年而薨也周公位冢宰攝政已七年欲退休成王留之治洛又歴七年自武王䘮後共十四年也兩經七年新安陳氏以為惟七年即攝政之七年者非是多士弗弔未詳大誥引不弔昊天與此同旻天秋天也爾雅云春為蒼天夏為昊天秋為旻天冬為上天肆與康誥肆汝小子封同肆故也弋取也弋鳥之弋論語曰弋不射宿以生絲繋矢而射也栽者培之傾者覆之固其治而不固其亂者天之道也仲虺之誥曰推亡固存與此固字同義蓋能自種其徳者天因以加培之自傾其徳者天因以覆滅之福善禍淫天之道也聖人豈容心哉惟天所命耳降猶今法降等四國之民罪皆應死我大降爾命不忍誅戮如今云減死一等也来自商奄孟子註奄東方之國史記註云奄於險反兖州曲阜縣奄里即奄地東齋陳氏曰此奄與淮夷三監同助武庚以叛周公東征一舉而誅四國獨言来自奄者伐奄在後誅奄即来也四國殷管蔡霍也邑四井為邑之邑四井三十二家也五畝之宅二畝半在田二畝半在邑所謂宅爾邑也無逸劉裕奮農畝而取江左一再傳後子孫見其服用反笑曰田舎翁得此亦過矣南史宋髙祖劉裕孫孝武帝駿壊髙祖所居隂室為玉燭殿牀頭有土障壁上掛葛燈籠麻蠅拂袁顗因盛稱髙祖儉徳上曰田舎翁得此已為過矣祖甲髙宗之子祖庚之弟漢孔氏以祖甲為太甲又經世書髙宗祖庚祖甲世次歴年皆與書合又周公言自殷王中宗及髙宗及祖甲及我周文王及云者因其先後次第而枚舉之辭也則祖甲之為祖甲而非太甲明矣西山真氏曰祖甲為太甲明矣蘇氏以享國多寡為次得之新安陳氏曰祖甲為太甲較分明經世書與三及字皆不足援以為辨太甲為商賢君萬萬不可磨何苦極力挽從来無人齒及之帝甲以排太甲乎愚案真氏陳氏皆不取蔡氏說今且平論之蘇氏謂以享國多寡為次則髙宗五十九年之後便當到文王五十年何必逆取太甲以厠於其間此蘇氏之說非也陳氏謂經世書三及字皆不足援其意黙取蘇說以破蔡傳然考之經文則祖甲享國下即云自時厥後立王生則逸又云亦罔或克夀既以祖甲為太甲則中宗髙宗皆太甲後人安得言生則逸罔或夀邪既云不論世次則不可言自時厥後矣以兩自時厥後詳之則蔡傳所考不可破而孔氏蘇氏真氏陳氏諸說皆非是昃日昳也昳徒結反春秋貢於霸主左傳昭十三年晉合諸侯于平丘子産爭承曰行理之命無月不至貢之無藝小國有闕所以得罪也唐有送使之制唐食貨志云憲宗時分天下之賦為三一曰上供二曰送使三曰留州君奭臣扈與湯時臣扈二人而同名者也疑至臣扈湯時二臣名輯纂陳氏云湯至太戊百三十年必二人而名同也在武丁時不言傅說豈傅說不配食於配天之王乎其詳不得而聞矣息齋余氏曰不言傅說即下文不言尚父之意愚案周公以君奭為經歴之舊臣而留之故歴數商周之老成是以武丁時不言傅說文武時不言太公傅說太公非若甘盤虢叔之舊也陟升遐也如陟方乃死之陟通徹三極而無間貫通天地人之理也卷阿鳴于髙岡者乃詠其實故周公云爾卷阿召公所作曰鳯凰鳴矣于彼髙岡蓋衆人之所聞見喻大賢處髙顯之地召公既言之矣今乃求去故周公云我則鳴鳥不聞也震撼撃撞欲其鎮定言所以處人心之未服者辛甘燥濕欲其調齊才細反言所以處人情之未和者槃錯棼結欲其解紓音舒言所以處人事之未靖者黯闇污濁欲其茹納言所以處人言之未順者患失乾没者患失即論語所謂鄙夫乾没出前漢張湯傳云始為小吏乾没服䖍曰射成敗也如淳曰豫居物以待之得利為乾失利為没乾音干召公親遭大變破斧缺斨之時詩云既破我斧又缺我斨言周公東征誅戮兵器弊壊之時也超然肥遯肥遯遯卦上九爻辭也程子曰肥者充大寛裕之意遯者飄然逺逝無所繋滯之為善蔡仲之命此篇次序當在洛誥之前蓋以事在周公攝政七年之中不在留洛七年之内也蘇氏曰郭虢也當時聲訛以虢為郭如韓為何陳為田之類管霍國名今河南鄭州管城縣古管國也左傳閔二年晉滅霍杜預云永安縣東北有霍太山今山西平陽路霍山也周公留佐成王食邑於圻内圻内諸侯孟仲二卿故周公用仲為卿非魯之卿也知非魯國之卿者以左傳定四年云蔡仲改行率徳周公舉之以為己卿士周公未嘗居魯既曰己卿士是圻内之卿士也孟仲二卿猶言上下二卿皆命於其君周公以仲為己卿士則是自命之卿也蔡左傳在汝淮之間杜預云武王封叔度於汝南上蔡胡徙新蔡昭侯徙九江下蔡愚案汝南上蔡今汝寧府上蔡縣也新蔡舊亦為蔡州屬縣今廢下蔡宋為壽州倚縣今廢在安豐路界内此章與伊尹申誥太甲之言相類而有深淺不同者太甲蔡仲之有間也伊尹曰克敬曰有仁曰克誠此語深且詳矣此以惟徳惟惠言之則所包者廣不如敬仁誠分别之切蔡氏所謂淺也蓋太甲敗度敗禮之餘仲則邁迹自身彼則以臣而告君此則以上而訓下故其深淺詳略之不同如此中者心之理而無過不及之差者也中者本所以状性之徳今經言率自中是循而由之之義故直以心之理訓之若論其未𤼵則在中之中無所偏倚是為天下之大本及其既𤼵而時中然後見其無過無不及也所謂天下之達道也多方光武成功若建瓴然建音蹇瓴音苓漢書云居髙屋上建瓴水註云建翻水也瓴盛水瓶也居髙而翻瓶水言易也西漢之末王莽簒逆公孫述據成都隗囂據天水光武以漢宗室起兵南陽破莽兵海内豪傑響應皆殺莽牧守用漢年號旬月徧天下更始殺王莽光武破隗囂撃殺公孫述天下復為漢者二百年成王即政之明年商奄又叛成王征滅之新安陳氏曰洛誥戊辰王在新邑孔註十二月戊辰晦此七年之十二月即成王即政之年也多士作於是年之三月曰昔朕来自奄是述東征時事乃自武王誅紂伐奄後第二畨叛也多方作於即政之明年五月成王政序曰成王遂踐奄多方序曰成王歸自奄此書曰成王来自奄乃奄之第三叛王墮其城遷其君又因以告多方也以去年十二月戊辰晦筭之則次年正月朔己巳五月朔非丁卯則戊辰丁亥非二十即二十一日也多士與多方之作先後蓋一年有三月云奄不知所在解在多士寰宇記在曲阜縣奄中古奄國也衛孔悝之鼎銘見祭統孔悝衛荘公蒯瞶時大夫也鄭注云周既去鎬京猶名王城為宗周也悝音恢時鎬已封秦史記犬戎殺周幽王酈山下秦襄公以兵送平王遷都雒封襄公為諸侯賜以岐豐之地克堪者能勝之謂也新安陳氏曰克堪二字下得極有力非有仁以為己任之𢎞兼死而後己之毅不能堪而用之也克堪用之必有非力之力如真積力乆之力而後可神天之主東齋陳氏曰可為神與天之主山川宗社之得其安三光寒暑之得其序皆人君有以主之讋服讋質渉反漢書云羣臣震讋讋中自服也賔介之介相副相助者周官多以胥以伯以正為名如大胥小胥象胥宗伯宫伯宫正酒正之類胥有才智者也伯與正皆長也立政葛氏曰綴衣周禮司服之類天官有司裘有内司服有縫人春官亦有司服虎賁周禮之虎賁氏也蔡氏謂執射御者曰虎賁今案夏官虎賁氏掌先後王而趨舎則守王閑在國則守王宫有大故則守王門無執射御之事又有旅賁氏掌執戈盾夾王車而趨牧民之長曰常伯任事之公卿曰常任守法之有司曰準人吕氏曰常伯等即三宅三代之書他無所見意者公卿輔相之别名歟官有别名如相曰阿衡保衡三卿曰圻父農父宏父此亦三代輔政大臣别名耳綴衣虎賁特於侍御僕從中錯舉二者以見其餘耳職重者有安危之寄職親者有染習之移其繋天下之本一也新安陳氏曰吕說得之宅事常任所職必廣凡任事之大臣也宅牧常伯主牧養之大臣也宅準準人主平法之大臣也又案虞有十二牧夏周有九牧皆在邦國意必有大臣在朝者以統之如虞四岳統十二牧周六卿倡九牧立政所謂常伯宅牧必長牧養而在朝以統牧伯者歟甸者井牧其地什伍其民也井牧者按小司徒云乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都什伍其民者大司徒云五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉又小司徒云五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍又遂人云五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂凡治野夫閒有遂十夫有溝百夫有洫千夫有澮萬夫有川此井牧什伍之大綱也以是立民長伯則體統立而下有所寄新安陳氏曰立民長伯當時宅俊或有出而封為長伯者愚案康叔為司宼是宅乃準者封於衛為孟侯詩序言衛不能脩方伯連率之職是三宅為長伯之證趣馬掌馬之官趣七口反周禮趣馬下士皁一人徒四人攜僕攜持僕御之人周官有太僕下大夫祭僕中士御僕下士𨽻僕下士大馭中大夫戎僕中大夫齊僕下大夫道僕上士田僕上士馭夫中士車僕中士庶府若内府太府之屬也周官有玉府内府外府泉府天府大都之伯小都之伯畿内之都大都為公之采邑小都為卿之采邑藝人者卜祝巫匠執技以事上者卜如太卜卜師龜人菙人簭人占夢眡祲是也祝如太祝䘮祝甸祝詛祝是也巫如司巫男巫女巫神士是也匠如攻木攻金攻皮設色刮摩搏埴之工皆是也王制云凡執技以事上者祝史射御醫卜及百工如庖人内饔膳夫則是數尹之伯也傳意謂庖人為庖尹内饔為饔尹而膳夫則兼二者而為之伯也蓋庖饔各治其事而又統於膳夫也然此二句以下文比之必有脫字鐘師尹鐘磬師尹磬太師司樂則是數尹之伯也太師及司樂為鐘師磬師之伯此二節特舉例以解尹伯以是求之尹伯固不止於此二者矣太史奉諱惡公天下後世之是非王制云太史典禮執簡記奉諱惡簡記策書也動則左史書之言則右史書之大事書於策小事簡牘所書善惡必以實録所謂公天下後世之是非也諱先王名也惡忌日也先王死日及子卯不樂周官云小史詔王之忌諱此諸侯之官也司徒主教司馬主政司空主土諸侯之官獨舉此者以其名位通於天子歟愚案康誥言圻父農父宏父三卿亦與此同可見此為諸侯之官蓋大國三卿兼攝六事傳謂名通天子者大國三卿皆命於天子也亳見史三亳蒙為北亳穀熟為南亳偃師為西亳此據正義所引皇甫謐說也寰宇記考城縣有北亳城今睢州考城縣也蒙縣名今廢又云宋州穀熟縣亳城在縣西南三十五里宋州今歸徳府也穀熟縣廢偃師縣屬河南府地志云河南偃師尸鄉殷湯所都臣瓚曰湯居亳今濟隂縣是也今亳有湯冡己氏有伊尹冡師古曰瓉說非也又如皇甫謐所云湯都在穀熟事並不經劉向云殷湯無𦵏處安得湯冡乎地志載王官所治非一案地志中國四夷皆有都尉治在蠻夷謂之中部都尉東部都尉南部都尉西部都尉北部都尉又有屬國都尉宜禾都尉騎都尉農都尉江闗都尉匃奴都尉等數十處意與夷微盧烝三亳阪尹相似皆王官出治外地者蘇國名左傳蘇忿生以温為司寇地志云温己姓蘇忿生所封左傳語見成公十一年温今孟州温縣也書蔡氏傳旁通卷五
