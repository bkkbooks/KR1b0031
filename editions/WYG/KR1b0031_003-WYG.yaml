body:
  text: 書蔡氏傳旁通卷三元陳師凱撰湯誓契始封商湯因以為有天下之號契帝嚳之子為唐虞司徒史記索隠曰堯封契於商今商州也為陜西奉元路支郡湯國號商盤庚遷殷之後又號殷湯號也或曰諡湯名履姓子氏史記索隠曰湯名履書曰子小子履是也又稱天乙者譙周云夏殷之禮生稱王死稱廟主皆以帝名配之天亦帝也殷人尊湯故曰天乙從契至湯凡十四代張晏曰禹湯皆字也諡法曰除虐去殘曰湯皇甫謐云商家生子以日為名其母以甲日生子則稱某甲譙周以為死稱廟主曰甲愚案古周書諡法解一百八十二諡並無以堯舜禹湯桀紂為諡者鄭氏通志略云周人以諱事神故卒哭而諱將葬而諡其有堯舜禹湯桀紂六人乃人名非諡法也如云巧言如流曰哿闢于四門曰穆有文在手曰友乃聖乃神曰武持盈守成曰成此皆採經傳之言大不通理者愚謂諡法當以周書所載為正其餘諸家皆後人贅附之文如除殘去虐曰湯之類皆不足據只以湯為號為是今史記首卷有諡法一篇多周書一十二字皆後人所増者也亳今河南府偃師縣也仲虺之誥仲虺奚仲之後為湯左相左傳定元年薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相士師以五戒先後刑罰先後音去聲猶左右也南巢地名廬江六縣有居巢城在今淮西無為州巢縣愧徳之不古若輯纂引陳氏云觀湯之慙湯之本心始見矣以居萬世君臣之始變也吕氏曰此心之慙此誥之釋皆不可少民生有耳目口鼻愛惡之欲無主則爭且亂矣孟子曰口之於味也耳之於聱也目之於色也鼻之於臭也四支之於安佚也性也有命焉蓋命謂分也富貴貧賤各有其分先王制禮不可踰越苟無聖人以主之則人人各縱其氣質之性以極其欲而各求所不當得者則必犯非其分而爭且亂矣史記言桀囚湯於夏臺索隠云獄名夏曰均臺皇甫謐云地在陽翟是也陽翟元屬許州今屬均州懋茂也左氏宣十五年伯宗曰酆舒怙其雋才而不以茂徳葛國名在今歸徳府寧陵縣去亳百里禮義者所以建中者也新安陳氏云動而以義制事即義以方外之謂能以義方外則此徳應萬事之大用以行而此中無過不及之用在是矣静而以禮制心即敬以直内之謂䏻敬以直内則此徳具衆理之全體以立而此中不偏不倚之體在是矣湯誥亳湯所都在宋州榖熟縣寰宇記云殷謂之南亳亦嘗都之榖熟今廢案注䟽云鄭元云亳今河南偃師漢書音義臣瓉云湯居亳今濟隂亳縣是也杜預云梁國蒙縣北有亳城皇甫謐云湯居亳與葛為鄰葛即今梁國寧陵之葛鄉也若湯居偃師去寧陵八百餘里豈當使民為之耕乎亳今梁國榖孰縣是也諸說不同未知孰是衷中朱子語錄云惟皇上帝降衷于下民孔安國以為降善便是無意思衷不是善只是中與民受天地之中一般又云看得衷字是箇無過不及恰好底道理又云此衷字義本是如左氏所謂衷甲以見之義為其在衷而當中也愚案說文云衷褻衣増韻云方寸所藴也蓋是天以此理降付於人人受而具之於心無少偏倚本謂之中為其藴之方寸若褻衣之在裏故謂之衷也其實則中也者天下之大本也故蔡氏直以中訓之屈原曰人窮則反本故勞苦倦極未嘗不呼天也當作屈原傳曰本太史公辭也云天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也簡閱一聽於天朱子語錄云善與罪天皆知之如天點檢數過相似爾之有善也在帝心我之有惡也在帝心伊訓夏曰嵗商曰祀周曰年歳木星也一年行一次十二年而亥子一周祀祭享也一年而徧年禾一熟也商以建丑為正故以十二月為正正正朔也王者易姓受命而改正朔夏正建寅取人生於寅之義商改而建丑取地闢於丑之義周改而建子取天開於子之義此之謂三正又名三統又名三微三代雖正朔不同然皆以寅月起數建寅之月夏之正月也其月為孟春天時人事咸與維新之時也故其月稱正月商周因之以起數以夏稱嵗故以建寅之月為正歳周禮屢稱正嵗是也攺正朔而不改月數則於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也愚案商秦二代不改建寅之數固為明甚惟周則建寅建子並有左驗故辨者紛然迄無定説謂周不改月數者指四月維夏六月徂暑也謂周改月數者禮記有正月日至七月日至孟子有十一月徒杠成十二月輿梁成及七八月之間旱朱子注云周七八月夏五六月也左傳正月日南至據此則周又似改月數矣朱子於豳七月傳引吕氏云三正之通於民俗尚矣周並舉而迭用之此説蓋是太甲之為嗣王嗣仲壬而王也太甲太丁之子仲壬其叔父也湯三子太子太丁未即位而卒次外丙在位二年而卒幼仲壬在位四年而卒外丙仲壬皆無子惟太丁有子太甲伊尹立之為仲壬後繼仲壬而王也嗣叔父而王而為之服三年之喪為之後者為之子也為之服為之子二為字並音去聱太甲為仲壬之子服仲壬之喪斬衰三年是為仲壬之後而為仲壬之喪如子之居父喪也又案程氏云古人謂嵗為年湯崩時外丙方二嵗仲壬方四嵗惟太甲差長故立之也愚謂外丙仲壬皆太丁之弟若謂二年四年非在位之數豈有兄乃二嵗而弟反四嵗乎此其在位之歴年無疑也鳴條夏所宅也䟽云今安邑有鳴條陌孟子云東夷鄭元云南夷或云陳留平丘皆非在今河東解州安邑縣也湯之克忠最為難看湯放桀以臣易君豈可為忠不知湯之心最忠者也天命未去人心未離事桀之心曷嘗斯湏替哉案孟子云五就湯五就桀者伊尹也朱子引楊氏曰伊尹之就湯以三聘之勤也其就桀也湯進之也湯豈有伐桀之意哉其進伊尹以事之也欲其悔過遷善而已伊尹既就湯則以湯之心為心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹即有伐桀之心而伊尹遂相之以伐桀是以取天下為心也以取天下為心豈聖人之心哉輔氏曰楊氏真得湯與伊尹之心足以洗世儒之惑愚謂孟子此章楊氏此注亦見湯之克忠處巫覡女曰巫男曰覡十愆恒舞一酣歌二殉貨三殉色四恒遊五恒畋六侮聖言七逆忠直八逺耆徳九比頑童十墨即叔向所謂夏書昬墨賊殺臯陶之刑貪以敗官為墨左傳昭十四年叔向曰己惡而掠美為昬貪以敗官為墨殺人不忌為賊夏書曰昬墨賊殺臯陶之刑也杜注云昬亂也墨不潔之稱忌畏也三者皆死刑太甲上顧常目在之也朱子語錄云古注云顧謂常目在之也此語最好非謂有一物常在目前可見也只是常存此心知得有這道理光明不昧方其静坐未接物也此理固湛然清明及其遇事而應接也此理亦随處𤼵見只要人常提撕省察念念不忘存養久之則是理益明雖欲忘之而不可得矣夏都安邑今河東解州安邑縣也虞虞人也掌山澤之官括矢括也括矢末也安汝止者聖君之事生而知者也欽厥止者賢君之事學而知者也欽者肅恭收歛之謂安汝止者自然而然欽厥止者使然而然故有聖賢之别桐成湯墓陵之地史記正義曰晉太康地記云尸鄉南有亳坂東有城太甲所放處也案尸鄉在洛州偃師縣西南五里太甲中冕冠也唐孔氏曰周禮天子六冕備物盡文惟衮冕耳此蓋衮冕之服䟽云有虞氏皇而祭夏后氏收而祭殷人冔而祭周人冕而祭並是當代冠名冔是殷之祭冠今云冕者蓋冕為通名愚案天子六冕祀昊天則大裘而冕享先王則衮冕享先公享射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕祀天之冕無旒餘五冕皆𤣥冕朱裏延紐五采十有二就皆五采玉有十二玉笄朱紘冕之為體周禮無文叔孫通作漢禮器制度取法於周凡冕以板廣八寸長尺六寸上𤣥下朱覆之乃以五采繅繩貫五采玉垂於延前後謂之邃延周禮䟽云古者績麻三十升布染之上以𤣥下朱衣之於冕之上下延者即是上𤣥者紐者綴於冕之兩旁垂之或兩旁作孔以笄貫之使得其牢固也冕前低一寸得冕名冕則俛也繅雜文之名也合五采丝為之繩垂於延之前後各十二就成也繩之每一匝貫五采玉十二斿則十二玉也每就閒蓋一寸十二斿則用玉二百八十八紘者用朱繩一條先屬一頭於左旁笄上以一頭繞於頥下至向上於右笄上繞之蓋有笄者屈組以為紘垂為飾無笄者纓而結其絛也穎達以此為衮冕者蓋據享先王言耳其實周冕文勝於商孔子云服周之冕可見也太甲下以上五事蓋欲太甲矯乎情之偏也無輕民事一也無安厥位二也慎終于始三也必求諸道四也求諸非道五也咸有一徳徳者善之緫稱善者徳之實行一者其本原統㑹者也朱子語錄云横渠説徳主天下之善善原天下之一最好四句三叚一叚緊似一叚徳且是大體説有吉徳有凶徳然必主於善始為吉爾善亦是大叚説或在此為善或在彼為不善或前日不善今日則善惟湏協于克一乃是為善蓋善因一而後定也徳以事言善以理言一以心言張氏曰虞書精一數語之外惟此為精密張敬夫語天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有徳之主則不祧毁注疏引王制云天子七廟三昭三穆與太祖之廟而七祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧劉歆馬融王肅皆以七廟為天子常禮所言二祧者王肅以為髙祖之父及祖也并髙祖以下共為三昭三穆耳中庸或問云凡廟主在本廟之室中皆東向及其祫于太廟之室中則惟太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也或問又云商之七世三宗其詳今不可考又云周穆王時文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室至共王時武王親盡當祧而亦以有功當宗故别立一廟於東北而謂之武世室自是以後則穆之祧者藏於文世室昭之祧者藏於武世室盤庚上祖乙都耿圯於河水盤庚欲遷于殷自祖乙至盤庚居耿者七世史記索隠曰河東皮氏有耿鄉史記正義曰絳州龍門縣東南十二里有耿城殷今河南偃師也史記言祖乙遷邢或祖乙兩遷也索隠曰邢音耿由古文作甹木生條也説文㽕從弓由聱商書曰苦顛木之有㽕枿􅝟乎感切草木之華未𤼵也徐鍇曰今尚書只作由枿古文省弓而後人因省之通用為因由等字臣鉉等案孔安國注尚書直訓由作用用枿之語不通愚案枿字今又作蘖通五割反盤庚中中者極至之理各以極至之理存于心中者無過無不及舉天下無以加之故謂之極至之理孔子曰中庸之為徳其至矣乎各設中于乃心者言此心各以中為準而不為浮言所摇動也盤庚下案立政三亳鄭氏曰東成臯南轘轅西降谷注疏之説如此而本傳立政又與此不同者彼亦出疏文此為鄭氏説而彼為皇甫謐説蓋蔡氏有疑故並舉之耳疏又云古書亡滅無證未知誰得旨矣成臯春秋之虎牢也轘轅山名在河南府緱氏縣説命上亮一作諒隂古作闇諒據釋文又力章反本作梁一變為諒再變為亮鶉䳺之䳺烏南反柱楣所謂梁闇是也柱知主反楣音眉楣即是梁闇即是廬梁闇者廬之有梁者也禮疏又謂施梁而柱楣則楣與梁又似二物未知孰是剪屏柱楣剪當作翦書者誤朱子書説云始者户北向用草為屏不翦其餘至是改而西向乃翦其餘草始者無柱與楣簷著於地至是乃施短柱及楣以柱其楣架起其簷令稍髙而不可作户也愚案朱子謂至是者既虞之後也宅憂亮隂言居喪於梁闇也居喪二字今董氏輯纂誤書作宅憂先儒以亮隂為信黙見安國傳語復而不可解復音福重也髙宗恭默思道之心純一不二與天無閒故夢寐之閒帝賚良弼其念慮所孚精神所格非偶然而得者也輯纂引范氏云中庸曰誠則形形則著揚雄曰人心其神矣乎髙宗之夢誠之形而心之神也傅巖在虞虢之閒史記正義云傅險即傅説所隠之窟名聖人窟在今陜州河北縣北七里即虞國虢國之界愚案河北縣唐天寳元年陜郡太守李齊物改為平陸今屬解州方言揚雄書名輶軒使者説命中治亂曰亂亮軒馮氏云治之與亂其義相反古治字作乿經文誤冩作亂傳者冝云亂當作乿與治同凡經中訓亂為治者倣此凶徳之人雖有過人之才爵亦不可及既云凶徳又云有過人之才者何也才稟於氣美惡不同随其徳之所成吉徳而有才則所為無不善凶徳而有才則所為無不過才者有能之謂能之所為或良或不良也徳而有凶有吉者蓋亦得於所稟之初聖賢得剛柔之中氣故清明而純粹其餘剛善柔善亦可以沈潛髙明勝之而就吉若稟剛惡柔惡之氣則必强梁險譎自暴自棄而就為凶徳矣然未必無才也如桀紂智足以拒諫文足以餙非濟以凶徳則無不為矣説命下蘇氏謂甘盤遯于荒野以台小子語脉推之非是東坡云武丁為太子則學于甘盤武丁即位而甘盤遯去使人求之迹其所在則居于河濵自河徃亳不知其所終武丁無所卒業乃相説也古注謂武丁遯于荒野使為太子而遯則為吴太伯豈復立哉學者徒見書云髙宗舊勞于外乃小乙使之劬勞以知艱難耳決非荒野之遯也朱子語錄云東坡解作甘盤遯于荒野據某看只是髙宗自言觀上文曰台小子可見但不知當初髙宗因甚遯于荒野兼無逸云髙宗舊勞于外亦與此相應作酒者麴多則太苦糵多則太甘麴酒母也糵牙米也斆敎也言教人居學之半朱子語錄云惟斆學半蓋已學既成居于人上則湏敎人自學者學也而教人者亦學也蓋初學得者是半既學而推以敎人與之講説已亦因此温得此段文義是斆之功亦半也念終始典于學始之所以學者學也終之所以敎人者亦學也或曰受教亦曰斆斆於為學之道半之半湏自得此説極為新巧朱子語錄云因説斆學半或舉葛氏解云傅説與王説我敎你者只是一半事那一半要你自去行取故謂之終始先生曰近見喻子才跋某人説命解後亦引此説吕伯恭亦如此説某舊為同安簿時學中一士子作書義如此説見他説得新巧大喜之先説王人求多聞時惟建事此是人君且學且斆一面理㑹敎人又一面窮義理後面説得監于先王成憲其永無愆數語是平正實語不應中間翻空一句如此深險如斆得一半不成那一半掉放冷處敎他自得此語全似禪語五通僊人問佛六通如何是那一通便是妙處且如學記引此亦只依古注髙宗肜日肜祭明日又祭之名殷曰肜周曰繹爾雅云繹又祭也孫炎云繹者相尋不絶之意榖梁傳云繹者祭之旦日之享賔也何休云繼昨日事但不灌地降神耳祭禮經傳通解云為祊于外祊祭明日之繹祭也謂之祊者於廟門之旁因名焉其祭之禮既設祭於室而事尸於堂孝子求神非一處也故曰於彼乎於此乎詩云明𤼵不寐有懐二人祭之明日明𤼵不寐饗而致之又從而思之又周頌􅁝衣繹賔尸也箋曰天子諸侯曰繹以祭之明日卿大夫曰賔尸與祭同日疏云祭宗廟之明日又設祭祀以尋繹昨日之祭以賔事所祭之尸頌云兕觥其觩曹氏注云旅酬之後恐有失禮者以此罰之祭禮通解陳氏云所以醉飽尸也其飲至於無筭其罰至於兕觥則繹祭可知矣輯纂引陳氏云祭之明日以禮享尸行事之有司助祭之賔客皆與焉然謂之又祭而不謂之享者以尸猶有鬼神之道也昵者禰廟也以親昵言之故知禰廟豐於昵失禮之正豐於昵則必儉於逺厚於父則必薄於祖故云失禮之正意髙宗之祀必有祈年請命之事如漢武帝五畤祀之類畤祭處也秦文公作鄜畤祭白帝秦宣公作密畤祭青帝後二百五十年秦靈公作上畤祭黄帝作下畤祭炎帝漢稱為雍鄜密上下四畤髙祖入關問秦畤上帝祠何帝也對曰有四帝青白黄赤髙帝曰乃待我而具五色遂立黒帝祠名北畤有司進祠帝不親徃武帝即位初至雍郊見五畤後常三嵗一郊外有西畤畦畤不在五畤之数時有李少君以祠竈榖道郤老方見上尊之謂數百嵗人也武帝慕道多祠祀皆祈年請命之事西伯戡黎黎國名在上黨壼關之地今潞州壼關縣也又有黎城縣史記稱西伯伐飢國又云敗耆注云飢耆即黎羑里之囚史記正義云羑一作牖音酉羑城在相州湯隂縣北九里今彰徳路湯隂縣也獻洛西之地史記正義云洛水一名漆沮水在同州洛西之地謂文丹坊等州也或曰史記嘗載紂使膠鬲觀兵史記不見所出武成䟽引帝王世紀云武王軍鮪水紂使膠鬲候周師見王問曰西伯將焉之王曰將攻薛也膠鬲曰然願西伯母我欺王曰不子欺也將之殷膠鬲曰何日至王曰以甲子日膠髙去而雨甚軍卒請休王曰已令膠鬲報其主吾雨而行所以救膠鬲之死也遂行微子微子名啓帝乙長子紂之庶母兄也父師太師三公箕子也少師孤卿比干也朱子云微子紂庶兄箕子比干紂諸父注疏云微箕二國皆在殷圻内司馬彪注莊子云箕子名胥餘色純曰犧殷人尚白祭天地宗廟用白牛體完曰牷牛羊豕之未體解者牛羊豕曰牲緫名曰牲獨用曰特羊豕曰少牢緫用曰太牢用相容隠古注謂器實曰用疏以為簠簋之實則以容二字不通故蔡氏不從箕子舊以微子長且賢勸帝乙立之不從卒立紂正義引吕氏春秋仲冬紀云紂之母生微子啓與仲衍其時猶尚為妾改而為妻後生紂紂之父欲立微子啓為太子太史據法而爭曰有妻之子不可立妾之子故立紂為後於時箕子蓋謂請立啓而帝乙不聽今追恨其事靖安也各安其義之所當盡以自達其志於先王使無愧於神明而已張庭堅才叔曰君子之去就死生其志在於天下國家而不在於一身故其死者非沽名其生者非懼禍而引身以求去者非要利以忘君也仁之所存義之所至鬼神其知之矣昔商之三仁或生或死或為之奴而皆無愧於宗廟社稷豈非謀出於此歟書蔡氏傳旁通卷三
